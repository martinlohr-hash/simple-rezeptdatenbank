                        </div>
                      )}
                      {a.archiv&&<div style={{fontSize:11,fontWeight:600,color:'#94a3b8'}}>Archiv</div>}
                      {a.datum&&<div style={{fontSize:11,color:'#5e6e7f',marginTop:2}}>{new Date(a.datum).toLocaleDateString('de-DE')}</div>}
                    </div>
                  </div>
                  <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:8}}>
                    <div>
                      <span style={{fontSize:20,fontWeight:700,letterSpacing:'-.5px',fontVariantNumeric:'tabular-nums'}}>{fmt(ppu)}</span>
                      <span style={{fontSize:13,color:'#5e6e7f'}}> / {a.e}</span>
                    </div>
                    <div style={{display:'flex',alignItems:'center',gap:6}}>
                      {a.lief&&<span style={{fontSize:11,fontWeight:600,color:'#566373',background:'#f1f5f9',padding:'2px 8px',borderRadius:100}}>{a.lief}</span>}
                      <span style={{color:'#c4c9d4',fontSize:16,lineHeight:1}}>›</span>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          );
        })}
        {filtered.length===0&&<div className="empty" style={{marginTop:24}}>Keine Artikel gefunden</div>}
      </div>
    </div>
  );
}

function ArticleModal({art, onSave, onClose, suppliers=[], onDelete}) {
  const isNew = !art.id;
  const [form, setForm] = useState({...art, varianten: art.varianten||[]});
  const f = (k,v) => setForm(p=>({...p,[k]:v}));

  // Stable-order supplier rows — ★ changes badge only, never reorders
  const [rows, setRows] = useState(()=>[
    {lief:art.lief||'', ek:art.ek||0, datum:art.datum||'', isDefault:true},
    ...(art.varianten||[]).map(v=>({...v, isDefault:false})),
  ]);
  const addRow    = () => setRows(prev=>[...prev,{lief:'',ek:0,datum:'',isDefault:false}]);
  const removeRow = (i) => setRows(prev=>prev.filter((_,j)=>j!==i));
  const updateRow = (i,k,v) => setRows(prev=>prev.map((r,j)=>j===i?{...r,[k]:v}:r));
  const makeDefault = (i) => setRows(prev=>prev.map((r,j)=>({...r,isDefault:j===i})));

  const defaultRow = rows.find(r=>r.isDefault)||rows[0];
  const ppu = defaultRow ? (form.g>0 ? defaultRow.ek/form.g : defaultRow.ek) : 0;

  return (
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="modal-header">
          <h3>{isNew?'Neuer Artikel':'Artikel bearbeiten'}</h3>
          <button className="btn btn-ghost" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          <div className="form-grid">
            <div className="form-row"><label>Name</label>
              <input type="text" value={form.name||''} onChange={e=>f('name',e.target.value)} placeholder="Artikelname"/>
            </div>
            <div className="form-row"><label>Kategorie</label>
              <select value={form.kat||getKat(form)} onChange={e=>f('kat',e.target.value)}>
                <option value="Food">Food</option>
                <option value="Bev">Bev</option>
                <option value="Nonfood">Nonfood</option>
              </select>
            </div>
          </div>
          <div className="form-grid">
            <div className="form-row"><label>Packungsgröße</label>
              <input type="number" value={form.g||''} onChange={e=>f('g',parseFloat(e.target.value)||0)} step="0.001"/>
            </div>
            <div className="form-row"><label>Einheit</label>
              <select value={form.e||'KG'} onChange={e=>f('e',e.target.value)}>
                {['KG','kg','g','l','L','St','St.','Stk','Bd','Ds','Kst','Dose'].map(u=><option key={u}>{u}</option>)}
              </select>
            </div>
          </div>
          <div className="form-row"><label>Preis prüfen alle</label>
            <select value={form.checkTage||''} onChange={e=>f('checkTage', e.target.value ? parseInt(e.target.value) : null)}>
              <option value="">Standard (globale Einstellung)</option>
              <option value="1">Täglich (Tagespreis)</option>
              <option value="3">3 Tage</option>
              <option value="7">7 Tage (wöchentlich)</option>
              <option value="14">14 Tage</option>
              <option value="30">30 Tage (monatlich)</option>
              <option value="90">90 Tage (quartalsweise)</option>
              <option value="180">180 Tage (halbjährlich)</option>
            </select>
          </div>

          {/* ── Lieferanten-Preise ── */}
          <div style={{background:'#f8fafc',border:'1px solid #e2e8f0',borderRadius:8,padding:12,marginBottom:14}}>
            <div style={{fontSize:11,fontWeight:600,color:'#566373',textTransform:'uppercase',letterSpacing:'.3px',marginBottom:10}}>
              Lieferanten &amp; Preise
            </div>
            <datalist id="art-sup-list">{suppliers.map(s=><option key={s.id} value={s.name}/>)}</datalist>
            {rows.map((row,i)=>{
              const vPpu = form.g>0 ? row.ek/form.g : row.ek;
              const diffPct = !row.isDefault&&ppu>0 ? ((vPpu-ppu)/ppu*100) : 0;
              return (
                <div key={i} style={{display:'grid',gridTemplateColumns:'1fr 90px 120px auto',gap:8,alignItems:'center',marginBottom:6}}>
                  <input type="text" list="art-sup-list" value={row.lief||''} onChange={e=>updateRow(i,'lief',e.target.value)} placeholder="Lieferant" style={{fontSize:12}}/>
                  <div style={{position:'relative'}}>
                    <input type="number" value={row.ek||''} onChange={e=>updateRow(i,'ek',parseFloat(e.target.value)||0)} step="0.01" placeholder="EK €" style={{fontSize:12,width:'100%'}}/>
                    {!row.isDefault&&row.ek>0&&ppu>0&&<span style={{position:'absolute',right:4,top:'50%',transform:'translateY(-50%)',fontSize:9,color:diffPct>0?'#dc2626':'#16a34a',fontWeight:700,pointerEvents:'none'}}>
                      {diffPct>0?'▲':'▼'}{Math.abs(diffPct).toFixed(0)}%
                    </span>}
                  </div>
                  <input type="date" value={row.datum||''} onChange={e=>updateRow(i,'datum',e.target.value)} style={{fontSize:12}}/>
                  <div style={{display:'flex',gap:4}}>
                    {row.isDefault
                      ? <span className="badge badge-blue" style={{justifyContent:'center',minWidth:62}}>Standard</span>
                      : <button className="btn btn-secondary btn-xs" onClick={()=>makeDefault(i)} title="Als Standard setzen">★</button>
                    }
                    {!row.isDefault&&<button className="btn btn-danger btn-xs" onClick={()=>removeRow(i)}>✕</button>}
                  </div>
                </div>
              );
            })}
            <button className="btn btn-secondary btn-sm" style={{marginTop:4}} onClick={addRow}>+ Lieferant</button>
          </div>

          {!isNew && <div className="form-row" style={{display:'flex',alignItems:'center',gap:8}}>
            <label style={{margin:0,cursor:'pointer'}}>
              <input type="checkbox" checked={form.archiv||false} onChange={e=>f('archiv',e.target.checked)} style={{width:'auto',marginRight:6}}/>
              Archiviert
            </label>
          </div>}
        </div>
        <div className="modal-footer">
          {!isNew && onDelete && <button className="btn btn-danger" style={{marginRight:'auto'}} onClick={()=>onDelete(form)}>Löschen</button>}
          <button className="btn btn-secondary" onClick={onClose}>Abbrechen</button>
          <button className="btn btn-primary" onClick={()=>{
            const defRow=rows.find(r=>r.isDefault)||rows[0];
            onSave({...form,id:form.id||('A'+uid()),lief:defRow.lief,ek:defRow.ek,datum:defRow.datum,varianten:rows.filter(r=>!r.isDefault).map(({lief,ek,datum})=>({lief,ek,datum}))});
          }}>Speichern</button>
        </div>
      </div>
    </div>
  );
}

function ArticleTab({articles, setArticles, priceLog, setPriceLog, upsert, del, recipes=[], suppliers=[], vps=[], pendingModal=null, onPendingClear, warnDays=90, alertDays=180, onNavigateToRecipe, onNavigateToVP, pendingStatusFilter=null, onPendingStatusFilterClear, syncFav}) {
  const [q, setQ] = useState('');
  const [showArchiv, setShowArchiv] = useState(false);
  const [showFav, setShowFav] = useState(false);
  const [statusFilter, setStatusFilter] = useState('all');
  const [lieferantFilter, setLieferantFilter] = useState('all');
  const [modal, setModal] = useState(null);
  const [sort, setSort] = useState({col:'name',dir:'asc'});
  const [archiveWarning, setArchiveWarning] = useState(null);
  const [deleteWarning, setDeleteWarning] = useState(null);
  const [deleteConfirm, setDeleteConfirm] = useState(null);
  const [impactModal, setImpactModal] = useState(null);
  const [isMobile, setIsMobile] = useState(()=>window.innerWidth<768);
  const [quickEditArt, setQuickEditArt] = useState(null);

  const handleDeleteRequest = (art) => {
    setModal(null);
    const usedInRecipes = recipes.filter(r=>!r.archiv&&(r.zutaten||[]).some(z=>z.art===art.id));
    const usedInVPs = vps.filter(vp=>!vp.archiv&&(vp.zutaten||[]).some(z=>z.art===art.id));
    if (usedInRecipes.length||usedInVPs.length) {
      setDeleteWarning({art, usedInRecipes, usedInVPs});
    } else {
      setDeleteConfirm(art);
    }
  };

  const doDelete = (art) => {
    setArticles(prev=>prev.filter(a=>a.id!==art.id));
    del&&del('articles', art.id);
    setDeleteConfirm(null);
  };

  const handleMobileEdit = (art) => setQuickEditArt(art);

  const toggleFav = (art) => {
    const newFav = !art.fav;
    const updated = {...art, fav: newFav};
    setArticles(prev => prev.map(a => a.id === art.id ? updated : a));
    const favs = JSON.parse(localStorage.getItem('simple_favs')||'[]');
    const newFavs = newFav ? [...new Set([...favs, art.id])] : favs.filter(id=>id!==art.id);
    localStorage.setItem('simple_favs', JSON.stringify(newFavs));
    // Strip fav from main upsert (avoids error if column not yet migrated)
    const {fav:_, ...artForSupabase} = updated;
    upsert && upsert('articles', artForSupabase, {silent:true});
    // Separately sync fav field (silently fails if column not yet added)
    syncFav && syncFav(art.id, newFav);
  };

  useEffect(()=>{
    if (pendingModal !== null) { setModal(pendingModal); onPendingClear&&onPendingClear(); }
  // eslint-disable-next-line react-hooks/exhaustive-deps
  },[pendingModal]);

  useEffect(()=>{
    if (pendingStatusFilter !== null) { setStatusFilter(pendingStatusFilter); onPendingStatusFilterClear&&onPendingStatusFilterClear(); }
  // eslint-disable-next-line react-hooks/exhaustive-deps
  },[pendingStatusFilter]);

  useEffect(()=>{
    const h = () => setIsMobile(window.innerWidth<768);
    window.addEventListener('resize', h, {passive:true});
    return () => window.removeEventListener('resize', h);
  },[]);

  const toggleSort = (col) => setSort(s => s.col===col ? {col,dir:s.dir==='asc'?'desc':'asc'} : {col,dir:'asc'});
  const SortTh = ({col,children}) => (
    <th onClick={()=>toggleSort(col)} style={{cursor:'pointer',userSelect:'none',whiteSpace:'nowrap'}}>
      {children}{' '}
      <span style={{opacity:sort.col===col?1:.25,fontSize:10}}>
        {sort.col===col&&sort.dir==='desc'?'▼':'▲'}
      </span>
    </th>
  );

  const filtered = useMemo(()=>{
    const base = articles.filter(a=>{
      if (!showArchiv && a.archiv) return false;
      if (showFav && !a.fav) return false;
      if (statusFilter !== 'all') {
        const age = bestPriceAge(a, warnDays, alertDays);
        if (age !== statusFilter) return false;
      }
      if (lieferantFilter !== 'all' && (a.lief||'') !== lieferantFilter) return false;
      return !q || a.name.toLowerCase().includes(q.toLowerCase()) || (a.lief||'').toLowerCase().includes(q.toLowerCase());
    });
    const {col,dir} = sort;
    return [...base].sort((a,b)=>{
      let va, vb;
      if (col==='name')   { va=a.name.toLowerCase(); vb=b.name.toLowerCase(); }
      else if (col==='ek')     { va=a.ek; vb=b.ek; }
      else if (col==='ppu')    { va=pricePerUnit(a); vb=pricePerUnit(b); }
      else if (col==='lief')   { va=(a.lief||'').toLowerCase(); vb=(b.lief||'').toLowerCase(); }
      else if (col==='datum')  { va=a.datum||''; vb=b.datum||''; }
      else return 0;
      if (va<vb) return dir==='asc'?-1:1;
      if (va>vb) return dir==='asc'?1:-1;
      return 0;
    });
  }, [articles, q, showArchiv, showFav, statusFilter, lieferantFilter, warnDays, alertDays, sort]);

  const doSaveArt = (art) => {
    const existing = articles.find(a=>a.id===art.id);
    if (existing && existing.ek !== art.ek) {
      const entry = {id:'L'+uid(),datum:new Date().toISOString(),typ:'Preisänderung',
        produkt:art.name,altPreis:existing.ek,neuPreis:art.ek,quelle:'Manuell',status:'ok'};
      setPriceLog(prev=>[entry,...prev]);
      upsert&&upsert('price_log', entry, {silent:true});
      const impacts = computeImpact(art.id, art, articles, recipes);
      if (impacts.length) setImpactModal({
        title:`Preisauswirkung – ${art.name}`,
        subtitle:`${fmt(existing.ek)} → ${fmt(art.ek)} (${art.ek>existing.ek?'+':''}${((art.ek-existing.ek)/existing.ek*100).toFixed(1)}%)`,
        impacts
      });
    }
    setArticles(prev=>existing ? prev.map(a=>a.id===art.id?art:a) : [...prev,art]);
    upsert&&upsert('articles', art);
    setModal(null);
  };

  const saveArt = (art) => {
    const existing = articles.find(a=>a.id===art.id);
    if (art.archiv && existing && !existing.archiv) {
      const usedIn = vps.filter(vp=>!vp.archiv&&(vp.zutaten||[]).some(z=>z.art===art.id));
      if (usedIn.length) {
        setModal(null);
        setArchiveWarning({art, usedIn});
        return;
      }
    }
    doSaveArt(art);
  };

  if (isMobile) return (
    <div className="tab-content">
      <MobileArticleView articles={articles} warnDays={warnDays} alertDays={alertDays} onEdit={handleMobileEdit} onToggleFav={toggleFav}
        onNewArticle={()=>setModal({name:'',g:1,e:'KG',ek:0,lief:'',datum:'',archiv:false})}/>
      {quickEditArt&&<QuickPriceModal art={quickEditArt} onClose={()=>setQuickEditArt(null)}
        onSave={art=>{doSaveArt(art);setQuickEditArt(null);}}/>}
      {modal&&<ArticleModal art={modal} onSave={saveArt} onClose={()=>setModal(null)} suppliers={suppliers} onDelete={handleDeleteRequest}/>}
      {archiveWarning&&(
        <div className="modal-overlay">
          <div className="modal" style={{maxWidth:420}}>
            <div className="modal-header"><h3>Artikel wird in Vorprodukten verwendet</h3></div>
            <div className="modal-body">
              <div className="warn-banner"><span>⚠</span><div><strong>{archiveWarning.art.name}</strong> ist Zutat in {archiveWarning.usedIn.length} Vorprodukt{archiveWarning.usedIn.length>1?'en':''}:</div></div>
              <ul style={{margin:'12px 0 4px 16px',fontSize:13,lineHeight:2}}>{archiveWarning.usedIn.map(vp=><li key={vp.id}>{vp.name}</li>)}</ul>
              <div style={{fontSize:13,color:'#566373',marginTop:8}}>Trotzdem archivieren?</div>
            </div>
            <div className="modal-footer">
              <button className="btn btn-secondary" onClick={()=>setArchiveWarning(null)}>Abbrechen</button>
              <button className="btn btn-danger" onClick={()=>{doSaveArt(archiveWarning.art);setArchiveWarning(null);}}>Trotzdem archivieren</button>
            </div>
          </div>
        </div>
      )}
      {deleteConfirm&&(
        <div className="modal-overlay" onClick={()=>setDeleteConfirm(null)}>
          <div className="modal" style={{maxWidth:380}} onClick={e=>e.stopPropagation()}>
            <div className="modal-header"><h3>Artikel löschen?</h3><button className="btn btn-ghost" onClick={()=>setDeleteConfirm(null)}>✕</button></div>
            <div className="modal-body" style={{fontSize:13,color:'#374151',lineHeight:1.7}}><strong>{deleteConfirm.name}</strong> wird dauerhaft gelöscht.</div>
            <div className="modal-footer">
              <button className="btn btn-secondary" onClick={()=>setDeleteConfirm(null)}>Abbrechen</button>
              <button className="btn btn-danger" onClick={()=>doDelete(deleteConfirm)}>Löschen</button>
            </div>
          </div>
        </div>
      )}
      {impactModal&&<ImpactModal {...impactModal} onClose={()=>setImpactModal(null)}/>}
    </div>
  );

  return (
    <div className="tab-content">
      <div className="stats-row">
        <div className="stat-card">
          <div className="stat-label">Artikel aktiv</div>
          <div className="stat-value">{articles.filter(a=>!a.archiv).length}</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">Archiviert</div>
          <div className="stat-value" style={{color:'#5e6e7f'}}>{articles.filter(a=>a.archiv).length}</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">Lieferanten</div>
          <div className="stat-value">{new Set(articles.filter(a=>!a.archiv&&a.lief).map(a=>a.lief.toUpperCase())).size}</div>
        </div>
        <div className="stat-card" style={{cursor:'pointer',outline:statusFilter==='red'?'2px solid #dc2626':'none',outlineOffset:2}} onClick={()=>setStatusFilter(s=>s==='red'?'all':'red')}>
          <div className="stat-label">Preis veraltet (rot)</div>
          <div className="stat-value" style={{color:'#dc2626'}}>
            {articles.filter(a=>!a.archiv&&bestPriceAge(a,warnDays,alertDays)==='red').length}
          </div>
          {statusFilter==='red'&&<div style={{fontSize:10,color:'#dc2626',marginTop:2,fontWeight:600}}>● Filter aktiv</div>}
        </div>
      </div>
      <div className="toolbar">
        <input className="search" placeholder="Suche Artikel oder Lieferant…" value={q} onChange={e=>setQ(e.target.value)}/>
        <button onClick={()=>setShowFav(s=>!s)} style={{padding:'6px 12px',borderRadius:6,border:'1px solid',fontSize:13,cursor:'pointer',fontWeight:600,transition:'all .15s',borderColor:showFav?'#f59e0b':'#e2e8f0',background:showFav?'#fffbeb':'white',color:showFav?'#d97706':'#5e6e7f'}}>
          ★ Favoriten
        </button>
        <label style={{display:'flex',alignItems:'center',gap:6,fontSize:13,cursor:'pointer'}}>
          <span className="switch"><input type="checkbox" checked={showArchiv} onChange={e=>setShowArchiv(e.target.checked)}/><span className="slider"></span></span>
          Archiv
        </label>
        <button className="btn btn-primary" style={{marginLeft:'auto'}} onClick={()=>setModal({name:'',g:1,e:'KG',ek:0,lief:'',datum:'',archiv:false})}>
          + Artikel
        </button>
      </div>
      <div className="card">
        <table>
          <thead><tr>
            <th style={{width:32}}></th>
            <SortTh col="name">Name</SortTh>
            <th>Größe</th>
            <SortTh col="ek">EK Netto</SortTh>
            <SortTh col="ppu">EK/Einheit</SortTh>
            <th style={{padding:'9px 12px'}}>
              <select value={lieferantFilter} onChange={e=>setLieferantFilter(e.target.value)} style={{background:'transparent',border:'none',outline:'none',fontWeight:600,fontSize:11,color:lieferantFilter!=='all'?'#e85d04':'#566373',textTransform:'uppercase',letterSpacing:'.5px',cursor:'pointer',padding:0,appearance:'none',WebkitAppearance:'none'}}>
                <option value="all">Lieferant{lieferantFilter!=='all'?` ▼`:' ▲'}</option>
                {[...new Set(articles.filter(a=>!a.archiv&&a.lief).map(a=>a.lief))].sort().map(l=><option key={l} value={l}>{l}</option>)}
              </select>
            </th>
            <SortTh col="datum">Preisdatum</SortTh>
            <th style={{padding:'9px 12px'}}>
              <select value={statusFilter} onChange={e=>setStatusFilter(e.target.value)} style={{background:'transparent',border:'none',outline:'none',fontWeight:600,fontSize:11,color:statusFilter==='red'?'#dc2626':statusFilter==='yellow'?'#d97706':statusFilter==='green'?'#16a34a':'#566373',textTransform:'uppercase',letterSpacing:'.5px',cursor:'pointer',padding:0,appearance:'none',WebkitAppearance:'none'}}>
                <option value="all">Status{statusFilter==='all'?' ▲':' ▼'}</option>
                <option value="red">Veraltet</option>
                <option value="yellow">&gt;3 Mon.</option>
                <option value="green">Aktuell</option>
              </select>
            </th><th></th>
          </tr></thead>
          <tbody>
          {filtered.map(a=>{
            const ppu = pricePerUnit(a);
            const age = bestPriceAge(a, warnDays, alertDays);
            const suppliers = allSuppliers(a);
            const hasVariants = (a.varianten||[]).length > 0;
            const ppuMin = hasVariants ? Math.min(...suppliers.map(s=>s.ek/(a.g||1))) : ppu;
            const ppuMax = hasVariants ? Math.max(...suppliers.map(s=>s.ek/(a.g||1))) : ppu;
            return (
              <tr key={a.id} style={{...(a.archiv?{opacity:.5}:{}),cursor:'pointer'}} onClick={()=>setModal({...a})}>
                <td style={{padding:'4px 6px',textAlign:'center'}} onClick={e=>e.stopPropagation()}>
                  <button onClick={()=>toggleFav(a)} style={{background:'none',border:'none',cursor:'pointer',fontSize:16,lineHeight:1,color:a.fav?'#f59e0b':'#d1d5db',padding:2}} title={a.fav?'Aus Favoriten entfernen':'Zu Favoriten hinzufügen'}>
                    {a.fav?'★':'☆'}
                  </button>
                </td>
                <td><strong>{a.name}</strong></td>
                <td style={{color:'#566373'}}>{a.g} {a.e}</td>
                <td>{fmt(a.ek)}</td>
                <td style={{fontFamily:'monospace'}}>
                  {hasVariants
                    ? <span>{fmt(ppuMin)}–{fmt(ppuMax)}<span style={{color:'#5e6e7f'}}>/{a.e}</span></span>
                    : <span>{fmt(ppu)}<span style={{color:'#5e6e7f'}}>/{a.e}</span></span>}
                </td>
                <td>
                  {hasVariants
                    ? <span title={suppliers.map(s=>`${s.lief}: ${fmt(s.ek)}`).join('\n')}
                        className="badge badge-blue" style={{cursor:'default'}}>
                        {suppliers.length}× Lieferanten
                      </span>
                    : <span className="badge badge-gray">{a.lief||'—'}</span>}
                </td>
                <td>
                  {a.datum ? <span style={{color: age==='red'?'#dc2626':age==='yellow'?'#d97706':'#374151', fontSize:12}}>
                    {a.datum}
                  </span> : <span style={{color:'#5e6e7f',fontSize:12}}>—</span>}
                </td>
                <td>
                  {a.archiv ? <span className="badge badge-gray">Archiv</span> :
                    age === 'red' ? <span className="ampel red"><span className="dot"/>veraltet</span> :
                    age === 'yellow' ? <span className="ampel yellow"><span className="dot"/>&gt;3 Mon.</span> :
                    <span className="ampel green"><span className="dot"/>aktuell</span>
                  }
                </td>
                <td style={{display:'flex',gap:2}} onClick={e=>e.stopPropagation()}>
                  <button className="btn btn-ghost btn-xs" onClick={()=>setModal({...a})} title="Bearbeiten">✎</button>
                  <button className="btn btn-ghost btn-xs" onClick={()=>setModal({...a,id:undefined,name:a.name+' (Kopie)',kat:getKat(a)})} title="Duplizieren" style={{color:'#94a3b8',fontSize:15}}>⎘</button>
                </td>
              </tr>
            );
          })}
          {filtered.length===0&&<tr><td colSpan={9}><div className="empty">Keine Artikel gefunden</div></td></tr>}
          </tbody>
        </table>
      </div>
      {modal && <ArticleModal art={modal} onSave={saveArt} onClose={()=>setModal(null)} suppliers={suppliers} onDelete={handleDeleteRequest}/>}
      {archiveWarning&&(
        <div className="modal-overlay">
          <div className="modal" style={{maxWidth:420}}>
            <div className="modal-header">
              <h3>Artikel wird in Vorprodukten verwendet</h3>
            </div>
            <div className="modal-body">
              <div className="warn-banner">
                <span>⚠</span>
                <div><strong>{archiveWarning.art.name}</strong> ist Zutat in {archiveWarning.usedIn.length} aktivem Vorprodukt{archiveWarning.usedIn.length>1?'en':''}:</div>
              </div>
              <ul style={{margin:'12px 0 4px 16px',fontSize:13,lineHeight:2}}>
                {archiveWarning.usedIn.map(vp=><li key={vp.id}>{vp.name}</li>)}
              </ul>
              <div style={{fontSize:13,color:'#566373',marginTop:8}}>Trotzdem archivieren? Die Vorprodukt-Kalkulation bleibt vorerst bestehen.</div>
            </div>
            <div className="modal-footer">
              <button className="btn btn-secondary" onClick={()=>setArchiveWarning(null)}>Abbrechen</button>
              <button className="btn btn-danger" onClick={()=>{doSaveArt(archiveWarning.art);setArchiveWarning(null);}}>Trotzdem archivieren</button>
            </div>
          </div>
        </div>
      )}
      {deleteWarning&&(
        <div className="modal-overlay" onClick={()=>setDeleteWarning(null)}>
          <div className="modal" style={{maxWidth:460}} onClick={e=>e.stopPropagation()}>
            <div className="modal-header">
              <h3>Artikel kann nicht gelöscht werden</h3>
              <button className="btn btn-ghost" onClick={()=>setDeleteWarning(null)}>✕</button>
            </div>
            <div className="modal-body">
              <div className="warn-banner">
                <span>⚠</span>
                <div><strong>{deleteWarning.art.name}</strong> wird noch in aktiven Rezepten oder Vorprodukten verwendet. Bitte dort zuerst entfernen.</div>
              </div>
              {deleteWarning.usedInRecipes.length>0&&(
                <div style={{marginTop:14}}>
                  <div style={{fontSize:11,fontWeight:600,color:'#566373',textTransform:'uppercase',letterSpacing:'.3px',marginBottom:6}}>Rezepte</div>
                  {deleteWarning.usedInRecipes.map(r=>(
                    <button key={r.id} onClick={()=>{setDeleteWarning(null);onNavigateToRecipe&&onNavigateToRecipe(r);}}
                      style={{display:'block',width:'100%',textAlign:'left',padding:'7px 12px',background:'#f8fafc',border:'1px solid #e2e8f0',borderRadius:6,fontSize:13,cursor:'pointer',marginBottom:4,color:'#3b82f6',fontWeight:500}}>
                      → {r.name}
                    </button>
                  ))}
                </div>
              )}
              {deleteWarning.usedInVPs.length>0&&(
                <div style={{marginTop:14}}>
                  <div style={{fontSize:11,fontWeight:600,color:'#566373',textTransform:'uppercase',letterSpacing:'.3px',marginBottom:6}}>Vorprodukte</div>
                  {deleteWarning.usedInVPs.map(vp=>(
                    <button key={vp.id} onClick={()=>{setDeleteWarning(null);onNavigateToVP&&onNavigateToVP(vp);}}
                      style={{display:'block',width:'100%',textAlign:'left',padding:'7px 12px',background:'#f8fafc',border:'1px solid #e2e8f0',borderRadius:6,fontSize:13,cursor:'pointer',marginBottom:4,color:'#e85d04',fontWeight:500}}>
                      → {vp.name}
                    </button>
                  ))}
                </div>
              )}
            </div>
            <div className="modal-footer">
              <button className="btn btn-secondary" onClick={()=>setDeleteWarning(null)}>Schließen</button>
            </div>
          </div>
        </div>
      )}
      {deleteConfirm&&(
        <div className="modal-overlay" onClick={()=>setDeleteConfirm(null)}>
          <div className="modal" style={{maxWidth:380}} onClick={e=>e.stopPropagation()}>
            <div className="modal-header">
              <h3>Artikel löschen?</h3>
              <button className="btn btn-ghost" onClick={()=>setDeleteConfirm(null)}>✕</button>
            </div>
            <div className="modal-body" style={{fontSize:13,color:'#374151',lineHeight:1.7}}>
              <strong>{deleteConfirm.name}</strong> wird dauerhaft gelöscht. Diese Aktion kann nicht rückgängig gemacht werden.
            </div>
            <div className="modal-footer">
              <button className="btn btn-secondary" onClick={()=>setDeleteConfirm(null)}>Abbrechen</button>
              <button className="btn btn-danger" onClick={()=>doDelete(deleteConfirm)}>Löschen</button>
            </div>
          </div>
        </div>
      )}
      {impactModal&&<ImpactModal {...impactModal} onClose={()=>setImpactModal(null)}/>}
    </div>
  );
}

// ── RECIPE TAB ────────────────────────────────────────────────────────────────

function RecipeModal({recipe, onSave, onClose, articles=[], templates=[], deliveryRate=30}) {
  const isNew = !recipe.id;
  const [form, setForm] = useState({
    name:'', vkBrutto:0, vkUber:'', weEuro:0, mwst:7, anzahl:'', brot:'', archiv:false, zutaten:[], kategorie:'Sandwiches', ...recipe,
  });
  const f = (k,v) => setForm(p=>({...p,[k]:v}));

  const activeArts = useMemo(()=>articles.filter(a=>!a.archiv).sort((a,b)=>a.name.localeCompare(b.name,'de')),[articles]);

  const setZutat = (i,k,v) => f('zutaten', form.zutaten.map((z,j)=>j===i?{...z,[k]:v}:z));
  const addZutat = () => f('zutaten', [...form.zutaten, {art:'',name:'',menge:0,einheit:'St'}]);
  const delZutat = (i) => f('zutaten', form.zutaten.filter((_,j)=>j!==i));

  const computedWE = useMemo(()=>{
    if (!form.zutaten.length) return null;
    return form.zutaten.reduce((sum,z)=>{
      const art = articles.find(a=>a.id===z.art);
      if (!art || !z.menge) return sum;
      return sum + pricePerUnit(art, z.variantLief) * z.menge * toBaseMultiplier(z.einheit);
    }, 0);
  }, [form.zutaten, articles]);

  const weEuro = computedWE !== null ? computedWE : (parseFloat(form.weEuro)||0);
  const mwstFactor = 1 + form.mwst/100;
  const vkNetto = form.vkBrutto > 0 ? form.vkBrutto / mwstFactor : 0;
  const wePct = vkNetto > 0 ? (weEuro / vkNetto * 100) : 0;
  const dbNetto = vkNetto - weEuro;
  const suggestedDeliveryVK = form.vkBrutto > 0 ? form.vkBrutto / (1 - deliveryRate/100) : 0;

  const save = () => onSave({
    ...form,
    id: form.id || ('R'+uid()),
    vkBrutto: parseFloat(form.vkBrutto)||0,
    vkUber: form.vkUber ? parseFloat(form.vkUber) : null,
    weEuro: parseFloat(weEuro.toFixed(4)),
    wePct: parseFloat(wePct.toFixed(2)),
    dbNetto: parseFloat(dbNetto.toFixed(4)),
    mwst: parseInt(form.mwst),
    anzahl: form.anzahl ? parseInt(form.anzahl) : null,
    zutaten: form.zutaten,
  });

  return (
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal modal-lg">
        <div className="modal-header">
          <h3>{isNew?'Neues Rezept':'Rezept bearbeiten'}</h3>
          <button className="btn btn-ghost" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          <div className="form-grid">
            <div className="form-row"><label>Name *</label>
              <input type="text" value={form.name} onChange={e=>f('name',e.target.value)} placeholder="Rezeptname"/>
            </div>
            <div className="form-row"><label>Kategorie</label>
              <select value={form.kategorie||'Sandwiches'} onChange={e=>f('kategorie',e.target.value)}>
                <option value="Sandwiches">🥪 Sandwiches</option>
                <option value="Getränke">☕ Getränke</option>
                <option value="Weitere">Weitere</option>
              </select>
            </div>
          </div>
          <div className="form-grid">
            <div className="form-row"><label>VK Brutto Instore</label>
              <input type="number" value={form.vkBrutto||''} onChange={e=>f('vkBrutto',e.target.value)} step="0.10" placeholder="0,00"/>
            </div>
            <div className="form-row"><label>VK Brutto Uber (optional)</label>
              <input type="number" value={form.vkUber||''} onChange={e=>f('vkUber',e.target.value)} step="0.10" placeholder="—"/>
            </div>
          </div>
          <div className="form-grid">
            <div className="form-row"><label>MwSt.</label>
              <select value={form.mwst} onChange={e=>f('mwst',e.target.value)}>
                <option value={7}>7 % (To-Go / Lebensmittel)</option>
                <option value={19}>19 % (Inhouse)</option>
              </select>
            </div>
            <div className="form-row"><label>Stückzahl / Woche</label>
              <input type="number" value={form.anzahl||''} onChange={e=>f('anzahl',e.target.value)} placeholder="—"/>
            </div>
          </div>

          {/* ── Zutaten ── */}
          <div className="section-title" style={{marginTop:8}}>Zutaten <span style={{fontSize:11,color:'#5e6e7f',fontWeight:400,textTransform:'none'}}>(optional — WE wird dann automatisch berechnet)</span></div>
          <div style={{background:'#f8fafc',border:'1px solid #e2e8f0',borderRadius:6,padding:12,marginBottom:14}}>
            {form.zutaten.length > 0 && (
              <div style={{display:'grid',gridTemplateColumns:'2fr 1fr 80px 60px 65px auto',gap:8,marginBottom:8,fontSize:11,fontWeight:600,color:'#566373',textTransform:'uppercase'}}>
                <span>Artikel</span><span>Lieferant</span><span>Menge</span><span>Einheit</span><span style={{textAlign:'right'}}>€</span><span></span>
              </div>
            )}
            {form.zutaten.map((z,i)=>{
              const art = articles.find(a=>a.id===z.art);
              const sups = art ? allSuppliers(art) : [];
              const hasVariants = sups.length > 1;
              const activePpu = art ? pricePerUnit(art, z.variantLief) : 0;
              const defaultPpu = art ? pricePerUnit(art) : 0;
              const zeilKosten = art ? activePpu * z.menge * toBaseMultiplier(z.einheit) : null;
              const saving = (hasVariants && z.variantLief && z.variantLief !== art.lief)
                ? ((activePpu - defaultPpu) / defaultPpu * 100) : null;
              const cheapest = hasVariants ? sups.reduce((m,s)=>{
                const p=s.ek/(art.g||1); return p<m.ppu?{lief:s.lief,ppu:p}:m;
              },{lief:sups[0].lief,ppu:sups[0].ek/(art.g||1)}) : null;
              const cheaperAvailable = cheapest && cheapest.ppu < activePpu - 0.001
                ? {lief:cheapest.lief, ppu:cheapest.ppu, savPct:(activePpu-cheapest.ppu)/activePpu*100} : null;
              return (
                <div key={i} style={{marginBottom:6}}>
                  <div style={{display:'grid',gridTemplateColumns:'2fr 1fr 80px 50px 65px auto',gap:8,alignItems:'center'}}>
                    <select value={z.art||''} onChange={e=>{
                      const a2 = articles.find(a=>a.id===e.target.value);
                      f('zutaten', form.zutaten.map((z2,j)=>j!==i ? z2 : {
                        ...z2, art:e.target.value,
                        ...(a2?{name:a2.name,einheit:defaultIngUnit(a2.e),variantLief:''}:{})
                      }));
                    }} style={{fontSize:12}}>
                      <option value="">— Artikel wählen —</option>
                      {['Food','Bev','Nonfood'].map(cat=>{
                        const grp = activeArts.filter(a=>getKat(a)===cat);
                        return grp.length ? <optgroup key={cat} label={cat}>{grp.map(a=><option key={a.id} value={a.id}>{a.name}</option>)}</optgroup> : null;
                      })}
                    </select>
                    {hasVariants ? (
                      <select value={z.variantLief||art.lief} onChange={e=>setZutat(i,'variantLief',e.target.value)} style={{fontSize:12,borderColor:'#a5b4fc'}}>
                        {sups.map((s,si)=>(
                          <option key={si} value={s.lief}>{s.lief||'—'} ({fmt(s.ek/(art.g||1))}/{art.e}){s.isDefault?' ★':''}</option>
                        ))}
                      </select>
                    ) : (
                      <span style={{fontSize:12,color:'#5e6e7f',padding:'5px 0'}}>{art?.lief||'—'}</span>
                    )}
                    <input type="number" value={z.menge||''} step="0.001"
                      onChange={e=>setZutat(i,'menge',parseFloat(e.target.value)||0)}
                      style={{fontSize:12,padding:'5px 8px'}}/>
                    {(()=>{const uOpts=getIngUnits(art?.e);const allU=uOpts.includes(z.einheit)?uOpts:[z.einheit,...uOpts].filter(Boolean);return<select value={z.einheit||''} onChange={e=>setZutat(i,'einheit',e.target.value)} style={{fontSize:12,padding:'3px 4px',width:'100%'}}>{allU.map(u=><option key={u} value={u}>{u}</option>)}</select>;})()}
                    <div style={{textAlign:'right',fontSize:12,fontWeight:600,color:zeilKosten>0?'#374151':'#5e6e7f',fontFamily:'monospace',whiteSpace:'nowrap'}}>
                      {zeilKosten!=null&&zeilKosten>0 ? fmt(zeilKosten) : '—'}
                    </div>
                    <button className="btn btn-danger btn-xs" onClick={()=>delZutat(i)}>✕</button>
                  </div>
                  {saving !== null && (
                    <div style={{fontSize:11,color:saving<0?'#16a34a':'#dc2626',paddingLeft:4,marginTop:2}}>
                      {saving<0?'▼ Einsparung':'▲ Aufpreis'} {Math.abs(saving).toFixed(1)}% vs. Standard ({fmt(defaultPpu)}/{art.e})
                      {' · '}{fmt(activePpu*z.menge*toBaseMultiplier(z.einheit))} statt {fmt(defaultPpu*z.menge*toBaseMultiplier(z.einheit))}
                    </div>
                  )}
                  {cheaperAvailable && !saving && (
                    <div style={{fontSize:11,color:'#16a34a',paddingLeft:4,marginTop:2}}>
                      ▼ {cheaperAvailable.savPct.toFixed(1)}% günstiger bei <strong>{cheaperAvailable.lief}</strong>: {fmt(cheaperAvailable.ppu)}/{art.e}
                    </div>
                  )}
                </div>
              );
            })}
            <div style={{display:'flex',gap:6,marginTop:6,alignItems:'center',flexWrap:'wrap'}}>
              {templates.length > 0 && <span style={{fontSize:11,color:'#5e6e7f'}}>Vorlage:</span>}
              {templates.map(tpl=>(
                <button key={tpl.id} className="btn btn-secondary btn-xs" onClick={()=>f('zutaten',[...form.zutaten,...tpl.zutaten])}>
                  + {tpl.name}
                </button>
              ))}
              <button className="btn btn-secondary btn-sm" style={{marginLeft:'auto'}} onClick={addZutat}>+ Zutat</button>
            </div>
          </div>

          {/* ── WE manuell (nur wenn keine Zutaten) ── */}
          {computedWE === null && (
            <div className="form-row"><label>Wareneinsatz € <span style={{color:'#5e6e7f',fontWeight:400,textTransform:'none'}}>(manuell)</span></label>
              <input type="number" value={form.weEuro||''} onChange={e=>f('weEuro',e.target.value)} step="0.01" placeholder="0,00"/>
            </div>
          )}

          {/* ── Kennzahlen ── */}
          {form.vkBrutto > 0 && (
            <div style={{background:'#1a1a1a',color:'white',borderRadius:8,padding:'14px 16px',display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr 1fr',gap:10,textAlign:'center',marginTop:4}}>
              <div>
                <div style={{fontSize:10,color:'#5e6e7f',marginBottom:4}}>WE €{computedWE!==null&&<span style={{color:'#fb923c'}}> ⟳ auto</span>}</div>
                <div style={{fontSize:17,fontWeight:700}}>{fmt(weEuro)}</div>
              </div>
              <div>
                <div style={{fontSize:10,color:'#5e6e7f',marginBottom:4}}>WE %</div>
                <div style={{fontSize:19,fontWeight:700,color:wePct<=28?'#4ade80':wePct<=38?'#fb923c':'#f87171'}}>{wePct.toFixed(1)}%</div>
              </div>
              <div>
                <div style={{fontSize:10,color:'#5e6e7f',marginBottom:4}}>DB Netto</div>
                <div style={{fontSize:19,fontWeight:700}}>{fmt(dbNetto)}</div>
              </div>
              <div>
                <div style={{fontSize:10,color:'#5e6e7f',marginBottom:4}}>VK Netto</div>
                <div style={{fontSize:17,fontWeight:700}}>{fmt(vkNetto)}</div>
              </div>
              <div style={{background:'#f5f3ff',border:'1px solid #ddd6fe',borderRadius:5,padding:'5px 8px'}}>
                <div style={{fontSize:10,color:'#6d28d9',marginBottom:4}}>Delivery VK</div>
                <div style={{fontSize:17,fontWeight:700,color:'#5b21b6'}}>{fmt(suggestedDeliveryVK)}</div>
                <div style={{fontSize:9,color:'#7c3aed',marginTop:2}}>{deliveryRate}% Provision</div>
              </div>
            </div>
          )}
        </div>
        {!isNew&&<div style={{padding:'0 20px 12px'}}>
          <label style={{display:'flex',alignItems:'center',gap:8,fontSize:13,cursor:'pointer'}}>
            <input type="checkbox" checked={form.archiv||false} onChange={e=>f('archiv',e.target.checked)} style={{width:'auto'}}/>
            Archiviert
          </label>
        </div>}
        <div className="modal-footer">
          <button className="btn btn-secondary" onClick={onClose}>Abbrechen</button>
          <button className="btn btn-primary" disabled={!form.name.trim()||!form.vkBrutto} onClick={save}>Speichern</button>
        </div>
      </div>
    </div>
  );
}

function RecipeTab({recipes, setRecipes, pendingModal=null, onPendingClear, upsert, del, articles=[], templates=[], deliveryRate=30}) {
  const [detail, setDetail] = useState(null);
  const [modal, setModal] = useState(null);
  const [showArchiv, setShowArchiv] = useState(false);

  useEffect(()=>{
    if (pendingModal !== null) { setModal(pendingModal); onPendingClear&&onPendingClear(); }
  // eslint-disable-next-line react-hooks/exhaustive-deps
  },[pendingModal]);

  const saveRecipe = (r) => {
    setRecipes(prev=>prev.find(x=>x.id===r.id)?prev.map(x=>x.id===r.id?r:x):[...prev,r]);
    upsert&&upsert('recipes',r);
    setModal(null);
  };
  const deleteRecipe = (id) => {
    setRecipes(prev=>prev.filter(r=>r.id!==id));
    del&&del('recipes', id);
    setDetail(null);
  };

  const visibleRecipes = recipes.filter(r=>showArchiv||!r.archiv);
  const getKat = r => (r.kategorie==='Sandwich'?'Sandwiches':r.kategorie) ||
    (['R001','R002','R003','R004','R005','R006','R007','R008'].includes(r.id) ? 'Sandwiches' :
     ['R009','R010','R011','R012','R013'].includes(r.id) ? 'Getränke' : 'Weitere');
  const KAT_LABELS = {Sandwiches:'🥪 Sandwiches', Getränke:'☕ Getränke', Weitere:'Weitere Rezepte'};
  const usedKats = [...new Set(visibleRecipes.map(getKat))];
  const katOrder = ['Sandwiches','Getränke',...usedKats.filter(k=>k!=='Sandwiches'&&k!=='Getränke')];
  const cats = katOrder.filter(k=>usedKats.includes(k)).map(k=>({label:KAT_LABELS[k]||k, kat:k}));

  return (
    <div className="tab-content">
      <div className="stats-row">
        {[{label:'Rezepte aktiv',v:recipes.filter(r=>!r.archiv).length,c:''},
          {label:'Marge OK (≤28%)',v:recipes.filter(r=>!r.archiv&&r.wePct<=28).length,c:'#16a34a'},
          {label:'Marge Warn. (28–38%)',v:recipes.filter(r=>!r.archiv&&r.wePct>28&&r.wePct<=38).length,c:'#d97706'},
          {label:'Marge Alarm (>38%)',v:recipes.filter(r=>!r.archiv&&r.wePct>38).length,c:'#dc2626'},
        ].map(s=>(
          <div className="stat-card" key={s.label}>
            <div className="stat-label">{s.label}</div>
            <div className="stat-value" style={s.c?{color:s.c}:{}}>{s.v}</div>
          </div>
        ))}
      </div>
      <div className="toolbar">
        <label style={{display:'flex',alignItems:'center',gap:6,fontSize:13,cursor:'pointer'}}>
          <span className="switch"><input type="checkbox" checked={showArchiv} onChange={e=>setShowArchiv(e.target.checked)}/><span className="slider"></span></span>
          Archiv
        </label>
        <button className="btn btn-primary" style={{marginLeft:'auto'}} onClick={()=>setModal({})}>+ Neues Rezept</button>
      </div>
      {cats.map(cat=>{
        const recs = visibleRecipes.filter(r=>getKat(r)===cat.kat);
        if(!recs.length) return null;
        return (
          <div key={cat.label} style={{marginBottom:20}}>
            <div className="section-title">{cat.label}</div>
            <div className="card">
              <table>
                <thead><tr>
                  <th>Rezept</th><th>VK Instore</th><th>VK Uber</th>
                  <th>WE €</th><th>WE %</th><th>DB Netto</th><th>MwSt</th><th>Marge</th><th></th>
                </tr></thead>
                <tbody>
                {recs.map(r=>{
                  const a = ampelWE(r.wePct);
                  return (
                    <tr key={r.id} style={r.archiv?{opacity:.45}:{}}>
                      <td><strong style={{cursor:'pointer',textDecoration:'underline',textDecorationColor:'#e2e8f0'}} onClick={()=>setDetail(r)}>{r.name}</strong></td>
                      <td>{fmt(r.vkBrutto)}</td>
                      <td>{r.vkUber ? fmt(r.vkUber) : <span style={{color:'#5e6e7f'}}>—</span>}</td>
                      <td>{fmt(r.weEuro)}</td>
                      <td style={{fontFamily:'monospace'}}>{fmtPct(r.wePct)}</td>
                      <td style={{fontFamily:'monospace',fontWeight:600}}>{fmt(r.dbNetto)}</td>
                      <td><span className="badge badge-gray">{r.mwst}%</span></td>
                      <td>
                        <span className={`ampel ${a}`}><span className="dot"/>
                          {a==='green'?'OK':a==='yellow'?'Warn.':'Alarm'}
                        </span>
                      </td>
                      <td style={{whiteSpace:'nowrap',display:'flex',gap:2}}>
                        <button className="btn btn-ghost btn-xs" onClick={()=>setModal(r)} title="Bearbeiten">✎</button>
                        <button className="btn btn-ghost btn-xs" onClick={()=>setModal({...r,id:undefined,name:r.name+' (Kopie)'})} title="Duplizieren" style={{color:'#94a3b8',fontSize:15}}>⎘</button>
                      </td>
                    </tr>
                  );
                })}
                </tbody>
              </table>
            </div>
          </div>
        );
      })}
      {detail && (
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setDetail(null)}>
          <div className="modal">
            <div className="modal-header">
              <h3>{detail.name}</h3>
              <button className="btn btn-ghost" onClick={()=>setDetail(null)}>✕</button>
            </div>
            <div className="modal-body">
              <div className="form-grid" style={{marginBottom:16}}>
                {[['VK Instore',fmt(detail.vkBrutto)],
                  ['VK Uber',detail.vkUber?fmt(detail.vkUber):'—'],
                  ['Wareneinsatz',fmt(detail.weEuro)+' ('+fmtPct(detail.wePct)+')'],
                  ['DB Netto',fmt(detail.dbNetto)],
                  ['MwSt.',detail.mwst+'%'],
                  ['Brot',detail.brot||'—'],
                ].map(([k,v])=>(
                  <div key={k} style={{background:'#f8fafc',borderRadius:6,padding:'10px 12px'}}>
                    <div style={{fontSize:11,color:'#566373',fontWeight:600,textTransform:'uppercase'}}>{k}</div>
                    <div style={{fontSize:15,fontWeight:600,marginTop:2}}>{v}</div>
                  </div>
                ))}
              </div>
              <div className={`ampel ${ampelWE(detail.wePct)}`} style={{fontSize:14,padding:'10px 14px',background:'#f8fafc',borderRadius:6,display:'flex'}}>
                <span className="dot" style={{width:12,height:12}}/>
                Wareneinsatz {fmtPct(detail.wePct)} —
                {ampelWE(detail.wePct)==='green'?' Marge in Ordnung':
                 ampelWE(detail.wePct)==='yellow'?' Marge grenzwertig':
                 ' Marge kritisch — prüfen!'}
              </div>
              <div style={{marginTop:16,padding:'10px 14px',background:'#f0fdf4',border:'1px solid #bbf7d0',borderRadius:6,fontSize:13,color:'#166534'}}>
                <strong>VK-Empfehlung bei Ziel-WE 28%:</strong> {fmt(detail.weEuro/0.28 * (detail.mwst===19?1.19:1.07))}
                {' '}| bei 32%: {fmt(detail.weEuro/0.32 * (detail.mwst===19?1.19:1.07))}
              </div>
              {(detail.zutaten||[]).length > 0 && (
                <div style={{marginTop:16}}>
                  <div style={{fontSize:12,fontWeight:600,color:'#566373',textTransform:'uppercase',letterSpacing:'.3px',marginBottom:8}}>Zutaten</div>
                  <div style={{border:'1px solid #e2e8f0',borderRadius:6,overflow:'hidden'}}>
                    <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
                      <thead><tr style={{background:'#f8fafc'}}>
                        <th style={{padding:'6px 10px',textAlign:'left',fontWeight:600,color:'#566373'}}>Artikel</th>
                        <th style={{padding:'6px 10px',textAlign:'right',fontWeight:600,color:'#566373'}}>Menge</th>
                        <th style={{padding:'6px 10px',textAlign:'right',fontWeight:600,color:'#566373'}}>Kosten</th>
                      </tr></thead>
                      <tbody>
                        {detail.zutaten.map((z,i)=>{
                          const art = articles.find(a=>a.id===z.art);
                          const kosten = art ? pricePerUnit(art, z.variantLief)*z.menge*toBaseMultiplier(z.einheit) : null;
                          return (
                            <tr key={i} style={{borderTop:'1px solid #f1f5f9'}}>
                              <td style={{padding:'6px 10px'}}>{z.name||z.art||'—'}{z.variantLief&&z.variantLief!==art?.lief&&<span style={{color:'#5e6e7f',marginLeft:4}}>({z.variantLief})</span>}</td>
                              <td style={{padding:'6px 10px',textAlign:'right',fontFamily:'monospace'}}>{z.menge} {z.einheit}</td>
                              <td style={{padding:'6px 10px',textAlign:'right',fontFamily:'monospace',fontWeight:600}}>{kosten!=null?fmt(kosten):'—'}</td>
                            </tr>
                          );
                        })}
                        <tr style={{borderTop:'2px solid #e2e8f0',background:'#f8fafc'}}>
                          <td colSpan={2} style={{padding:'7px 10px',fontWeight:600,fontSize:12}}>Wareneinsatz gesamt</td>
                          <td style={{padding:'7px 10px',textAlign:'right',fontFamily:'monospace',fontWeight:700,color:'#e85d04'}}>{fmt(detail.weEuro)}</td>
                        </tr>
                      </tbody>
                    </table>
                  </div>
                </div>
              )}
            </div>
            <div className="modal-footer">
              <button className="btn btn-danger btn-sm" style={{marginRight:'auto'}} onClick={()=>deleteRecipe(detail.id)}>Löschen</button>
              <button className="btn btn-secondary" onClick={()=>setDetail(null)}>Schließen</button>
              <button className="btn btn-primary" onClick={()=>{setModal(detail);setDetail(null);}}>Bearbeiten</button>
            </div>
          </div>
        </div>
      )}
      {modal!==null&&<RecipeModal recipe={modal} onSave={saveRecipe} onClose={()=>setModal(null)} articles={articles} templates={templates} deliveryRate={deliveryRate}/>}
    </div>
  );
}

// ── VP TAB ────────────────────────────────────────────────────────────────────

function VPModal({vp, articles, onSave, onClose}) {
  const isNew = !vp.id;
  const [form, setForm] = useState({
    name: vp.name||'',
    outputKg: vp.outputKg||0,
    zutaten: vp.zutaten||[],
    archiv: vp.archiv||false,
  });
  const f = (k,v) => setForm(p=>({...p,[k]:v}));

  const activeArts = useMemo(()=>articles.filter(a=>!a.archiv).sort((a,b)=>a.name.localeCompare(b.name)),[articles]);

  const setZutat = (i,k,v) => f('zutaten',form.zutaten.map((z,j)=>j===i?{...z,[k]:v}:z));
  const addZutat = () => f('zutaten',[...form.zutaten,{art:'',name:'',menge:0,einheit:'kg'}]);
  const delZutat = (i) => f('zutaten',form.zutaten.filter((_,j)=>j!==i));

  const kosten = useMemo(()=>{
    return form.zutaten.reduce((sum,z)=>{
      const art = articles.find(a=>a.id===z.art);
      if (!art) return sum;
      return sum + pricePerUnit(art, z.variantLief)*z.menge*toBaseMultiplier(z.einheit);
    },0);
  },[form.zutaten,articles]);

  const preisKg = form.outputKg > 0 ? kosten/form.outputKg : 0;

  return (
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal modal-lg">
        <div className="modal-header">
          <h3>{isNew?'Neues Vorprodukt':'VP bearbeiten'}</h3>
          <button className="btn btn-ghost" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          <div className="form-grid">
            <div className="form-row"><label>Name VP</label>
              <input type="text" value={form.name} onChange={e=>f('name',e.target.value)} placeholder="z.B. Kimchi-VP"/>
            </div>
            <div className="form-row"><label>Output Menge (kg)</label>
              <input type="number" value={form.outputKg||''} onChange={e=>f('outputKg',parseFloat(e.target.value)||0)} step="0.01"/>
            </div>
          </div>
          <div className="section-title">Zutaten</div>
          <div style={{background:'#f8fafc',border:'1px solid #e2e8f0',borderRadius:6,padding:12,marginBottom:12}}>
            <div style={{display:'grid',gridTemplateColumns:'2fr 1fr 80px 70px auto',gap:8,marginBottom:8,fontSize:11,fontWeight:600,color:'#566373',textTransform:'uppercase'}}>
              <span>Artikel</span><span>Lieferant</span><span>Menge</span><span>Einheit</span><span></span>
            </div>
            {form.zutaten.map((z,i)=>{
              const art = articles.find(a=>a.id===z.art);
              const suppliers = art ? allSuppliers(art) : [];
              const hasVariants = suppliers.length > 1;
              const activePpu = art ? pricePerUnit(art, z.variantLief) : 0;
              const defaultPpu = art ? pricePerUnit(art) : 0;
              const saving = (hasVariants && z.variantLief && z.variantLief !== art.lief)
                ? ((activePpu - defaultPpu) / defaultPpu * 100) : null;
              return (
                <div key={i} style={{marginBottom:6}}>
                  <div style={{display:'grid',gridTemplateColumns:'2fr 1fr 80px 70px auto',gap:8,alignItems:'center'}}>
                    <select value={z.art||''} onChange={e=>{
                      const a2 = articles.find(a=>a.id===e.target.value);
                      f('zutaten', form.zutaten.map((z2,j)=>j!==i ? z2 : {
                        ...z2, art:e.target.value,
                        ...(a2?{name:a2.name,einheit:defaultIngUnit(a2.e),variantLief:''}:{})
                      }));
                    }} style={{fontSize:12}}>
                      <option value="">— Artikel wählen —</option>
                      {['Food','Bev','Nonfood'].map(cat=>{
                        const grp = activeArts.filter(a=>getKat(a)===cat);
                        return grp.length ? <optgroup key={cat} label={cat}>{grp.map(a=><option key={a.id} value={a.id}>{a.name}</option>)}</optgroup> : null;
                      })}
                    </select>
                    {hasVariants ? (
                      <select value={z.variantLief||art.lief} onChange={e=>setZutat(i,'variantLief',e.target.value)} style={{fontSize:12,borderColor:'#a5b4fc'}}>
                        {suppliers.map((s,si)=>(
                          <option key={si} value={s.lief}>
                            {s.lief||'—'} ({fmt(s.ek/(art.g||1))}/{art.e}){s.isDefault?' ★':''}
                          </option>
                        ))}
                      </select>
                    ) : (
                      <span style={{fontSize:12,color:'#5e6e7f',padding:'5px 0'}}>{art?.lief||'—'}</span>
                    )}
                    <input type="number" value={z.menge||''} step="0.001"
                      onChange={e=>setZutat(i,'menge',parseFloat(e.target.value)||0)}
                      style={{fontSize:12,padding:'5px 8px'}}/>
                    {(()=>{const uOpts=getIngUnits(art?.e);const allU=uOpts.includes(z.einheit)?uOpts:[z.einheit,...uOpts].filter(Boolean);return<select value={z.einheit||''} onChange={e=>setZutat(i,'einheit',e.target.value)} style={{fontSize:12,padding:'5px 8px',width:'100%'}}>{allU.map(u=><option key={u} value={u}>{u}</option>)}</select>;})()}
                    <button className="btn btn-danger btn-xs" onClick={()=>delZutat(i)}>✕</button>
                  </div>
                  {saving !== null && (
                    <div style={{fontSize:11,color:saving<0?'#16a34a':'#dc2626',paddingLeft:4,marginTop:2}}>
                      {saving<0?'▼ Einsparung':'▲ Aufpreis'} {Math.abs(saving).toFixed(1)}% vs. Standard ({fmt(defaultPpu)}/{art.e})
                      {' · '}{fmt(activePpu*z.menge*toBaseMultiplier(z.einheit))} statt {fmt(defaultPpu*z.menge*toBaseMultiplier(z.einheit))}
                    </div>
                  )}
                </div>
              );
            })}
            <button className="btn btn-secondary btn-sm" style={{marginTop:4}} onClick={addZutat}>+ Zutat</button>
          </div>
          <div style={{background:'#1a1a1a',color:'white',borderRadius:6,padding:'14px 16px',display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12,textAlign:'center'}}>
            <div>
              <div style={{fontSize:11,color:'#5e6e7f',marginBottom:4}}>Kosten gesamt</div>
              <div style={{fontSize:20,fontWeight:700}}>{fmt(kosten)}</div>
            </div>
            <div>
              <div style={{fontSize:11,color:'#5e6e7f',marginBottom:4}}>Output</div>
              <div style={{fontSize:20,fontWeight:700}}>{(form.outputKg||0).toFixed(2)} kg</div>
            </div>
            <div>
              <div style={{fontSize:11,color:'#5e6e7f',marginBottom:4}}>Preis/kg netto</div>
              <div style={{fontSize:20,fontWeight:700,color:'#fb923c'}}>{fmt(preisKg)}</div>
            </div>
          </div>
        </div>
        {!isNew&&<div style={{padding:'0 20px 16px'}}>
          <label style={{display:'flex',alignItems:'center',gap:8,fontSize:13,cursor:'pointer'}}>
            <input type="checkbox" checked={form.archiv||false} onChange={e=>setForm(p=>({...p,archiv:e.target.checked}))} style={{width:'auto'}}/>
            Archiviert
          </label>
        </div>}
        <div className="modal-footer">
          <button className="btn btn-secondary" onClick={onClose}>Abbrechen</button>
          <button className="btn btn-primary" onClick={()=>onSave({
            ...vp, id:vp.id||('VP'+uid()), ...form, kosten, preisKg
          })}>
            {isNew?'VP anlegen & als Artikel speichern':'Speichern'}
          </button>
        </div>
      </div>
    </div>
  );
}

function VPTab({vps, setVPs, articles, setArticles, upsert, pendingModal=null, onPendingClear}) {
  const [modal, setModal] = useState(null);
  const [showArchiv, setShowArchiv] = useState(false);

  useEffect(()=>{
    if (pendingModal !== null) { setModal(pendingModal); onPendingClear&&onPendingClear(); }
  // eslint-disable-next-line react-hooks/exhaustive-deps
  },[pendingModal]);

  const visibleVPs = vps.filter(vp=>showArchiv||!vp.archiv);

  const saveVP = (vp) => {
    const isNew = !vps.find(v=>v.id===vp.id);
    setVPs(prev=>isNew?[...prev,vp]:prev.map(v=>v.id===vp.id?vp:v));
    upsert&&upsert('vorprodukte', vp);
    // Sync als Artikel mit Lieferant Simple
    const artId = 'AV'+vp.id;
    const art = {
      id:artId, name:vp.name, g:1, e:'KG',
      ek:parseFloat(vp.preisKg.toFixed(4)),
      lief:'SIMPLE', datum:new Date().toISOString().slice(0,10), archiv:vp.archiv||false,
      varianten:[], _vpId:vp.id
    };
    setArticles(prev=>{
      const ex = prev.find(a=>a.id===artId||a._vpId===vp.id);
      return ex ? prev.map(a=>(a.id===artId||a._vpId===vp.id)?art:a) : [...prev,art];
    });
    upsert&&upsert('articles', art, {silent:true});
    setModal(null);
  };

  return (
    <div className="tab-content">
      <div className="toolbar">
        <div style={{fontSize:13,color:'#566373'}}><strong>{vps.filter(v=>!v.archiv).length}</strong> Vorprodukte{vps.filter(v=>v.archiv).length>0&&<span style={{color:'#5e6e7f'}}> · {vps.filter(v=>v.archiv).length} archiviert</span>}</div>
        <label style={{display:'flex',alignItems:'center',gap:6,fontSize:13,cursor:'pointer'}}>
          <span className="switch"><input type="checkbox" checked={showArchiv} onChange={e=>setShowArchiv(e.target.checked)}/><span className="slider"></span></span>
          Archiv
        </label>
        <button className="btn btn-primary" style={{marginLeft:'auto'}}
          onClick={()=>setModal({name:'',outputKg:0,zutaten:[]})}>
          + Vorprodukt
        </button>
      </div>
      <div className="card">
        <table>
          <thead><tr>
            <th>Vorprodukt</th><th>Output</th><th>Kosten</th><th>€/kg netto</th>
            <th>Zutaten</th><th>In Artikelliste</th><th></th>
          </tr></thead>
          <tbody>
          {visibleVPs.map(vp=>{
            const inArts = articles.some(a=>a._vpId===vp.id||a.name===vp.name&&a.lief&&a.lief.toLowerCase()==='simple');
            return (
              <tr key={vp.id} style={vp.archiv?{opacity:.45}:{}}>
                <td><strong>{vp.name}</strong></td>
                <td>{vp.outputKg} kg</td>
                <td>{fmt(vp.kosten)}</td>
                <td style={{fontFamily:'monospace',fontWeight:600,color:'#e85d04'}}>{fmt(vp.preisKg)}</td>
                <td style={{color:'#566373',fontSize:12}}>{vp.zutaten.length} Pos.</td>
                <td>{inArts?<span className="badge badge-green">✓ Synced</span>:<span className="badge badge-gray">—</span>}</td>
                <td style={{display:'flex',gap:2}}>
                  <button className="btn btn-ghost btn-xs" onClick={()=>setModal({...vp})} title="Bearbeiten">✎</button>
                  <button className="btn btn-ghost btn-xs" onClick={()=>setModal({...vp,id:undefined,name:vp.name+' (Kopie)'})} title="Duplizieren" style={{color:'#94a3b8',fontSize:15}}>⎘</button>
                </td>
              </tr>
            );
          })}
          </tbody>
        </table>
      </div>
      {modal && <VPModal vp={modal} articles={articles} onSave={saveVP} onClose={()=>setModal(null)}/>}
    </div>
  );
}

// ── INVOICE TAB ───────────────────────────────────────────────────────────────

function InvoiceTab({articles, setArticles, priceLog, setPriceLog, upsert, suppliers=[], recipes=[]}) {
  const [apiKey, setApiKey] = useLS('sk_simple_apikey','');
  const [showKey, setShowKey] = useState(false);
  const [file, setFile] = useState(null);
  const [scanning, setScanning] = useState(false);
  const [result, setResult] = useState(null);
  const [confirmed, setConfirmed] = useState({});
  const [matchOverrides, setMatchOverrides] = useState({});
  const [newArtModal, setNewArtModal] = useState(null);
  const [confirmModal, setConfirmModal] = useState(null); // {p, i, match, newEk}
  const [impactModal, setImpactModal] = useState(null);
  const dropRef = useRef();

  const handleFile = (f) => { setFile(f); setResult(null); setConfirmed({}); setMatchOverrides({}); };

  const getRowMatch = (p, i) => {
    if (i in matchOverrides) return matchOverrides[i] ? articles.find(a=>a.id===matchOverrides[i]) : null;
    return p.matched;
  };
  const getRowDiff = (p, match) => {
    if (!match) return null;
    const ppu = p.preisProEinheit||p.preisNetto;
    const cppu = pricePerUnit(match);
    return cppu>0 ? (ppu-cppu)/cppu*100 : null;
  };

  const scan = async () => {
    if (!apiKey || !file) return;
    setScanning(true); setResult(null);
    try {
      const b64 = await new Promise((res,rej)=>{
        const r = new FileReader();
        r.onload = e => res(e.target.result.split(',')[1]);
        r.onerror = rej;
        r.readAsDataURL(file);
      });
      const isPdf = file.type==='application/pdf';
      const mediaType = isPdf ? 'application/pdf' : file.type||'image/jpeg';

      const systemPrompt = `Du bist ein Rechnungsanalyse-Assistent für eine Gastronomie-Küche.
Extrahiere alle Positionen aus dem Dokument.

WICHTIG für preisProEinheit – gib immer den Preis pro BASISEINHEIT an (pro KG, pro Liter, pro Stück):
- Enthält der Artikelname ein Gewicht oder Volumen (z.B. "1 kg", "11,5 KG", "500g", "1L", "0,5L"): teile den Einzelpreis durch dieses Gewicht/Volumen.
  Beispiel: "Ketchup 11,5 KG Eimer" zu 22,39 € → preisProEinheit: 1.95 (=22.39÷11.5), einheit: "KG"
  Beispiel: "Mozzarella 1 kg Beutel" zu 6,49 € → preisProEinheit: 6.49, einheit: "KG"
  Beispiel: "Balsamico 0,5L Flasche" zu 3,50 € → preisProEinheit: 7.00 (=3.50÷0.5), einheit: "L"
- Kein Gewicht/Volumen erkennbar: Einzelpreis pro Stück/Packung verwenden.
preisNetto = Gesamtpreis der Zeile. Preise in Euro als Dezimalzahl.
Antworte NUR mit gültigem JSON:
{"positionen":[{"name":"Artikel","menge":2,"einheit":"KG","preisNetto":12.98,"preisProEinheit":6.49}]}`;

      const resp = await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{
          'x-api-key':apiKey,
          'anthropic-version':'2023-06-01',
          'content-type':'application/json',
          'anthropic-dangerous-direct-browser-access':'true',
        },
        body:JSON.stringify({
          model:'claude-haiku-4-5-20251001',
          max_tokens:2048,
          system: systemPrompt,
          messages:[{role:'user',content:[
            {type:isPdf?'document':'image',source:{type:'base64',media_type:mediaType,data:b64}},
            {type:'text',text:'Extrahiere alle Artikel mit Preisen aus diesem Dokument.'}
          ]}]
        })
      });
      const json = await resp.json();
      if (!resp.ok) throw new Error(json.error?.message||'API Fehler');
      const text = json.content[0].text;
      const match = text.match(/\{[\s\S]*\}/);
      if (!match) throw new Error('Kein JSON in Antwort');
      const parsed = JSON.parse(match[0]);

      // Match gegen Artikelliste
      const positions = (parsed.positionen||[]).map(p=>{
        const found = articles.find(a=>!a.archiv&&a.name.toLowerCase().includes(p.name.toLowerCase().slice(0,6)));
        const ppu = p.preisProEinheit||p.preisNetto;
        const currentPpu = found ? pricePerUnit(found) : null;
        const diff = (found&&currentPpu) ? ((ppu-currentPpu)/currentPpu*100) : null;
        return {...p, matched:found, currentPpu, diff, flagged: diff!==null && Math.abs(diff)>3};
      });
      setResult(positions);
    } catch(e) {
      setResult([{error:e.message}]);
    }
    setScanning(false);
  };

  const doConfirmOne = (p, match, newEk) => {
    // Find current article in state to avoid stale reference
    const cur = articles.find(a=>a.id===match.id) || match;
    const newArt = {...cur, ek: parseFloat(newEk)||cur.ek, datum:new Date().toISOString().slice(0,10)};
    const log = {id:'L'+uid(),datum:new Date().toISOString(),typ:'Rechnung-Import',
      produkt:cur.name, altPreis:pricePerUnit(cur), neuPreis:parseFloat(newEk)/cur.g,
      quelle:'Rechnung: '+(file?.name||''), status:'bestätigt'};
    const impacts = computeImpact(cur.id, newArt, articles, recipes);
    setArticles(prev=>prev.map(a=>a.id===cur.id?newArt:a));
    setPriceLog(prev=>[log,...prev]);
    if(upsert){upsert('articles',newArt);upsert('price_log',log,{silent:true});}
    setConfirmed(prev=>({...prev,[p.name]:true}));
    if (impacts.length) setImpactModal({
      title:`Preisauswirkung – ${cur.name}`,
      subtitle:`${fmt(pricePerUnit(cur))} → ${fmt(parseFloat(newEk)/(cur.g||1))} / ${cur.e}`,
      impacts
    });
  };

  const confirmAll = () => {
    if (!result) return;
    const logs=[]; const updatedArts=[];
    const updates = result.map((p,i)=>{
      if(confirmed[p.name]||p.error) return null;
      const match = getRowMatch(p,i);
      if(!match) return null;
      const ppu = p.preisProEinheit||p.preisNetto;
      const d = getRowDiff(p,match);
      if(d==null||Math.abs(d)<=3) return null;
      return {p,match,ppu};
    }).filter(Boolean);
    if (updates.length && recipes.length) {
      const changedIds = new Set(updates.map(u=>u.match.id));
      const newArts = articles.map(a=>{const upd=updates.find(u=>u.match.id===a.id);return upd?{...a,ek:upd.ppu*a.g}:a;});
      const combinedImpacts = recipes.filter(r=>!r.archiv&&(r.zutaten||[]).some(z=>changedIds.has(z.art))).map(r=>{
        const weOld=calcWEWithArts(r,articles), weNew=calcWEWithArts(r,newArts);
        const vkNetto=r.vkBrutto/(1+r.mwst/100);
        return {recipe:r, weOld, weNew, dbOld:vkNetto-weOld, dbNew:vkNetto-weNew};
      }).filter(imp=>Math.abs(imp.weNew-imp.weOld)>0.001);
      if (combinedImpacts.length) setImpactModal({
        title:'Preisauswirkungen – Rechnungsimport',
        subtitle:`${updates.length} Artikel aktualisiert`,
        impacts: combinedImpacts
      });
    }
    setArticles(prev=>prev.map(a=>{
      const upd = updates.find(u=>u.match.id===a.id);
      if(!upd) return a;
      const newArt={...a,ek:upd.ppu*a.g,datum:new Date().toISOString().slice(0,10)};
      logs.push({id:'L'+uid(),datum:new Date().toISOString(),typ:'Rechnung-Import',
        produkt:a.name,altPreis:pricePerUnit(a),neuPreis:upd.ppu,
        quelle:'Rechnung: '+(file?.name||''),status:'bestätigt'});
      updatedArts.push(newArt);
      return newArt;
    }));
    setPriceLog(prev=>[...logs,...prev]);
    if(upsert){upsert('articles',updatedArts);upsert('price_log',logs,{silent:true});}
    setConfirmed(updates.reduce((o,u)=>({...o,[u.p.name]:true}),{}));
  };

  const dragEvents = {
    onDragOver:e=>{e.preventDefault();dropRef.current.classList.add('drag')},
    onDragLeave:()=>dropRef.current.classList.remove('drag'),
    onDrop:e=>{e.preventDefault();dropRef.current.classList.remove('drag');const f=e.dataTransfer.files[0];if(f)handleFile(f);}
  };

  const flags = result ? result.map((p,i)=>({p,i})).filter(({p,i})=>{
    if(p.error||confirmed[p.name]) return false;
    const m=getRowMatch(p,i); const d=getRowDiff(p,m);
    return m&&d!=null&&Math.abs(d)>3;
  }) : [];

  return (
    <div className="tab-content">
      {/* API Key */}
      <div className="card" style={{padding:'14px 16px',marginBottom:16}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <span style={{fontSize:13,color:'#566373',fontWeight:600,whiteSpace:'nowrap'}}>Anthropic API Key</span>
          <input type={showKey?'text':'password'} value={apiKey} onChange={e=>setApiKey(e.target.value)}
            placeholder="sk-ant-..." style={{flex:1,fontSize:12,padding:'6px 10px'}}/>
          <button className="btn btn-secondary btn-sm" onClick={()=>setShowKey(s=>!s)}>{showKey?'Verbergen':'Zeigen'}</button>
        </div>
        <div style={{fontSize:11,color:'#5e6e7f',marginTop:6}}>
          Key wird nur in deinem Browser gespeichert (localStorage). Keine Serverübertragung.
        </div>
      </div>

      {/* Drop Zone */}
      <div ref={dropRef} className="invoice-drop" {...dragEvents} onClick={()=>document.getElementById('inv-file').click()}>
        <input id="inv-file" type="file" accept="image/*,application/pdf" style={{display:'none'}}
          onChange={e=>e.target.files[0]&&handleFile(e.target.files[0])}/>
        <div style={{fontSize:36}}>📄</div>
        <p>{file ? <><strong>{file.name}</strong> ({(file.size/1024).toFixed(0)} KB)</> : 'Rechnung oder Lieferschein hier ablegen (Bild oder PDF)'}</p>
        {file && <p style={{color:'#566373',fontSize:12}}>Klicken um andere Datei zu wählen</p>}
      </div>

      <div style={{display:'flex',gap:10,margin:'14px 0',alignItems:'center'}}>
        <button className="btn btn-primary" onClick={scan} disabled={!file||!apiKey||scanning} style={{minWidth:160}}>
          {scanning?'⏳ Analysiere…':'🔍 Mit KI scannen'}
        </button>
        {flags.length>0&&<button className="btn btn-secondary" onClick={confirmAll}>
          ✓ Alle {flags.length} Preisänderungen übernehmen
        </button>}
      </div>

      {/* Results */}
      {result && result[0]?.error && (
        <div className="warn-banner">⚠ Fehler: {result[0].error}</div>
      )}
      {confirmModal&&(
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setConfirmModal(null)}>
          <div className="modal" style={{maxWidth:400}}>
            <div className="modal-header">
              <h3>Preis aktualisieren</h3>
              <button className="btn btn-ghost" onClick={()=>setConfirmModal(null)}>✕</button>
            </div>
            <div className="modal-body">
              <div style={{background:'#f8fafc',border:'1px solid #e2e8f0',borderRadius:6,padding:'10px 14px',marginBottom:16}}>
                <div style={{fontSize:13,fontWeight:600}}>{confirmModal.match.name}</div>
                <div style={{fontSize:12,color:'#566373',marginTop:2}}>
                  Aktuell: {fmt(confirmModal.match.ek)} für {confirmModal.match.g} {confirmModal.match.e}
                  {' '}= {fmt(pricePerUnit(confirmModal.match))} / {confirmModal.match.e}
                </div>
              </div>
              <div className="form-row">
                <label>Neuer EK (für {confirmModal.match.g} {confirmModal.match.e})</label>
                <input type="number" step="0.01" value={confirmModal.newEk}
                  onChange={e=>setConfirmModal(prev=>({...prev,newEk:e.target.value}))}
                  style={{fontWeight:600}}/>
              </div>
              {confirmModal.newEk>0&&(
                <div style={{fontSize:12,color:'#6366f1',marginTop:4}}>
                  → {fmt(parseFloat(confirmModal.newEk)/(confirmModal.match.g||1))} / {confirmModal.match.e}
                </div>
              )}
              <div style={{fontSize:12,color:'#5e6e7f',marginTop:10}}>
                Rechnungspreis: {fmt(confirmModal.p.preisProEinheit||confirmModal.p.preisNetto)} {confirmModal.p.einheit&&`(${confirmModal.p.einheit})`}
              </div>
            </div>
            <div className="modal-footer">
              <button className="btn btn-secondary" onClick={()=>setConfirmModal(null)}>Abbrechen</button>
              <button className="btn btn-primary" onClick={()=>{
                doConfirmOne(confirmModal.p, confirmModal.match, confirmModal.newEk);
                setConfirmModal(null);
              }}>Speichern</button>
            </div>
          </div>
        </div>
      )}
      {newArtModal&&(
        <ArticleModal
          art={{name:newArtModal.name,g:1,e:newArtModal.einheit||'KG',ek:newArtModal.ek||0,lief:'',datum:new Date().toISOString().slice(0,10),archiv:false}}
          suppliers={suppliers}
          onClose={()=>setNewArtModal(null)}
          onSave={art=>{
            const saved={...art,id:art.id||('A'+uid())};
            setArticles(prev=>[...prev,saved]);
            if(upsert) upsert('articles',saved);
            setMatchOverrides(prev=>({...prev,[newArtModal.posIndex]:saved.id}));
            setNewArtModal(null);
          }}
        />
      )}
      {result && !result[0]?.error && (
        <div className="card">
          <table>
            <thead><tr>
              <th>Artikel (Rechnung)</th><th style={{minWidth:220}}>Zuordnung</th><th>Menge</th>
              <th>Preis Rechnung</th><th>Preis aktuell</th><th>Δ</th><th>Aktion</th>
            </tr></thead>
            <tbody>
            {result.map((p,i)=>{
              const isDone = confirmed[p.name];
              const eff = getRowMatch(p,i);
              const ppu = p.preisProEinheit||p.preisNetto;
              const diff = getRowDiff(p,eff);
              const flagged = diff!=null&&Math.abs(diff)>3;
              return (
                <tr key={i} style={flagged&&!isDone?{background:'#fef9f0'}:{}}>
                  <td style={{fontSize:13,maxWidth:200,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.name}</td>
                  <td>
                    <div style={{display:'flex',gap:4,alignItems:'center'}}>
                      <select
                        value={(i in matchOverrides ? matchOverrides[i] : p.matched?.id)||''}
                        onChange={e=>setMatchOverrides(prev=>({...prev,[i]:e.target.value||null}))}
                        style={{fontSize:12,padding:'3px 6px',flex:1,minWidth:0}}>
                        <option value="">— nicht zuordnen —</option>
                        {['Food','Bev','Nonfood'].map(cat=>{
                          const grp=articles.filter(a=>!a.archiv&&getKat(a)===cat).sort((a,b)=>a.name.localeCompare(b.name,'de'));
                          return grp.length?<optgroup key={cat} label={cat}>{grp.map(a=><option key={a.id} value={a.id}>{a.name}</option>)}</optgroup>:null;
                        })}
                      </select>
                      <button className="btn btn-secondary btn-xs" style={{flexShrink:0,padding:'3px 8px',fontWeight:700}}
                        title="Neuen Artikel anlegen"
                        onClick={()=>setNewArtModal({posIndex:i,name:p.name.trim(),ek:ppu,einheit:p.einheit||'KG'})}>+</button>
                    </div>
                  </td>
                  <td style={{fontFamily:'monospace',whiteSpace:'nowrap'}}>{p.menge} {p.einheit}</td>
                  <td style={{fontFamily:'monospace',fontWeight:600}}>{fmt(ppu)}</td>
                  <td style={{fontFamily:'monospace'}}>{eff?fmt(pricePerUnit(eff)):'—'}</td>
                  <td>
                    {diff!=null?<span className={diff>0?'price-up':'price-down'}>
                      {diff>0?'▲':'▼'}{Math.abs(diff).toFixed(1)}%
                    </span>:<span className="price-same">—</span>}
                  </td>
                  <td>
                    {isDone?<span className="badge badge-green">✓ Übernommen</span>:
                     eff?<button className="btn btn-primary btn-xs" onClick={()=>{
                       const cur=articles.find(a=>a.id===eff.id)||eff;
                       setConfirmModal({p,i,match:cur,newEk:ppu*cur.g});
                     }}>Übernehmen</button>:
                     <button className="btn btn-secondary btn-xs" onClick={()=>setNewArtModal({posIndex:i,name:p.name.trim(),ek:ppu,einheit:p.einheit||'KG'})}>+ Neu</button>}
                  </td>
                </tr>
              );
            })}
            </tbody>
          </table>
        </div>
      )}
      {impactModal&&<ImpactModal {...impactModal} onClose={()=>setImpactModal(null)}/>}
    </div>
  );
}
