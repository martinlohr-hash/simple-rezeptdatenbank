*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f3f4f6;color:#1a1a1a;min-height:100vh}
.app{display:flex;flex-direction:column;min-height:100vh}
.header{background:#111;color:white;padding:12px 24px;display:flex;align-items:center;gap:12px}
.header h1{font-size:17px;font-weight:700;letter-spacing:-.3px}
.header .subtitle{font-size:12px;color:#888;margin-top:1px}
.tabs{display:flex;background:#1a1a1a;padding:0 24px;gap:2px;overflow-x:auto}
.tab{padding:11px 16px;color:#777;cursor:pointer;font-size:13px;font-weight:500;border-bottom:2px solid transparent;white-space:nowrap;transition:color .15s,border-color .15s}
.tab:hover{color:#ccc}
.tab.active{color:#fff;border-bottom-color:#e85d04}
.content{flex:1;padding:20px 24px;max-width:1440px;width:100%}
table{width:100%;border-collapse:collapse;font-size:13px;background:white}
thead th{background:#f8fafc;padding:9px 12px;text-align:left;font-weight:600;color:#64748b;font-size:11px;text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid #e2e8f0;white-space:nowrap}
tbody tr{border-bottom:1px solid #f1f5f9}
tbody tr:hover{background:#fafbfd}
td{padding:8px 12px;vertical-align:middle}
.card{background:white;border-radius:8px;border:1px solid #e2e8f0;overflow:hidden}
.toolbar{display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.search{padding:8px 12px;border:1px solid #e2e8f0;border-radius:6px;font-size:13px;width:260px;outline:none;background:white}
.search:focus{border-color:#e85d04;box-shadow:0 0 0 2px #e85d0420}
.btn{padding:7px 14px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-weight:500;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:#e85d04;color:white}.btn-primary:hover{background:#c94e03}
.btn-secondary{background:#f1f5f9;color:#475569}.btn-secondary:hover{background:#e2e8f0}
.btn-ghost{background:transparent;color:#64748b;padding:5px 8px}.btn-ghost:hover{background:#f1f5f9}
.btn-danger{background:#fee2e2;color:#dc2626}.btn-danger:hover{background:#fecaca}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-xs{padding:2px 8px;font-size:11px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:white;border-radius:10px;width:100%;max-width:580px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 80px rgba(0,0,0,.25)}
.modal-lg{max-width:760px}
.modal-header{padding:16px 20px;border-bottom:1px solid #e2e8f0;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:white;z-index:1}
.modal-header h3{font-size:15px;font-weight:600}
.modal-body{padding:20px}
.modal-footer{padding:14px 20px;border-top:1px solid #e2e8f0;display:flex;justify-content:flex-end;gap:8px}
.form-row{margin-bottom:14px}
.form-row label{display:block;font-size:11px;font-weight:600;color:#64748b;margin-bottom:4px;text-transform:uppercase;letter-spacing:.3px}
input[type=text],input[type=number],input[type=date],select,textarea{width:100%;padding:8px 10px;border:1px solid #e2e8f0;border-radius:6px;font-size:13px;outline:none;font-family:inherit}
input:focus,select:focus,textarea:focus{border-color:#e85d04;box-shadow:0 0 0 2px #e85d0420}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.ampel{display:inline-flex;align-items:center;gap:5px;font-weight:700;font-size:12px}
.ampel.green{color:#16a34a}.ampel.yellow{color:#d97706}.ampel.red{color:#dc2626}
.dot{width:8px;height:8px;border-radius:50%;background:currentColor;flex-shrink:0}
.badge{display:inline-flex;padding:2px 8px;border-radius:100px;font-size:11px;font-weight:600}
.badge-gray{background:#f1f5f9;color:#64748b}
.badge-blue{background:#eff6ff;color:#3b82f6}
.badge-orange{background:#fff7ed;color:#ea580c}
.badge-green{background:#f0fdf4;color:#16a34a}
.badge-red{background:#fef2f2;color:#dc2626}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.stat-card{background:white;border:1px solid #e2e8f0;border-radius:8px;padding:14px 16px}
.stat-label{font-size:11px;color:#64748b;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.stat-value{font-size:22px;font-weight:700}
.stat-sub{font-size:11px;color:#94a3b8;margin-top:2px}
.section-title{font-size:14px;font-weight:600;color:#374151;margin-bottom:12px}
.empty{text-align:center;padding:48px;color:#94a3b8;font-size:13px}
.ing-row{display:grid;grid-template-columns:2fr 80px 70px 80px auto;gap:8px;align-items:center;padding:6px 0;border-bottom:1px solid #f1f5f9;font-size:13px}
.ing-row select,ing-row input{padding:5px 8px;font-size:12px}
.warn-banner{background:#fffbeb;border:1px solid #fcd34d;border-radius:6px;padding:10px 14px;font-size:13px;color:#92400e;margin-bottom:14px;display:flex;gap:8px;align-items:flex-start}
.invoice-drop{border:2px dashed #e2e8f0;border-radius:8px;padding:40px;text-align:center;cursor:pointer;transition:all .15s;background:#fafbfc}
.invoice-drop:hover,.invoice-drop.drag{border-color:#e85d04;background:#fff7f3}
.invoice-drop p{font-size:13px;color:#94a3b8;margin-top:8px}
.price-change-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:6px;background:#fafbfc;border:1px solid #e2e8f0;margin-bottom:8px}
.price-up{color:#dc2626}.price-down{color:#16a34a}.price-same{color:#94a3b8}
.tab-content{animation:fadeIn .15s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.switch{position:relative;display:inline-block;width:36px;height:20px}
.switch input{opacity:0;width:0;height:0}
.slider{position:absolute;cursor:pointer;inset:0;background:#e2e8f0;border-radius:20px;transition:.2s}
.slider:before{position:absolute;content:'';height:14px;width:14px;left:3px;bottom:3px;background:white;border-radius:50%;transition:.2s}
input:checked+.slider{background:#e85d04}
input:checked+.slider:before{transform:translateX(16px)}
.log-row-price{color:#dc2626;font-weight:600}
.log-row-margin{color:#d97706;font-weight:600}
</style>

const fmt = (n) => new Intl.NumberFormat('de-DE',{style:'currency',currency:'EUR'}).format(n||0);
const fmtPct = (n) => (n||0).toFixed(1)+'%';
const fmtKg = (n) => (n||0).toFixed(3).replace('.',',')+'  kg';

function ampelWE(pct) {
  if (pct <= 28) return 'green';
  if (pct <= 38) return 'yellow';
  return 'red';
}

function pricePerUnit(art, variantLief) {
  const v = variantLief && (art.varianten||[]).find(va=>va.lief===variantLief);
  const ek = v ? v.ek : art.ek;
  if (!art.g || art.g === 0) return ek;
  return ek / art.g;
}

function allSuppliers(art) {
  // Returns [{lief, ek, datum, isDefault}] — default first
  const main = {lief: art.lief||'', ek: art.ek, datum: art.datum||'', isDefault: true};
  const extras = (art.varianten||[]).map(v=>({...v, isDefault:false}));
  return [main, ...extras];
}

function uid() {
  return 'X'+(Math.random()*1e9|0).toString(36).toUpperCase();

function useLS(key, seed) {
  const [data, setData] = useState(() => {
    try {
      const raw = localStorage.getItem(key);
      return raw ? JSON.parse(raw) : seed;
    } catch { return seed; }
  });
  const set = useCallback((v) => {
    setData(prev => {
      const next = typeof v === 'function' ? v(prev) : v;
      localStorage.setItem(key, JSON.stringify(next));
      return next;
    });
  }, [key]);
  return [data, set];
}

function ArticleModal({art, onSave, onClose, suppliers=[]}) {
  const isNew = !art.id;
  const [form, setForm] = useState({...art, varianten: art.varianten||[]});
  const f = (k,v) => setForm(p=>({...p,[k]:v}));

  const addVariant = () => f('varianten',[...form.varianten,{lief:'',ek:0,datum:''}]);
  const setVariant = (i,k,v) => f('varianten',form.varianten.map((va,j)=>j===i?{...va,[k]:v}:va));
  const removeVariant = (i) => f('varianten',form.varianten.filter((_,j)=>j!==i));
  const setAsDefault = (i) => {
    const v = form.varianten[i];
    // swap: old default goes into varianten, new default becomes main
    const oldDefault = {lief:form.lief||'', ek:form.ek, datum:form.datum||''};
    f('varianten', form.varianten.map((va,j)=>j===i?oldDefault:va));
    setForm(p=>({...p, lief:v.lief, ek:v.ek, datum:v.datum,
      varianten: p.varianten.map((va,j)=>j===i?oldDefault:va)}));
  };

  const ppu = form.g>0 ? form.ek/form.g : form.ek;

  return (
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="modal-header">
          <h3>{isNew?'Neuer Artikel':'Artikel bearbeiten'}</h3>
          <button className="btn btn-ghost" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          <div className="form-grid">
            <div className="form-row"><label>Name</label>
              <input type="text" value={form.name||''} onChange={e=>f('name',e.target.value)} placeholder="Artikelname"/>
            </div>
            <div className="form-row"><label>Kategorie</label>
              <select value={form.kat||getKat(form)} onChange={e=>f('kat',e.target.value)}>
                <option value="Food">Food</option>
                <option value="Bev">Bev</option>
                <option value="Nonfood">Nonfood</option>
              </select>
            </div>
          </div>
          <div className="form-grid">
            <div className="form-row"><label>Packungsgröße</label>
              <input type="number" value={form.g||''} onChange={e=>f('g',parseFloat(e.target.value)||0)} step="0.001"/>
            </div>
            <div className="form-row"><label>Einheit</label>
              <select value={form.e||'KG'} onChange={e=>f('e',e.target.value)}>
                {['KG','kg','g','l','L','St','St.','Stk','Bd','Ds','Kst','Dose'].map(u=><option key={u}>{u}</option>)}
              </select>
            </div>
          </div>

          {/* ── Lieferanten-Preise ── */}
          <div style={{background:'#f8fafc',border:'1px solid #e2e8f0',borderRadius:8,padding:12,marginBottom:14}}>
            <div style={{fontSize:11,fontWeight:600,color:'#64748b',textTransform:'uppercase',letterSpacing:'.3px',marginBottom:10}}>
              Lieferanten &amp; Preise
            </div>
            <datalist id="art-sup-list">{suppliers.map(s=><option key={s.id} value={s.name}/>)}</datalist>
            {/* Hauptlieferant */}
            <div style={{display:'grid',gridTemplateColumns:'1fr 90px 120px auto',gap:8,alignItems:'center',marginBottom:6}}>
              <input type="text" list="art-sup-list" value={form.lief||''} onChange={e=>f('lief',e.target.value)} placeholder="Lieferant" style={{fontSize:12}}/>
              <input type="number" value={form.ek||''} onChange={e=>f('ek',parseFloat(e.target.value)||0)} step="0.01" placeholder="EK €" style={{fontSize:12}}/>
              <input type="date" value={form.datum||''} onChange={e=>f('datum',e.target.value)} style={{fontSize:12}}/>
              <span className="badge badge-blue" style={{justifyContent:'center'}}>Standard</span>
            </div>
            {/* Alternative Lieferanten */}
            {form.varianten.map((v,i)=>{
              const vPpu = form.g>0 ? v.ek/form.g : v.ek;
              const diffPct = ppu>0 ? ((vPpu-ppu)/ppu*100) : 0;
              return (
                <div key={i} style={{display:'grid',gridTemplateColumns:'1fr 90px 120px auto',gap:8,alignItems:'center',marginBottom:6}}>
                  <input type="text" list="art-sup-list" value={v.lief||''} onChange={e=>setVariant(i,'lief',e.target.value)} placeholder="Lieferant" style={{fontSize:12}}/>
                  <div style={{position:'relative'}}>
                    <input type="number" value={v.ek||''} onChange={e=>setVariant(i,'ek',parseFloat(e.target.value)||0)} step="0.01" placeholder="EK €" style={{fontSize:12,width:'100%'}}/>
                    {v.ek>0&&ppu>0&&<span style={{position:'absolute',right:4,top:'50%',transform:'translateY(-50%)',fontSize:9,color:diffPct>0?'#dc2626':'#16a34a',fontWeight:700,pointerEvents:'none'}}>
                      {diffPct>0?'▲':'▼'}{Math.abs(diffPct).toFixed(0)}%
                    </span>}
                  </div>
                  <input type="date" value={v.datum||''} onChange={e=>setVariant(i,'datum',e.target.value)} style={{fontSize:12}}/>
                  <div style={{display:'flex',gap:4}}>
                    <button className="btn btn-secondary btn-xs" onClick={()=>setAsDefault(i)} title="Als Standard setzen">★</button>
                    <button className="btn btn-danger btn-xs" onClick={()=>removeVariant(i)}>✕</button>
                  </div>
                </div>
              );
            })}
            <button className="btn btn-secondary btn-sm" style={{marginTop:4}} onClick={addVariant}>+ Lieferant</button>

          <button className="btn btn-primary" onClick={()=>onSave({...form,id:form.id||('A'+uid())})}>Speichern</button>
        </div>
      </div>
    </div>
  );
}

function ArticleTab({articles, setArticles, priceLog, setPriceLog, upsert, suppliers=[], vps=[], pendingModal=null, onPendingClear}) {
  const [q, setQ] = useState('');
  const [showArchiv, setShowArchiv] = useState(false);
  const [modal, setModal] = useState(null);
  const [sort, setSort] = useState({col:'name',dir:'asc'});
  const [archiveWarning, setArchiveWarning] = useState(null);

  useEffect(()=>{
    if (pendingModal !== null) { setModal(pendingModal); onPendingClear&&onPendingClear(); }
  // eslint-disable-next-line react-hooks/exhaustive-deps
  },[pendingModal]);

  const toggleSort = (col) => setSort(s => s.col===col ? {col,dir:s.dir==='asc'?'desc':'asc'} : {col,dir:'asc'});
  const SortTh = ({col,children}) => (
    <th onClick={()=>toggleSort(col)} style={{cursor:'pointer',userSelect:'none',whiteSpace:'nowrap'}}>
      {children}{' '}
      <span style={{opacity:sort.col===col?1:.25,fontSize:10}}>
        {sort.col===col&&sort.dir==='desc'?'▼':'▲'}
      </span>
    </th>
  );

  const filtered = useMemo(()=>{
    const base = articles.filter(a=>{
      if (!showArchiv && a.archiv) return false;
      return !q || a.name.toLowerCase().includes(q.toLowerCase()) || (a.lief||'').toLowerCase().includes(q.toLowerCase());
    });
    const {col,dir} = sort;
    return [...base].sort((a,b)=>{
      let va, vb;
      if (col==='name')   { va=a.name.toLowerCase(); vb=b.name.toLowerCase(); }
      else if (col==='ek')     { va=a.ek; vb=b.ek; }
      else if (col==='ppu')    { va=pricePerUnit(a); vb=pricePerUnit(b); }
      else if (col==='lief')   { va=(a.lief||'').toLowerCase(); vb=(b.lief||'').toLowerCase(); }
      else if (col==='datum')  { va=a.datum||''; vb=b.datum||''; }
      else return 0;
      if (va<vb) return dir==='asc'?-1:1;
      if (va>vb) return dir==='asc'?1:-1;
      return 0;
    });
  }, [articles, q, showArchiv, sort]);

  const doSaveArt = (art) => {
    const existing = articles.find(a=>a.id===art.id);
    if (existing && existing.ek !== art.ek) {
      const entry = {id:'L'+uid(),datum:new Date().toISOString(),typ:'Preisänderung',
        produkt:art.name,altPreis:existing.ek,neuPreis:art.ek,quelle:'Manuell',status:'ok'};
      setPriceLog(prev=>[entry,...prev]);
      upsert&&upsert('price_log', entry);
    }
    setArticles(prev=>existing ? prev.map(a=>a.id===art.id?art:a) : [...prev,art]);
    upsert&&upsert('articles', art);
    setModal(null);
  };

  const saveArt = (art) => {
    const existing = articles.find(a=>a.id===art.id);
    if (art.archiv && existing && !existing.archiv) {
      const usedIn = vps.filter(vp=>!vp.archiv&&(vp.zutaten||[]).some(z=>z.art===art.id));
      if (usedIn.length) {
        setModal(null);
        setArchiveWarning({art, usedIn});
        return;
      }
    }
    doSaveArt(art);
  };

  const priceAge = (datum) => {
    if (!datum) return null;
    const days = Math.floor((Date.now() - new Date(datum)) / 86400000);
    if (days > 180) return 'red';
    if (days > 90) return 'yellow';
    return 'green';
  };

  return (
    <div className="tab-content">
      <div className="stats-row">
        <div className="stat-card">
          <div className="stat-label">Artikel aktiv</div>
          <div className="stat-value">{articles.filter(a=>!a.archiv).length}</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">Archiviert</div>
          <div className="stat-value" style={{color:'#94a3b8'}}>{articles.filter(a=>a.archiv).length}</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">Lieferanten</div>
          <div className="stat-value">{new Set(articles.filter(a=>!a.archiv&&a.lief).map(a=>a.lief.toUpperCase())).size}</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">Preis > 6 Mon. alt</div>
          <div className="stat-value" style={{color:'#dc2626'}}>
            {articles.filter(a=>!a.archiv&&priceAge(a.datum)==='red').length}
          </div>
        </div>
      </div>
      <div className="toolbar">
        <input className="search" placeholder="Suche Artikel oder Lieferant…" value={q} onChange={e=>setQ(e.target.value)}/>
        <label style={{display:'flex',alignItems:'center',gap:6,fontSize:13,cursor:'pointer'}}>
          <span className="switch"><input type="checkbox" checked={showArchiv} onChange={e=>setShowArchiv(e.target.checked)}/><span className="slider"></span></span>
          Archiv
        </label>
        <button className="btn btn-primary" style={{marginLeft:'auto'}} onClick={()=>setModal({name:'',g:1,e:'KG',ek:0,lief:'',datum:'',archiv:false})}>
          + Artikel
        </button>
      </div>
      <div className="card">
        <table>
          <thead><tr>
            <SortTh col="name">Name</SortTh>
            <th>Größe</th>
            <SortTh col="ek">EK Netto</SortTh>
            <SortTh col="ppu">EK/Einheit</SortTh>
            <SortTh col="lief">Lieferant</SortTh>
            <SortTh col="datum">Preisdatum</SortTh>
            <th>Status</th><th></th>
          </tr></thead>
          <tbody>
          {filtered.map(a=>{
            const ppu = pricePerUnit(a);
            const age = priceAge(a.datum);
            const suppliers = allSuppliers(a);
            const hasVariants = (a.varianten||[]).length > 0;
            const ppuMin = hasVariants ? Math.min(...suppliers.map(s=>s.ek/(a.g||1))) : ppu;
            const ppuMax = hasVariants ? Math.max(...suppliers.map(s=>s.ek/(a.g||1))) : ppu;
            return (
              <tr key={a.id} style={a.archiv?{opacity:.5}:{}}>
                <td><strong>{a.name}</strong></td>
                <td style={{color:'#64748b'}}>{a.g} {a.e}</td>
                <td>{fmt(a.ek)}</td>
                <td style={{fontFamily:'monospace'}}>
                  {hasVariants
                    ? <span>{fmt(ppuMin)}–{fmt(ppuMax)}<span style={{color:'#94a3b8'}}>/{a.e}</span></span>
                    : <span>{fmt(ppu)}<span style={{color:'#94a3b8'}}>/{a.e}</span></span>}
                </td>
                <td>
                  {hasVariants
                    ? <span title={suppliers.map(s=>`${s.lief}: ${fmt(s.ek)}`).join('\n')}
                        className="badge badge-blue" style={{cursor:'default'}}>
                        {suppliers.length}× Lieferanten
                      </span>
                    : <span className="badge badge-gray">{a.lief||'—'}</span>}
                </td>
                <td>
                  {a.datum ? <span style={{color: age==='red'?'#dc2626':age==='yellow'?'#d97706':'#374151', fontSize:12}}>
                    {a.datum}
                  </span> : <span style={{color:'#94a3b8',fontSize:12}}>—</span>}
                </td>
                <td>
                  {a.archiv ? <span className="badge badge-gray">Archiv</span> :
                    age === 'red' ? <span className="ampel red"><span className="dot"/>veraltet</span> :
                    age === 'yellow' ? <span className="ampel yellow"><span className="dot"/>&gt;3 Mon.</span> :
                    <span className="ampel green"><span className="dot"/>aktuell</span>
                  }
                </td>
                <td>
                  <button className="btn btn-ghost btn-xs" onClick={()=>setModal({...a})}>✎</button>
                </td>
              </tr>
            );
          })}
          {filtered.length===0&&<tr><td colSpan={8}><div className="empty">Keine Artikel gefunden</div></td></tr>}
          </tbody>
        </table>
      </div>
      {modal && <ArticleModal art={modal} onSave={saveArt} onClose={()=>setModal(null)} suppliers={suppliers}/>}
      {archiveWarning&&(
        <div className="modal-overlay">
          <div className="modal" style={{maxWidth:420}}>
            <div className="modal-header">
              <h3>Artikel wird in Vorprodukten verwendet</h3>
            </div>
            <div className="modal-body">
              <div className="warn-banner">
                <span>⚠</span>
                <div><strong>{archiveWarning.art.name}</strong> ist Zutat in {archiveWarning.usedIn.length} aktivem Vorprodukt{archiveWarning.usedIn.length>1?'en':''}:</div>
              </div>
              <ul style={{margin:'12px 0 4px 16px',fontSize:13,lineHeight:2}}>
                {archiveWarning.usedIn.map(vp=><li key={vp.id}>{vp.name}</li>)}
              </ul>
              <div style={{fontSize:13,color:'#64748b',marginTop:8}}>Trotzdem archivieren? Die Vorprodukt-Kalkulation bleibt vorerst bestehen.</div>
            </div>
            <div className="modal-footer">
              <button className="btn btn-secondary" onClick={()=>setArchiveWarning(null)}>Abbrechen</button>
              <button className="btn btn-danger" onClick={()=>{doSaveArt(archiveWarning.art);setArchiveWarning(null);}}>Trotzdem archivieren</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── RECIPE TAB ────────────────────────────────────────────────────────────────

function RecipeModal({recipe, onSave, onClose, articles=[], templates=[], deliveryRate=30}) {
  const isNew = !recipe.id;
  const [form, setForm] = useState({
    name:'', vkBrutto:0, vkUber:'', weEuro:0, mwst:7, anzahl:'', brot:'', archiv:false, zutaten:[], ...recipe,
  });
  const f = (k,v) => setForm(p=>({...p,[k]:v}));

  const activeArts = useMemo(()=>articles.filter(a=>!a.archiv).sort((a,b)=>a.name.localeCompare(b.name,'de')),[articles]);

  const setZutat = (i,k,v) => f('zutaten', form.zutaten.map((z,j)=>j===i?{...z,[k]:v}:z));
  const addZutat = () => f('zutaten', [...form.zutaten, {art:'',name:'',menge:0,einheit:'St'}]);
  const delZutat = (i) => f('zutaten', form.zutaten.filter((_,j)=>j!==i));

  const computedWE = useMemo(()=>{
    if (!form.zutaten.length) return null;
    return form.zutaten.reduce((sum,z)=>{
      const art = articles.find(a=>a.id===z.art);
      if (!art || !z.menge) return sum;
      return sum + pricePerUnit(art, z.variantLief) * z.menge;
    }, 0);
  }, [form.zutaten, articles]);

  const weEuro = computedWE !== null ? computedWE : (parseFloat(form.weEuro)||0);
  const mwstFactor = 1 + form.mwst/100;
  const vkNetto = form.vkBrutto > 0 ? form.vkBrutto / mwstFactor : 0;
  const wePct = vkNetto > 0 ? (weEuro / vkNetto * 100) : 0;
  const dbNetto = vkNetto - weEuro;
  const suggestedDeliveryVK = form.vkBrutto > 0 ? form.vkBrutto / (1 - deliveryRate/100) : 0;

  const save = () => onSave({
    ...form,
    id: form.id || ('R'+uid()),
    vkBrutto: parseFloat(form.vkBrutto)||0,
    vkUber: form.vkUber ? parseFloat(form.vkUber) : null,
    weEuro: parseFloat(weEuro.toFixed(4)),
    wePct: parseFloat(wePct.toFixed(2)),
    dbNetto: parseFloat(dbNetto.toFixed(4)),
    mwst: parseInt(form.mwst),
    anzahl: form.anzahl ? parseInt(form.anzahl) : null,
    zutaten: form.zutaten,
  });

  return (
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal modal-lg">
        <div className="modal-header">
          <h3>{isNew?'Neues Rezept':'Rezept bearbeiten'}</h3>
          <button className="btn btn-ghost" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          <div className="form-row"><label>Name *</label>
            <input type="text" value={form.name} onChange={e=>f('name',e.target.value)} placeholder="Rezeptname"/>
          </div>
          <div className="form-grid">
            <div className="form-row"><label>VK Brutto Instore</label>
              <input type="number" value={form.vkBrutto||''} onChange={e=>f('vkBrutto',e.target.value)} step="0.10" placeholder="0,00"/>
            </div>
            <div className="form-row"><label>VK Brutto Uber (optional)</label>
              <input type="number" value={form.vkUber||''} onChange={e=>f('vkUber',e.target.value)} step="0.10" placeholder="—"/>
            </div>
          </div>
          <div className="form-grid">
            <div className="form-row"><label>MwSt.</label>
              <select value={form.mwst} onChange={e=>f('mwst',e.target.value)}>
                <option value={7}>7 % (To-Go / Lebensmittel)</option>
                <option value={19}>19 % (Inhouse)</option>
              </select>
            </div>
            <div className="form-row"><label>Stückzahl / Woche</label>
              <input type="number" value={form.anzahl||''} onChange={e=>f('anzahl',e.target.value)} placeholder="—"/>
            </div>
          </div>

          {/* ── Zutaten ── */}
          <div className="section-title" style={{marginTop:8}}>Zutaten <span style={{fontSize:11,color:'#94a3b8',fontWeight:400,textTransform:'none'}}>(optional — WE wird dann automatisch berechnet)</span></div>
          <div style={{background:'#f8fafc',border:'1px solid #e2e8f0',borderRadius:6,padding:12,marginBottom:14}}>
            {form.zutaten.length > 0 && (
              <div style={{display:'grid',gridTemplateColumns:'2fr 1fr 80px 60px 65px auto',gap:8,marginBottom:8,fontSize:11,fontWeight:600,color:'#64748b',textTransform:'uppercase'}}>
                <span>Artikel</span><span>Lieferant</span><span>Menge</span><span>Einheit</span><span style={{textAlign:'right'}}>€</span><span></span>
              </div>
            )}
            {form.zutaten.map((z,i)=>{
              const art = articles.find(a=>a.id===z.art);
              const sups = art ? allSuppliers(art) : [];
              const hasVariants = sups.length > 1;
              const activePpu = art ? pricePerUnit(art, z.variantLief) : 0;
              const defaultPpu = art ? pricePerUnit(art) : 0;
              const zeilKosten = art ? activePpu * z.menge : null;
              const saving = (hasVariants && z.variantLief && z.variantLief !== art.lief)
                ? ((activePpu - defaultPpu) / defaultPpu * 100) : null;
              const cheapest = hasVariants ? sups.reduce((m,s)=>{
                const p=s.ek/(art.g||1); return p<m.ppu?{lief:s.lief,ppu:p}:m;
              },{lief:sups[0].lief,ppu:sups[0].ek/(art.g||1)}) : null;
              const cheaperAvailable = cheapest && cheapest.ppu < activePpu - 0.001
                ? {lief:cheapest.lief, ppu:cheapest.ppu, savPct:(activePpu-cheapest.ppu)/activePpu*100} : null;
              return (
                <div key={i} style={{marginBottom:6}}>
                  <div style={{display:'grid',gridTemplateColumns:'2fr 1fr 80px 50px 65px auto',gap:8,alignItems:'center'}}>
                    <select value={z.art||''} onChange={e=>{
                      const a2 = articles.find(a=>a.id===e.target.value);
                      setZutat(i,'art',e.target.value);
                      if(a2){ setZutat(i,'name',a2.name); setZutat(i,'einheit',a2.e); setZutat(i,'variantLief',''); }
                    }} style={{fontSize:12}}>
                      <option value="">— Artikel wählen —</option>
                      {['Food','Bev','Nonfood'].map(cat=>{
                        const grp = activeArts.filter(a=>getKat(a)===cat);
                        return grp.length ? <optgroup key={cat} label={cat}>{grp.map(a=><option key={a.id} value={a.id}>{a.name}</option>)}</optgroup> : null;
                      })}
                    </select>
                    {hasVariants ? (
                      <select value={z.variantLief||art.lief} onChange={e=>setZutat(i,'variantLief',e.target.value)} style={{fontSize:12,borderColor:'#a5b4fc'}}>
                        {sups.map((s,si)=>(
                          <option key={si} value={s.lief}>{s.lief||'—'} ({fmt(s.ek/(art.g||1))}/{art.e}){s.isDefault?' ★':''}</option>
                        ))}
                      </select>
                    ) : (
                      <span style={{fontSize:12,color:'#94a3b8',padding:'5px 0'}}>{art?.lief||'—'}</span>
                    )}
                    <input type="number" value={z.menge||''} step="0.001"
                      onChange={e=>setZutat(i,'menge',parseFloat(e.target.value)||0)}
                      style={{fontSize:12,padding:'5px 8px'}}/>
                    <span style={{fontSize:12,color:'#64748b',padding:'5px 4px',textAlign:'center'}}>{art?.e||z.einheit||'—'}</span>
                    <div style={{textAlign:'right',fontSize:12,fontWeight:600,color:zeilKosten>0?'#374151':'#94a3b8',fontFamily:'monospace',whiteSpace:'nowrap'}}>
                      {zeilKosten!=null&&zeilKosten>0 ? fmt(zeilKosten) : '—'}
                    </div>
                    <button className="btn btn-danger btn-xs" onClick={()=>delZutat(i)}>✕</button>
                  </div>
                  {saving !== null && (
                    <div style={{fontSize:11,color:saving<0?'#16a34a':'#dc2626',paddingLeft:4,marginTop:2}}>
                      {saving<0?'▼ Einsparung':'▲ Aufpreis'} {Math.abs(saving).toFixed(1)}% vs. Standard ({fmt(defaultPpu)}/{art.e})
                      {' · '}{fmt(activePpu*z.menge)} statt {fmt(defaultPpu*z.menge)}
                    </div>
                  )}
                  {cheaperAvailable && !saving && (
                    <div style={{fontSize:11,color:'#16a34a',paddingLeft:4,marginTop:2}}>
                      ▼ {cheaperAvailable.savPct.toFixed(1)}% günstiger bei <strong>{cheaperAvailable.lief}</strong>: {fmt(cheaperAvailable.ppu)}/{art.e}
                    </div>
                  )}
                </div>
              );
            })}
            <div style={{display:'flex',gap:6,marginTop:6,alignItems:'center',flexWrap:'wrap'}}>
              {templates.length > 0 && <span style={{fontSize:11,color:'#94a3b8'}}>Vorlage:</span>}
              {templates.map(tpl=>(
                <button key={tpl.id} className="btn btn-secondary btn-xs" onClick={()=>f('zutaten',[...form.zutaten,...tpl.zutaten])}>
                  + {tpl.name}
                </button>
              ))}
              <button className="btn btn-secondary btn-sm" style={{marginLeft:'auto'}} onClick={addZutat}>+ Zutat</button>
            </div>
          </div>

          {/* ── WE manuell (nur wenn keine Zutaten) ── */}
          {computedWE === null && (
            <div className="form-row"><label>Wareneinsatz € <span style={{color:'#94a3b8',fontWeight:400,textTransform:'none'}}>(manuell)</span></label>
              <input type="number" value={form.weEuro||''} onChange={e=>f('weEuro',e.target.value)} step="0.01" placeholder="0,00"/>
            </div>
          )}

          {/* ── Kennzahlen ── */}
          {form.vkBrutto > 0 && (
            <div style={{background:'#1a1a1a',color:'white',borderRadius:8,padding:'14px 16px',display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr 1fr',gap:10,textAlign:'center',marginTop:4}}>
              <div>
                <div style={{fontSize:10,color:'#888',marginBottom:4}}>WE €{computedWE!==null&&<span style={{color:'#fb923c'}}> ⟳ auto</span>}</div>
                <div style={{fontSize:17,fontWeight:700}}>{fmt(weEuro)}</div>
              </div>
              <div>
                <div style={{fontSize:10,color:'#888',marginBottom:4}}>WE %</div>
                <div style={{fontSize:19,fontWeight:700,color:wePct<=28?'#4ade80':wePct<=38?'#fb923c':'#f87171'}}>{wePct.toFixed(1)}%</div>
              </div>
              <div>
                <div style={{fontSize:10,color:'#888',marginBottom:4}}>DB Netto</div>
                <div style={{fontSize:19,fontWeight:700}}>{fmt(dbNetto)}</div>
              </div>
              <div>
                <div style={{fontSize:10,color:'#888',marginBottom:4}}>VK Netto</div>
                <div style={{fontSize:17,fontWeight:700}}>{fmt(vkNetto)}</div>
              </div>
              <div style={{borderLeft:'1px solid #333',paddingLeft:8}}>
                <div style={{fontSize:10,color:'#a78bfa',marginBottom:4}}>Delivery VK</div>
                <div style={{fontSize:17,fontWeight:700,color:'#c4b5fd'}}>{fmt(suggestedDeliveryVK)}</div>
                <div style={{fontSize:9,color:'#666',marginTop:2}}>{deliveryRate}% Provision</div>
              </div>
            </div>
          )}
        </div>
        {!isNew&&<div style={{padding:'0 20px 12px'}}>
          <label style={{display:'flex',alignItems:'center',gap:8,fontSize:13,cursor:'pointer'}}>
            <input type="checkbox" checked={form.archiv||false} onChange={e=>f('archiv',e.target.checked)} style={{width:'auto'}}/>
            Archiviert
          </label>
        </div>}
        <div className="modal-footer">
          <button className="btn btn-secondary" onClick={onClose}>Abbrechen</button>
          <button className="btn btn-primary" disabled={!form.name.trim()||!form.vkBrutto} onClick={save}>Speichern</button>
        </div>
      </div>
    </div>
  );
}

function RecipeTab({recipes, setRecipes, pendingModal=null, onPendingClear, upsert, del, articles=[], templates=[], deliveryRate=30}) {
  const [detail, setDetail] = useState(null);
  const [modal, setModal] = useState(null);
  const [showArchiv, setShowArchiv] = useState(false);

  useEffect(()=>{
    if (pendingModal !== null) { setModal(pendingModal); onPendingClear&&onPendingClear(); }
  // eslint-disable-next-line react-hooks/exhaustive-deps
  },[pendingModal]);

  const saveRecipe = (r) => {
    setRecipes(prev=>prev.find(x=>x.id===r.id)?prev.map(x=>x.id===r.id?r:x):[...prev,r]);
    upsert&&upsert('recipes',r);
    setModal(null);
  };
  const deleteRecipe = (id) => {
    setRecipes(prev=>prev.filter(r=>r.id!==id));
    del&&del('recipes', id);
    setDetail(null);
  };

  const visibleRecipes = recipes.filter(r=>showArchiv||!r.archiv);
  const baseCats = [{label:'🥪 Sandwiches', ids:['R001','R002','R003','R004','R005','R006','R007','R008']},
                    {label:'☕ Getränke', ids:['R009','R010','R011','R012','R013']}];
  const categorizedIds = new Set(baseCats.flatMap(c=>c.ids));
  const uncategorized = visibleRecipes.filter(r=>!categorizedIds.has(r.id));
  const cats = uncategorized.length
    ? [...baseCats,{label:'Weitere Rezepte', ids:uncategorized.map(r=>r.id)}]
    : baseCats;

  return (
    <div className="tab-content">
      <div className="stats-row">
        {[{label:'Rezepte aktiv',v:recipes.filter(r=>!r.archiv).length,c:''},
          {label:'Marge OK (≤28%)',v:recipes.filter(r=>!r.archiv&&r.wePct<=28).length,c:'#16a34a'},
          {label:'Marge Warn. (28–38%)',v:recipes.filter(r=>!r.archiv&&r.wePct>28&&r.wePct<=38).length,c:'#d97706'},
          {label:'Marge Alarm (>38%)',v:recipes.filter(r=>!r.archiv&&r.wePct>38).length,c:'#dc2626'},
        ].map(s=>(
          <div className="stat-card" key={s.label}>
            <div className="stat-label">{s.label}</div>
            <div className="stat-value" style={s.c?{color:s.c}:{}}>{s.v}</div>
          </div>
        ))}
      </div>
      <div className="toolbar">
        <label style={{display:'flex',alignItems:'center',gap:6,fontSize:13,cursor:'pointer'}}>
          <span className="switch"><input type="checkbox" checked={showArchiv} onChange={e=>setShowArchiv(e.target.checked)}/><span className="slider"></span></span>
          Archiv
        </label>
        <button className="btn btn-primary" style={{marginLeft:'auto'}} onClick={()=>setModal({})}>+ Neues Rezept</button>
      </div>
      {cats.map(cat=>{
        const recs = visibleRecipes.filter(r=>cat.ids.includes(r.id));
        if(!recs.length) return null;
        return (
          <div key={cat.label} style={{marginBottom:20}}>
            <div className="section-title">{cat.label}</div>
            <div className="card">
              <table>
                <thead><tr>
                  <th>Rezept</th><th>VK Instore</th><th>VK Uber</th>
                  <th>WE €</th><th>WE %</th><th>DB Netto</th><th>MwSt</th><th>Marge</th><th></th>
                </tr></thead>
                <tbody>
                {recs.map(r=>{
                  const a = ampelWE(r.wePct);
                  return (
                    <tr key={r.id} style={r.archiv?{opacity:.45}:{}}>
                      <td><strong>{r.name}</strong></td>
                      <td>{fmt(r.vkBrutto)}</td>
                      <td>{r.vkUber ? fmt(r.vkUber) : <span style={{color:'#94a3b8'}}>—</span>}</td>
                      <td>{fmt(r.weEuro)}</td>
                      <td style={{fontFamily:'monospace'}}>{fmtPct(r.wePct)}</td>
                      <td style={{fontFamily:'monospace',fontWeight:600}}>{fmt(r.dbNetto)}</td>
                      <td><span className="badge badge-gray">{r.mwst}%</span></td>
                      <td>
                        <span className={`ampel ${a}`}><span className="dot"/>
                          {a==='green'?'OK':a==='yellow'?'Warn.':'Alarm'}
                        </span>
                      </td>
                      <td style={{whiteSpace:'nowrap'}}>
                        <button className="btn btn-ghost btn-xs" onClick={()=>setDetail(r)}>Details</button>
                        <button className="btn btn-ghost btn-xs" onClick={()=>setModal(r)}>✎</button>
                      </td>
                    </tr>
                  );
                })}
                </tbody>
              </table>
            </div>
          </div>
        );
      })}
      {detail && (
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setDetail(null)}>
          <div className="modal">
            <div className="modal-header">
              <h3>{detail.name}</h3>
              <button className="btn btn-ghost" onClick={()=>setDetail(null)}>✕</button>
            </div>
            <div className="modal-body">
              <div className="form-grid" style={{marginBottom:16}}>
                {[['VK Instore',fmt(detail.vkBrutto)],
                  ['VK Uber',detail.vkUber?fmt(detail.vkUber):'—'],
                  ['Wareneinsatz',fmt(detail.weEuro)+' ('+fmtPct(detail.wePct)+')'],
                  ['DB Netto',fmt(detail.dbNetto)],
                  ['MwSt.',detail.mwst+'%'],
                  ['Brot',detail.brot||'—'],
                ].map(([k,v])=>(
                  <div key={k} style={{background:'#f8fafc',borderRadius:6,padding:'10px 12px'}}>
                    <div style={{fontSize:11,color:'#64748b',fontWeight:600,textTransform:'uppercase'}}>{k}</div>
                    <div style={{fontSize:15,fontWeight:600,marginTop:2}}>{v}</div>
                  </div>
                ))}
              </div>
              <div className={`ampel ${ampelWE(detail.wePct)}`} style={{fontSize:14,padding:'10px 14px',background:'#f8fafc',borderRadius:6,display:'flex'}}>
                <span className="dot" style={{width:12,height:12}}/>
                Wareneinsatz {fmtPct(detail.wePct)} —
                {ampelWE(detail.wePct)==='green'?' Marge in Ordnung':
                 ampelWE(detail.wePct)==='yellow'?' Marge grenzwertig':
                 ' Marge kritisch — prüfen!'}
              </div>
              <div style={{marginTop:16,padding:'10px 14px',background:'#f0fdf4',border:'1px solid #bbf7d0',borderRadius:6,fontSize:13,color:'#166534'}}>
                <strong>VK-Empfehlung bei Ziel-WE 28%:</strong> {fmt(detail.weEuro/0.28 * (detail.mwst===19?1.19:1.07))}
                {' '}| bei 32%: {fmt(detail.weEuro/0.32 * (detail.mwst===19?1.19:1.07))}
              </div>
              {(detail.zutaten||[]).length > 0 && (
                <div style={{marginTop:16}}>
                  <div style={{fontSize:12,fontWeight:600,color:'#64748b',textTransform:'uppercase',letterSpacing:'.3px',marginBottom:8}}>Zutaten</div>
                  <div style={{border:'1px solid #e2e8f0',borderRadius:6,overflow:'hidden'}}>
                    <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
                      <thead><tr style={{background:'#f8fafc'}}>
                        <th style={{padding:'6px 10px',textAlign:'left',fontWeight:600,color:'#64748b'}}>Artikel</th>
                        <th style={{padding:'6px 10px',textAlign:'right',fontWeight:600,color:'#64748b'}}>Menge</th>
                        <th style={{padding:'6px 10px',textAlign:'right',fontWeight:600,color:'#64748b'}}>Kosten</th>
                      </tr></thead>
                      <tbody>
                        {detail.zutaten.map((z,i)=>{
                          const art = articles.find(a=>a.id===z.art);
                          const kosten = art ? pricePerUnit(art, z.variantLief)*z.menge : null;
                          return (
                            <tr key={i} style={{borderTop:'1px solid #f1f5f9'}}>
                              <td style={{padding:'6px 10px'}}>{z.name||z.art||'—'}{z.variantLief&&z.variantLief!==art?.lief&&<span style={{color:'#94a3b8',marginLeft:4}}>({z.variantLief})</span>}</td>
                              <td style={{padding:'6px 10px',textAlign:'right',fontFamily:'monospace'}}>{z.menge} {z.einheit}</td>
                              <td style={{padding:'6px 10px',textAlign:'right',fontFamily:'monospace',fontWeight:600}}>{kosten!=null?fmt(kosten):'—'}</td>
                            </tr>
                          );
                        })}
                        <tr style={{borderTop:'2px solid #e2e8f0',background:'#f8fafc'}}>
                          <td colSpan={2} style={{padding:'7px 10px',fontWeight:600,fontSize:12}}>Wareneinsatz gesamt</td>
                          <td style={{padding:'7px 10px',textAlign:'right',fontFamily:'monospace',fontWeight:700,color:'#e85d04'}}>{fmt(detail.weEuro)}</td>
                        </tr>
                      </tbody>
                    </table>
                  </div>
                </div>
              )}
            </div>
            <div className="modal-footer">
              <button className="btn btn-danger btn-sm" style={{marginRight:'auto'}} onClick={()=>deleteRecipe(detail.id)}>Löschen</button>
              <button className="btn btn-secondary" onClick={()=>setDetail(null)}>Schließen</button>
              <button className="btn btn-primary" onClick={()=>{setModal(detail);setDetail(null);}}>Bearbeiten</button>
            </div>
          </div>
        </div>
      )}
      {modal!==null&&<RecipeModal recipe={modal} onSave={saveRecipe} onClose={()=>setModal(null)} articles={articles} templates={templates} deliveryRate={deliveryRate}/>}
    </div>
  );
}

// ── VP TAB ────────────────────────────────────────────────────────────────────

function VPModal({vp, articles, onSave, onClose}) {
  const isNew = !vp.id;
  const [form, setForm] = useState({
    name: vp.name||'',
    outputKg: vp.outputKg||0,
    zutaten: vp.zutaten||[],
    archiv: vp.archiv||false,
  });
  const f = (k,v) => setForm(p=>({...p,[k]:v}));

  const activeArts = useMemo(()=>articles.filter(a=>!a.archiv).sort((a,b)=>a.name.localeCompare(b.name)),[articles]);

  const setZutat = (i,k,v) => f('zutaten',form.zutaten.map((z,j)=>j===i?{...z,[k]:v}:z));
  const addZutat = () => f('zutaten',[...form.zutaten,{art:'',name:'',menge:0,einheit:'kg'}]);
  const delZutat = (i) => f('zutaten',form.zutaten.filter((_,j)=>j!==i));

  const kosten = useMemo(()=>{
    return form.zutaten.reduce((sum,z)=>{
      const art = articles.find(a=>a.id===z.art);
      if (!art) return sum;
      return sum + pricePerUnit(art, z.variantLief)*z.menge;
    },0);
  },[form.zutaten,articles]);

  const preisKg = form.outputKg > 0 ? kosten/form.outputKg : 0;

  return (
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal modal-lg">
        <div className="modal-header">
          <h3>{isNew?'Neues Vorprodukt':'VP bearbeiten'}</h3>
          <button className="btn btn-ghost" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          <div className="form-grid">
            <div className="form-row"><label>Name VP</label>
              <input type="text" value={form.name} onChange={e=>f('name',e.target.value)} placeholder="z.B. Kimchi-VP"/>
            </div>
            <div className="form-row"><label>Output Menge (kg)</label>
              <input type="number" value={form.outputKg||''} onChange={e=>f('outputKg',parseFloat(e.target.value)||0)} step="0.01"/>
            </div>
          </div>
          <div className="section-title">Zutaten</div>
          <div style={{background:'#f8fafc',border:'1px solid #e2e8f0',borderRadius:6,padding:12,marginBottom:12}}>
            <div style={{display:'grid',gridTemplateColumns:'2fr 1fr 80px 70px auto',gap:8,marginBottom:8,fontSize:11,fontWeight:600,color:'#64748b',textTransform:'uppercase'}}>
              <span>Artikel</span><span>Lieferant</span><span>Menge</span><span>Einheit</span><span></span>
            </div>
            {form.zutaten.map((z,i)=>{
              const art = articles.find(a=>a.id===z.art);
              const suppliers = art ? allSuppliers(art) : [];
              const hasVariants = suppliers.length > 1;
              const activePpu = art ? pricePerUnit(art, z.variantLief) : 0;
              const defaultPpu = art ? pricePerUnit(art) : 0;
              const saving = (hasVariants && z.variantLief && z.variantLief !== art.lief)
                ? ((activePpu - defaultPpu) / defaultPpu * 100) : null;
              return (
                <div key={i} style={{marginBottom:6}}>
                  <div style={{display:'grid',gridTemplateColumns:'2fr 1fr 80px 70px auto',gap:8,alignItems:'center'}}>
                    <select value={z.art||''} onChange={e=>{
                      const a2 = articles.find(a=>a.id===e.target.value);
                      setZutat(i,'art',e.target.value);
                      if(a2){ setZutat(i,'name',a2.name); setZutat(i,'variantLief',''); }
                    }} style={{fontSize:12}}>
                      <option value="">— Artikel wählen —</option>
                      {['Food','Bev','Nonfood'].map(cat=>{
                        const grp = activeArts.filter(a=>getKat(a)===cat);
                        return grp.length ? <optgroup key={cat} label={cat}>{grp.map(a=><option key={a.id} value={a.id}>{a.name}</option>)}</optgroup> : null;
                      })}
                    </select>
                    {hasVariants ? (
                      <select value={z.variantLief||art.lief} onChange={e=>setZutat(i,'variantLief',e.target.value)} style={{fontSize:12,borderColor:'#a5b4fc'}}>
                        {suppliers.map((s,si)=>(
                          <option key={si} value={s.lief}>
                            {s.lief||'—'} ({fmt(s.ek/(art.g||1))}/{art.e}){s.isDefault?' ★':''}
                          </option>
                        ))}
                      </select>
                    ) : (
                      <span style={{fontSize:12,color:'#94a3b8',padding:'5px 0'}}>{art?.lief||'—'}</span>
                    )}
                    <input type="number" value={z.menge||''} step="0.001"
                      onChange={e=>setZutat(i,'menge',parseFloat(e.target.value)||0)}
                      style={{fontSize:12,padding:'5px 8px'}}/>
                    <input type="text" value={z.einheit||'kg'}
                      onChange={e=>setZutat(i,'einheit',e.target.value)}
                      style={{fontSize:12,padding:'5px 8px'}}/>
                    <button className="btn btn-danger btn-xs" onClick={()=>delZutat(i)}>✕</button>
                  </div>
                  {saving !== null && (
                    <div style={{fontSize:11,color:saving<0?'#16a34a':'#dc2626',paddingLeft:4,marginTop:2}}>
                      {saving<0?'▼ Einsparung':'▲ Aufpreis'} {Math.abs(saving).toFixed(1)}% vs. Standard ({fmt(defaultPpu)}/{art.e})
                      {' · '}{fmt(activePpu*z.menge)} statt {fmt(defaultPpu*z.menge)}
                    </div>
                  )}
                </div>
              );
            })}
            <button className="btn btn-secondary btn-sm" style={{marginTop:4}} onClick={addZutat}>+ Zutat</button>
          </div>
          <div style={{background:'#1a1a1a',color:'white',borderRadius:6,padding:'14px 16px',display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12,textAlign:'center'}}>
            <div>
              <div style={{fontSize:11,color:'#888',marginBottom:4}}>Kosten gesamt</div>
              <div style={{fontSize:20,fontWeight:700}}>{fmt(kosten)}</div>
            </div>
            <div>
              <div style={{fontSize:11,color:'#888',marginBottom:4}}>Output</div>
              <div style={{fontSize:20,fontWeight:700}}>{(form.outputKg||0).toFixed(2)} kg</div>
            </div>
            <div>
              <div style={{fontSize:11,color:'#888',marginBottom:4}}>Preis/kg netto</div>
              <div style={{fontSize:20,fontWeight:700,color:'#fb923c'}}>{fmt(preisKg)}</div>
            </div>
          </div>
        </div>
        {!isNew&&<div style={{padding:'0 20px 16px'}}>
          <label style={{display:'flex',alignItems:'center',gap:8,fontSize:13,cursor:'pointer'}}>
            <input type="checkbox" checked={form.archiv||false} onChange={e=>setForm(p=>({...p,archiv:e.target.checked}))} style={{width:'auto'}}/>
            Archiviert
          </label>
        </div>}
        <div className="modal-footer">
          <button className="btn btn-secondary" onClick={onClose}>Abbrechen</button>
          <button className="btn btn-primary" onClick={()=>onSave({
            ...vp, id:vp.id||('VP'+uid()), ...form, kosten, preisKg
          })}>
            {isNew?'VP anlegen & als Artikel speichern':'Speichern'}
          </button>
        </div>
      </div>
    </div>
  );
}

function VPTab({vps, setVPs, articles, setArticles, upsert, pendingModal=null, onPendingClear}) {
  const [modal, setModal] = useState(null);
  const [showArchiv, setShowArchiv] = useState(false);

  useEffect(()=>{
    if (pendingModal !== null) { setModal(pendingModal); onPendingClear&&onPendingClear(); }
  // eslint-disable-next-line react-hooks/exhaustive-deps
  },[pendingModal]);

  const visibleVPs = vps.filter(vp=>showArchiv||!vp.archiv);

  const saveVP = (vp) => {
    const isNew = !vps.find(v=>v.id===vp.id);
    setVPs(prev=>isNew?[...prev,vp]:prev.map(v=>v.id===vp.id?vp:v));
    upsert&&upsert('vorprodukte', vp);
    // Sync als Artikel mit Lieferant Simple
    const artId = 'AV'+vp.id;
    const art = {
      id:artId, name:vp.name, g:1, e:'KG',
      ek:parseFloat(vp.preisKg.toFixed(4)),
      lief:'SIMPLE', datum:new Date().toISOString().slice(0,10), archiv:vp.archiv||false,
      varianten:[], _vpId:vp.id
    };
    setArticles(prev=>{
      const ex = prev.find(a=>a.id===artId||a._vpId===vp.id);
      return ex ? prev.map(a=>(a.id===artId||a._vpId===vp.id)?art:a) : [...prev,art];
    });
    upsert&&upsert('articles', art);
    setModal(null);
  };

  return (
    <div className="tab-content">
      <div className="toolbar">
        <div style={{fontSize:13,color:'#64748b'}}><strong>{vps.filter(v=>!v.archiv).length}</strong> Vorprodukte{vps.filter(v=>v.archiv).length>0&&<span style={{color:'#94a3b8'}}> · {vps.filter(v=>v.archiv).length} archiviert</span>}</div>
        <label style={{display:'flex',alignItems:'center',gap:6,fontSize:13,cursor:'pointer'}}>
          <span className="switch"><input type="checkbox" checked={showArchiv} onChange={e=>setShowArchiv(e.target.checked)}/><span className="slider"></span></span>
          Archiv
        </label>
        <button className="btn btn-primary" style={{marginLeft:'auto'}}
          onClick={()=>setModal({name:'',outputKg:0,zutaten:[]})}>
          + Vorprodukt
        </button>
      </div>
      <div className="card">
        <table>
          <thead><tr>
            <th>Vorprodukt</th><th>Output</th><th>Kosten</th><th>€/kg netto</th>
            <th>Zutaten</th><th>In Artikelliste</th><th></th>
          </tr></thead>
          <tbody>
          {visibleVPs.map(vp=>{
            const inArts = articles.some(a=>a._vpId===vp.id||a.name===vp.name&&a.lief&&a.lief.toLowerCase()==='simple');
            return (
              <tr key={vp.id} style={vp.archiv?{opacity:.45}:{}}>
                <td><strong>{vp.name}</strong></td>
                <td>{vp.outputKg} kg</td>
                <td>{fmt(vp.kosten)}</td>
                <td style={{fontFamily:'monospace',fontWeight:600,color:'#e85d04'}}>{fmt(vp.preisKg)}</td>
                <td style={{color:'#64748b',fontSize:12}}>{vp.zutaten.length} Pos.</td>
                <td>{inArts?<span className="badge badge-green">✓ Synced</span>:<span className="badge badge-gray">—</span>}</td>
                <td>
                  <button className="btn btn-ghost btn-xs" onClick={()=>setModal({...vp})}>✎</button>
                </td>
              </tr>
            );
          })}
          </tbody>
        </table>
      </div>
      {modal && <VPModal vp={modal} articles={articles} onSave={saveVP} onClose={()=>setModal(null)}/>}
    </div>
  );
}

function InvoiceTab({articles, setArticles, priceLog, setPriceLog, upsert}) {
  const [apiKey, setApiKey] = useLS('sk_simple_apikey','');
  const [showKey, setShowKey] = useState(false);
  const [file, setFile] = useState(null);
  const [scanning, setScanning] = useState(false);
  const [result, setResult] = useState(null);
  const [confirmed, setConfirmed] = useState({});
  const dropRef = useRef();

  const handleFile = (f) => { setFile(f); setResult(null); setConfirmed({}); };

  const scan = async () => {
    if (!apiKey || !file) return;
    setScanning(true); setResult(null);
    try {
      const b64 = await new Promise((res,rej)=>{
        const r = new FileReader();
        r.onload = e => res(e.target.result.split(',')[1]);
        r.onerror = rej;
        r.readAsDataURL(file);
      });
      const isPdf = file.type==='application/pdf';
      const mediaType = isPdf ? 'application/pdf' : file.type||'image/jpeg';

      const systemPrompt = `Du bist ein Rechnungsanalyse-Assistent für eine Gastronomie-Küche.
Extrahiere aus dem Dokument alle Positionen mit Name, Menge, Einheit und Preis.
Antworte NUR mit gültigem JSON in diesem Format:
{"positionen":[{"name":"Artikel","menge":1,"einheit":"KG","preisNetto":12.50,"preisProEinheit":12.50}]}
Preise in Euro als Dezimalzahl. Falls Bruttopreis, vermerke es im Namen mit (brutto).`;

      const resp = await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{
          'x-api-key':apiKey,
          'anthropic-version':'2023-06-01',
          'content-type':'application/json',
          'anthropic-dangerous-direct-browser-access':'true',
        },
        body:JSON.stringify({
          model:'claude-haiku-4-5-20251001',
          max_tokens:2048,
          system: systemPrompt,
          messages:[{role:'user',content:[
            {type:isPdf?'document':'image',source:{type:'base64',media_type:mediaType,data:b64}},
            {type:'text',text:'Extrahiere alle Artikel mit Preisen aus diesem Dokument.'}
          ]}]
        })
      });
      const json = await resp.json();
      if (!resp.ok) throw new Error(json.error?.message||'API Fehler');
      const text = json.content[0].text;
      const match = text.match(/\{[\s\S]*\}/);
      if (!match) throw new Error('Kein JSON in Antwort');
      const parsed = JSON.parse(match[0]);

      // Match gegen Artikelliste
      const positions = (parsed.positionen||[]).map(p=>{
        const found = articles.find(a=>!a.archiv&&a.name.toLowerCase().includes(p.name.toLowerCase().slice(0,6)));
        const ppu = p.preisProEinheit||p.preisNetto;
        const currentPpu = found ? pricePerUnit(found) : null;
        const diff = (found&&currentPpu) ? ((ppu-currentPpu)/currentPpu*100) : null;
        return {...p, matched:found, currentPpu, diff, flagged: diff!==null && diff>3};
      });
      setResult(positions);
    } catch(e) {
      setResult([{error:e.message}]);
    }
    setScanning(false);
  };

  const confirmAll = () => {
    if (!result) return;
    const updates = result.filter(p=>p.matched&&p.flagged&&!confirmed[p.name]);
    const logs = [];
    const updatedArts = [];
    setArticles(prev=>prev.map(a=>{
      const match = updates.find(p=>p.matched&&p.matched.id===a.id);
      if (!match) return a;
      const newArt = {...a, ek:match.preisProEinheit*a.g, datum:new Date().toISOString().slice(0,10)};
      logs.push({id:'L'+uid(),datum:new Date().toISOString(),typ:'Rechnung-Import',
        produkt:a.name,altPreis:pricePerUnit(a),neuPreis:match.preisProEinheit||match.preisNetto,
        quelle:'Rechnung: '+file.name,status:'bestätigt'});
      updatedArts.push(newArt);
      return newArt;
    }));
    setPriceLog(prev=>[...logs,...prev]);
    if (upsert) { upsert('articles', updatedArts); upsert('price_log', logs); }
    setConfirmed(updates.reduce((o,p)=>({...o,[p.name]:true}),{}));
  };

  const dragEvents = {
    onDragOver:e=>{e.preventDefault();dropRef.current.classList.add('drag')},
    onDragLeave:()=>dropRef.current.classList.remove('drag'),
    onDrop:e=>{e.preventDefault();dropRef.current.classList.remove('drag');const f=e.dataTransfer.files[0];if(f)handleFile(f);}
  };

  const flags = result?.filter(p=>p.flagged&&!p.error) || [];

  return (
    <div className="tab-content">
      {/* API Key */}
      <div className="card" style={{padding:'14px 16px',marginBottom:16}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <span style={{fontSize:13,color:'#64748b',fontWeight:600,whiteSpace:'nowrap'}}>Anthropic API Key</span>
          <input type={showKey?'text':'password'} value={apiKey} onChange={e=>setApiKey(e.target.value)}
            placeholder="sk-ant-..." style={{flex:1,fontSize:12,padding:'6px 10px'}}/>
          <button className="btn btn-secondary btn-sm" onClick={()=>setShowKey(s=>!s)}>{showKey?'Verbergen':'Zeigen'}</button>
        </div>
        <div style={{fontSize:11,color:'#94a3b8',marginTop:6}}>
          Key wird nur in deinem Browser gespeichert (localStorage). Keine Serverübertragung.
        </div>
      </div>

      {/* Drop Zone */}
      <div ref={dropRef} className="invoice-drop" {...dragEvents} onClick={()=>document.getElementById('inv-file').click()}>
        <input id="inv-file" type="file" accept="image/*,application/pdf" style={{display:'none'}}
          onChange={e=>e.target.files[0]&&handleFile(e.target.files[0])}/>
        <div style={{fontSize:36}}>📄</div>
        <p>{file ? <><strong>{file.name}</strong> ({(file.size/1024).toFixed(0)} KB)</> : 'Rechnung oder Lieferschein hier ablegen (Bild oder PDF)'}</p>
        {file && <p style={{color:'#64748b',fontSize:12}}>Klicken um andere Datei zu wählen</p>}
      </div>

      <div style={{display:'flex',gap:10,margin:'14px 0',alignItems:'center'}}>
        <button className="btn btn-primary" onClick={scan} disabled={!file||!apiKey||scanning} style={{minWidth:160}}>
          {scanning?'⏳ Analysiere…':'🔍 Mit KI scannen'}
        </button>
        {flags.length>0&&<button className="btn btn-secondary" onClick={confirmAll}>
          ✓ Alle {flags.length} Preisänderungen übernehmen
        </button>}
      </div>

      {/* Results */}
      {result && result[0]?.error && (
        <div className="warn-banner">⚠ Fehler: {result[0].error}</div>
      )}
      {result && !result[0]?.error && (
        <div className="card">
          <table>
            <thead><tr>
              <th>Artikel (Rechnung)</th><th>Erkannt als</th><th>Menge</th>
              <th>Preis Rechnung</th><th>Preis aktuell</th><th>Δ</th><th>Status</th>
            </tr></thead>
            <tbody>
            {result.map((p,i)=>{
              const isDone = confirmed[p.name];
              return (
                <tr key={i} style={p.flagged&&!isDone?{background:'#fef9f0'}:{}}>
                  <td>{p.name}</td>
                  <td>{p.matched?<span className="badge badge-blue">{p.matched.name}</span>:<span style={{color:'#94a3b8',fontSize:12}}>nicht erkannt</span>}</td>
                  <td style={{fontFamily:'monospace'}}>{p.menge} {p.einheit}</td>
                  <td style={{fontFamily:'monospace',fontWeight:600}}>{fmt(p.preisProEinheit||p.preisNetto)}</td>
                  <td style={{fontFamily:'monospace'}}>{p.currentPpu!=null?fmt(p.currentPpu):'—'}</td>
                  <td>
                    {p.diff!=null?<span className={p.diff>0?'price-up':'price-down'}>
                      {p.diff>0?'▲':'▼'}{Math.abs(p.diff).toFixed(1)}%
                    </span>:<span className="price-same">—</span>}
                  </td>
                  <td>
                    {isDone?<span className="badge badge-green">✓ Übernommen</span>:
                    p.flagged?<span className="badge badge-orange">⚠ Preiserhöhung</span>:
                    <span className="badge badge-gray">OK</span>}
                  </td>
                </tr>
              );
            })}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

          </div>
          <div className="stat-card">
            <div className="stat-label">Über {SOLL} % Soll</div>
            <div className="stat-value" style={{color:ueberSollCount>0?'#dc2626':'#16a34a'}}>{ueberSollCount} / {mainRecs.length}</div>
          </div>
          <div className="stat-card">
            <div className="stat-label">Bester DB</div>
            <div className="stat-value" style={{fontSize:15,fontWeight:700}}>{bestDBRec?.name||'—'}</div>
            <div className="stat-sub">{bestDBRec?fmt(bestDBRec.dbNetto):''}</div>
          </div>
        </div>

        <div className="card" style={{padding:'20px 24px'}}>
          {sortedMargen.map(r=>{
            const barPct = Math.min(r.wePct/MAX_WE*100, 100);
            const sollPos = SOLL/MAX_WE*100;
            return (
              <div key={r.id} style={{display:'flex',alignItems:'center',marginBottom:9}}>
                <div style={{width:150,fontSize:13,color:'#374151',textAlign:'right',paddingRight:14,flexShrink:0,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{r.name}</div>
                <div style={{flex:1,height:26,position:'relative'}}>
                  <div style={{width:barPct+'%',minWidth:4,height:'100%',background:weColor(r.wePct),borderRadius:4,display:'flex',alignItems:'center',paddingLeft:8}}>
                    {barPct>18&&<span style={{fontSize:11,fontWeight:700,color:'white'}}>{r.wePct.toFixed(1)}%</span>}
                  </div>
                  <div style={{position:'absolute',top:0,bottom:0,left:sollPos+'%',borderLeft:'2px dashed #94a3b8',pointerEvents:'none'}}/>
                  {barPct<=18&&<span style={{position:'absolute',left:barPct+'%',top:'50%',transform:'translateY(-50%)',paddingLeft:6,fontSize:11,color:'#374151',fontWeight:600}}>{r.wePct.toFixed(1)}%</span>}
                </div>
              </div>
            );
          })}
          {/* X-Achse */}
          <div style={{display:'flex',marginLeft:150,marginTop:8,paddingLeft:0}}>
            {xTicks.map((v,i)=>(
              <div key={v} style={{flex:i===0?0:10,minWidth:i===0?0:undefined,fontSize:10,color:'#94a3b8',textAlign:i===0?'left':'center'}}>
                {v>0?v+'%':'0%'}
              </div>
            ))}
          </div>
        </div>
        <div style={{marginTop:12,fontSize:12,color:'#94a3b8',lineHeight:1.6}}>
          Ampel: grün ≤ {SOLL}%, orange ≤ 30%, rot {'>'} 30% WE (to-go, 7% USt). Rezepte mit 19% MwSt fließen nicht in Ø-Werte ein.
        </div>
      </>)}

      {view==='db'&&(<>
        <div className="stats-row" style={{marginBottom:20}}>
          <div className="stat-card">
            <div className="stat-label">Bester DB</div>
            <div className="stat-value" style={{fontSize:15}}>{sortedDB[0]?.name||'—'}</div>
            <div className="stat-sub">{sortedDB[0]?fmt(sortedDB[0].dbNetto):''}</div>
          </div>
          <div className="stat-card">
            <div className="stat-label">Schwächster DB</div>
            <div className="stat-value" style={{fontSize:15,color:'#dc2626'}}>{sortedDB[sortedDB.length-1]?.name||'—'}</div>
            <div className="stat-sub">{sortedDB[sortedDB.length-1]?fmt(sortedDB[sortedDB.length-1].dbNetto):''}</div>
          </div>
          <div className="stat-card">
            <div className="stat-label">Ø DB Netto</div>
            <div className="stat-value">{fmt(avgDB)}</div>
          </div>
          <div className="stat-card">
            <div className="stat-label">Gesamt-DB (Stückzahlen)</div>
            <div className="stat-value" style={{fontSize:16}}>{fmt(totalDB)}</div>
            <div className="stat-sub">bei hinterlegten Stückzahlen</div>
          </div>
        </div>
        <div className="card" style={{padding:'20px 24px'}}>
          {sortedDB.map(r=>{
            const barPct = (r.dbNetto/maxDB)*100;
            const dbColor = r.dbNetto>=7?'#16a34a':r.dbNetto>=4?'#d97706':'#dc2626';
            return (
              <div key={r.id} style={{display:'flex',alignItems:'center',marginBottom:9}}>
                <div style={{width:150,fontSize:13,color:'#374151',textAlign:'right',paddingRight:14,flexShrink:0,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{r.name}</div>
                <div style={{flex:1,height:26,position:'relative'}}>
                  <div style={{width:barPct+'%',minWidth:4,height:'100%',background:dbColor,borderRadius:4,display:'flex',alignItems:'center',paddingLeft:8}}>
                    {barPct>20&&<span style={{fontSize:11,fontWeight:700,color:'white'}}>{fmt(r.dbNetto)}</span>}
                  </div>
                  {barPct<=20&&<span style={{position:'absolute',left:barPct+'%',top:'50%',transform:'translateY(-50%)',paddingLeft:6,fontSize:11,color:'#374151',fontWeight:600}}>{fmt(r.dbNetto)}</span>}
                </div>
              </div>
            );
          })}
        </div>
        <div style={{marginTop:12,fontSize:12,color:'#94a3b8'}}>
          DB Netto = VK Brutto ÷ (1+MwSt) − Wareneinsatz. Grün ≥ 7 €, Orange ≥ 4 €, Rot {'<'} 4 €.
        </div>
      </>)}

      {view==='preisalarm'&&(<>
        <div className="stats-row" style={{marginBottom:20}}>
          <div className="stat-card">
            <div className="stat-label">Veraltet (90–180d)</div>
            <div className="stat-value" style={{color:'#d97706'}}>{staleArts.filter(a=>a.days<=180).length}</div>
          </div>
          <div className="stat-card">
            <div className="stat-label">Kritisch ({'>'} 180d)</div>
            <div className="stat-value" style={{color:'#dc2626'}}>{staleArts.filter(a=>a.days>180).length}</div>
          </div>
          <div className="stat-card">
            <div className="stat-label">Ohne Preisdatum</div>
            <div className="stat-value">{articles.filter(a=>!a.archiv&&!a.datum).length}</div>
          </div>
          <div className="stat-card">
            <div className="stat-label">Aktuelle Preise ({'<'} 90d)</div>
            <div className="stat-value" style={{color:'#16a34a'}}>{articles.filter(a=>!a.archiv&&a.datum&&Math.floor((now-new Date(a.datum))/86400000)<=90).length}</div>
          </div>
        </div>
        <div className="card">
          <table>
            <thead><tr>
              <th>Artikel</th><th>Lieferant</th><th>Letzter Preis</th><th>EK</th><th>Alter</th><th>Status</th>
            </tr></thead>
            <tbody>
              {staleArts.map(a=>(
                <tr key={a.id}>
                  <td><strong>{a.name}</strong></td>
                  <td>{a.lief||'—'}</td>
                  <td>{new Date(a.datum).toLocaleDateString('de-DE')}</td>
                  <td>{fmt(a.ek)}</td>
                  <td style={{fontFamily:'monospace'}}>{a.days}d</td>
                  <td><span className={`ampel ${a.days>180?'red':'yellow'}`}><span className="dot"/>{a.days>180?'Kritisch':'Veraltet'}</span></td>
                </tr>
              ))}
              {!staleArts.length&&<tr><td colSpan={6} className="empty">Alle Preise aktuell</td></tr>}
            </tbody>
          </table>
        </div>
      </>)}
    </div>
  );
}

// ── APP ───────────────────────────────────────────────────────────────────────

const TABS = ['Dashboard','Artikel','Lieferanten','Rezepte','Vorprodukte','Rechnungen','Preislog','Vorlagen'];

function App() {
  const [tab, setTab] = useState(0);
  const [sbUrl, setSbUrl] = useLS('sb_url','');
  const [sbKey, setSbKey] = useLS('sb_key','');
  const [showSettings, setShowSettings] = useState(false);
  const [loading, setLoading] = useState(true);
  const [syncStatus, setSyncStatus] = useState('idle');
  const [syncError, setSyncError] = useState('');

  const [articles,   setArticles]   = useLS('simple_articles',   ARTICLES_SEED);
  const [recipes,    setRecipes]    = useLS('simple_recipes',    RECIPES_SEED);
  const [vps,        setVPs]        = useLS('simple_vps',        VPS_SEED);
  const [priceLog,   setPriceLog]   = useLS('simple_pricelog',   []);
  const [suppliers,  setSuppliers]  = useLS('simple_suppliers',  SUPPLIERS_SEED);
  const [templates,  setTemplates]  = useLS('simple_templates',  TEMPLATES_SEED);
  const [deliveryRate, setDeliveryRate] = useLS('simple_delivery_rate', 30);
  const [pendingModal,       setPendingModal]       = useState(null);
  const [pendingRecipeModal, setPendingRecipeModal] = useState(null);
  const [pendingVPModal,     setPendingVPModal]     = useState(null);

  const client = useMemo(()=>{
    if (!sbUrl||!sbKey) return null;
    try { return window.supabase.createClient(sbUrl,sbKey); } catch { return null; }
  },[sbUrl,sbKey]);

  // ── Initialload from Supabase ──
  useEffect(()=>{
    if (!client) { setLoading(false); return; }
    (async()=>{
      setLoading(true);
      try {
        const [a,r,v,l,s] = await Promise.all([
          client.from('articles').select('*').order('name'),
          client.from('recipes').select('*').order('name'),
          client.from('vorprodukte').select('*').order('name'),
          client.from('price_log').select('*').order('created_at',{ascending:false}).limit(500),
          client.from('suppliers').select('*').order('name'),
        ]);
        if (a.error) throw a.error;
        // Empty DB on first setup → push seed data
        if (a.data.length===0) {
          await Promise.all([
            client.from('articles').upsert(articles),
            client.from('recipes').upsert(recipes),
            client.from('vorprodukte').upsert(vps),
            client.from('suppliers').upsert(suppliers),
          ]);
        } else {
          setArticles(a.data);
          if (r.data?.length) setRecipes(r.data);
          if (v.data?.length) setVPs(v.data);
          if (l.data)         setPriceLog(l.data);
          if (s.data?.length) setSuppliers(s.data);
        }
        setSyncStatus('ok');
      } catch(e) { setSyncStatus('error'); setSyncError(e.message); }
      setLoading(false);
    })();
  // eslint-disable-next-line react-hooks/exhaustive-deps
  },[client]);

  // ── Upsert helper (called explicitly by save functions via props) ──
  const upsert = useCallback(async (table, item) => {
    if (!client) return;
    setSyncStatus('syncing');
    const {error} = await client.from(table).upsert(
      Array.isArray(item) ? item : [item]
    );
    if (error) { setSyncStatus('error'); setSyncError(error.message); }
    else setSyncStatus('ok');
  },[client]);

  const del = useCallback(async (table, id) => {
    if (!client) return;
    setSyncStatus('syncing');
    const {error} = await client.from(table).delete().eq('id', id);
    if (error) { setSyncStatus('error'); setSyncError(error.message); }
    else setSyncStatus('ok');
  },[client]);

  // Seed-merge for local mode
  useEffect(()=>{
    if (client) return; // Supabase handles it
    setArticles(prev=>{
      const ids = new Set(prev.map(a=>a.id));
      const missing = ARTICLES_SEED.filter(a=>!ids.has(a.id));
      return missing.length ? [...prev,...missing] : prev;
    });
  // eslint-disable-next-line react-hooks/exhaustive-deps
  },[]);

  // ── Status indicator ──
  const si = !client
    ? {c:'#94a3b8', label:'Lokal (kein Cloud-Sync)'}
    : loading
    ? {c:'#d97706', label:'Verbinde…'}
    : syncStatus==='syncing'
    ? {c:'#d97706', label:'Sync…'}
    : syncStatus==='error'
    ? {c:'#dc2626', label:'Fehler'}
    : {c:'#16a34a', label:'Supabase ✓'};

  const warnCount  = recipes.filter(r=>r.wePct>38).length;
  const staleCount = articles.filter(a=>!a.archiv&&a.datum&&Math.floor((Date.now()-new Date(a.datum))/86400000)>180).length;

  if (loading && client) return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:16,background:'#f3f4f6'}}>
      <div style={{fontSize:40}}>☁️</div>
      <div style={{fontWeight:600,color:'#374151',fontSize:16}}>Lade Daten von Supabase…</div>
      <div style={{fontSize:13,color:'#94a3b8'}}>Erstverbindung kann einen Moment dauern</div>
    </div>
  );

  return (
    <div className="app">
      <div className="header">
        <div>
          <div className="header" style={{padding:0,background:'transparent'}}>
            <h1>🥩 Simple — Küchenkalkulation</h1>
          </div>
          <div className="subtitle">Artikelliste · Rezepte · Vorprodukte · Rechnungs-Scanner</div>
        </div>
        <div style={{marginLeft:'auto',display:'flex',gap:10,alignItems:'center'}}>
          {warnCount>0&&<span className="badge badge-red">⚠ {warnCount} Margenalarm</span>}
          {staleCount>0&&<span className="badge badge-orange">📅 {staleCount} Preise veraltet</span>}
          <span style={{fontSize:12,color:si.c,fontWeight:600,display:'flex',alignItems:'center',gap:5,cursor:'pointer'}} onClick={()=>setShowSettings(true)} title="Einstellungen">
            <span style={{width:7,height:7,borderRadius:'50%',background:si.c,display:'inline-block',flexShrink:0}}/>
            {si.label}
          </span>
          <button className="btn btn-ghost" style={{color:'#888',fontSize:18,padding:'4px 8px'}} onClick={()=>setShowSettings(true)} title="Einstellungen">⚙</button>
        </div>
      </div>
      <div className="tabs">
        {TABS.map((t,i)=>(
          <div key={t} className={`tab${tab===i?' active':''}`} onClick={()=>setTab(i)}>
            {t}
            {i===1&&articles.filter(a=>!a.archiv).length>0&&<span className="badge badge-gray" style={{marginLeft:6,padding:'1px 6px'}}>{articles.filter(a=>!a.archiv).length}</span>}
            {i===3&&warnCount>0&&<span className="badge badge-red" style={{marginLeft:6,padding:'1px 6px'}}>{warnCount}</span>}
          </div>
        ))}
      </div>
      <div className="content">
        {tab===0&&<DashboardTab recipes={recipes} articles={articles}
          onNewArticle={()=>{setPendingModal({name:'',g:1,e:'KG',ek:0,lief:'',datum:'',archiv:false});setTab(1);}}
          onNewRecipe={()=>{setPendingRecipeModal({});setTab(3);}}
          onNewVP={()=>{setPendingVPModal({});setTab(4);}}
          onEditArticle={art=>{setPendingModal(art);setTab(1);}}
        />}
        {tab===1&&<ArticleTab articles={articles} setArticles={setArticles} priceLog={priceLog} setPriceLog={setPriceLog} upsert={upsert} suppliers={suppliers} vps={vps}
          pendingModal={pendingModal} onPendingClear={()=>setPendingModal(null)}
        />}
        {tab===2&&<SupplierTab suppliers={suppliers} setSuppliers={setSuppliers} upsert={upsert}/>}
        {tab===3&&<RecipeTab recipes={recipes} setRecipes={setRecipes} upsert={upsert} del={del} articles={articles} templates={templates} deliveryRate={deliveryRate}
          pendingModal={pendingRecipeModal} onPendingClear={()=>setPendingRecipeModal(null)}
        />}
        {tab===4&&<VPTab vps={vps} setVPs={setVPs} articles={articles} setArticles={setArticles} upsert={upsert}
          pendingModal={pendingVPModal} onPendingClear={()=>setPendingVPModal(null)}
        />}
        {tab===5&&<InvoiceTab articles={articles} setArticles={setArticles} priceLog={priceLog} setPriceLog={setPriceLog} upsert={upsert}/>}
        {tab===6&&<PriceLogTab priceLog={priceLog} setPriceLog={setPriceLog}/>}
        {tab===7&&<VorlagenTab templates={templates} setTemplates={setTemplates} articles={articles}/>}
      </div>
      {showSettings&&<SettingsModal
        sbUrl={sbUrl} setSbUrl={setSbUrl}
        sbKey={sbKey} setSbKey={setSbKey}
        isConnected={!!client}
        syncError={syncStatus==='error'?syncError:''}
        deliveryRate={deliveryRate} setDeliveryRate={setDeliveryRate}
        onClose={()=>setShowSettings(false)}
        onSeedDb={async()=>{
          await Promise.all([
            client.from('articles').upsert(articles),
            client.from('recipes').upsert(recipes),
            client.from('vorprodukte').upsert(vps),
            client.from('suppliers').upsert(suppliers),
          ]);
        }}
        onSeedMissing={async()=>{
          const recipeIds = new Set(recipes.map(r=>r.id));
          const missingRecipes = RECIPES_SEED.filter(r=>!recipeIds.has(r.id));
          if (missingRecipes.length) {
            const {error} = await client.from('recipes').upsert(missingRecipes);
            if (error) throw error;
            setRecipes(prev=>[...prev,...missingRecipes]);
          }
          const drinksWithZutaten = RECIPES_SEED.filter(r=>(r.zutaten||[]).length>0);
          for (const r of drinksWithZutaten) {
            const existing = recipes.find(x=>x.id===r.id);
            if (existing && !(existing.zutaten||[]).length) {
              await client.from('recipes').update({zutaten:r.zutaten}).eq('id',r.id);
              setRecipes(prev=>prev.map(x=>x.id===r.id?{...x,zutaten:r.zutaten}:x));
            }
          }
          const vpIds = new Set(vps.map(v=>v.id));
          const missingVPs = VPS_SEED.filter(v=>!vpIds.has(v.id));
          if (missingVPs.length) {
            const {error} = await client.from('vorprodukte').upsert(missingVPs);
            if (error) throw error;
            setVPs(prev=>[...prev,...missingVPs]);
          }
        }}
      />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
