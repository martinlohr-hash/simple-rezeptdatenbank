*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f3f4f6;color:#1a1a1a;min-height:100vh}
.app{display:flex;flex-direction:column;min-height:100vh}
.header{background:#111;color:white;padding:12px 24px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #222}
.header h1{font-size:17px;font-weight:700;letter-spacing:-.5px}
.header .subtitle{font-size:12px;color:#888;margin-top:1px}
.tabs{display:flex;background:#1a1a1a;padding:0 24px;gap:2px;overflow-x:auto}
.tab{padding:11px 16px;color:#999;cursor:pointer;font-size:13px;font-weight:500;border-bottom:3px solid transparent;white-space:nowrap;transition:color .15s,border-color .15s}
.tab.active{color:#fff;border-bottom-color:#e85d04}
.content{flex:1;padding:20px 24px;max-width:1440px;width:100%}
table{width:100%;border-collapse:collapse;font-size:13px;background:white}
thead th{background:#f1f5f9;padding:9px 12px;text-align:left;font-weight:600;color:#566373;font-size:12px;text-transform:uppercase;letter-spacing:.4px;border-bottom:2px solid #e2e8f0;white-space:nowrap}
tbody tr{border-bottom:1px solid #f1f5f9}
td{padding:8px 12px;vertical-align:middle;font-variant-numeric:tabular-nums}
.card{background:white;border-radius:8px;border:1px solid #e2e8f0;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.05),0 1px 2px rgba(0,0,0,.04)}
.toolbar{display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.search{padding:8px 12px;border:1px solid #e2e8f0;border-radius:7px;font-size:13px;max-width:260px;width:100%;outline:none;background:white}
.search:focus{border-color:#e85d04;box-shadow:0 0 0 2px #e85d0420}
.btn{padding:7px 14px;border-radius:7px;border:none;cursor:pointer;font-size:13px;font-weight:500;transition:background-color 150ms ease-out,transform 150ms ease-out;display:inline-flex;align-items:center;gap:6px;letter-spacing:-.1px}
.btn:active{transform:scale(0.97)}
.btn-primary{background:#e85d04;color:white}
.btn-secondary{background:#f1f5f9;color:#475569}
.btn-ghost{background:transparent;color:#566373;padding:5px 8px}
.btn-danger{background:#fee2e2;color:#dc2626}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-xs{padding:2px 8px;font-size:11px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:white;border-radius:12px;width:100%;max-width:580px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 80px rgba(0,0,0,.22)}
.modal-lg{max-width:760px}
.modal-header{padding:16px 20px;border-bottom:1px solid #e2e8f0;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:white;z-index:1}
.modal-header h3{font-size:15px;font-weight:600}
.modal-body{padding:20px}
.modal-footer{padding:14px 20px;border-top:1px solid #e2e8f0;display:flex;justify-content:flex-end;gap:8px}
.form-row{margin-bottom:14px}
.form-row label{display:block;font-size:11px;font-weight:600;color:#566373;margin-bottom:4px;text-transform:uppercase;letter-spacing:.3px}
input[type=text],input[type=number],input[type=date],select,textarea{width:100%;padding:8px 10px;border:1px solid #e2e8f0;border-radius:7px;font-size:13px;outline:none;font-family:inherit}
input:focus,select:focus,textarea:focus{border-color:#e85d04;box-shadow:0 0 0 2px #e85d0420}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.ampel{display:inline-flex;align-items:center;gap:5px;font-weight:700;font-size:12px}
.ampel.green{color:#16a34a}.ampel.yellow{color:#d97706}.ampel.red{color:#dc2626}
.dot{width:8px;height:8px;border-radius:50%;background:currentColor;flex-shrink:0}
.badge{display:inline-flex;padding:2px 8px;border-radius:100px;font-size:11px;font-weight:600}
.badge-gray{background:#f1f5f9;color:#566373}
.badge-blue{background:#eff6ff;color:#3b82f6}
.badge-orange{background:#fff7ed;color:#ea580c}
.badge-green{background:#f0fdf4;color:#16a34a}
.badge-red{background:#fef2f2;color:#dc2626}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.stat-card{background:white;border:1px solid #e2e8f0;border-radius:8px;padding:14px 16px;box-shadow:0 1px 3px rgba(0,0,0,.05),0 1px 2px rgba(0,0,0,.04)}
.stat-label{font-size:11px;color:#566373;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.stat-value{font-size:26px;font-weight:700;letter-spacing:-.5px}
.stat-sub{font-size:11px;color:#5e6e7f;margin-top:2px}
.section-title{font-size:14px;font-weight:600;color:#374151;margin-bottom:12px}
.empty{text-align:center;padding:48px;color:#5e6e7f;font-size:13px}
.ing-row{display:grid;grid-template-columns:2fr 80px 70px 80px auto;gap:8px;align-items:center;padding:6px 0;border-bottom:1px solid #f1f5f9;font-size:13px}
.ing-row select,.ing-row input{padding:5px 8px;font-size:12px}
.warn-banner{background:#fffbeb;border:1px solid #fcd34d;border-radius:6px;padding:10px 14px;font-size:13px;color:#92400e;margin-bottom:14px;display:flex;gap:8px;align-items:flex-start}
.invoice-drop{border:2px dashed #e2e8f0;border-radius:8px;padding:40px;text-align:center;cursor:pointer;transition:border-color 150ms ease-out,background-color 150ms ease-out;background:#fafbfc}
.invoice-drop.drag{border-color:#e85d04;background:#fff7f3}
.invoice-drop p{font-size:13px;color:#5e6e7f;margin-top:8px}
.price-change-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:6px;background:#fafbfc;border:1px solid #e2e8f0;margin-bottom:8px}
.price-up{color:#dc2626}.price-down{color:#16a34a}.price-same{color:#5e6e7f}
.tab-content{animation:fadeIn .15s ease-out}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.switch{position:relative;display:inline-block;width:36px;height:20px}
.switch input{opacity:0;width:0;height:0}
.slider{position:absolute;cursor:pointer;inset:0;background:#e2e8f0;border-radius:20px;transition:background-color 200ms ease-out}
.slider:before{position:absolute;content:'';height:14px;width:14px;left:3px;bottom:3px;background:white;border-radius:50%;transition:transform 200ms ease-out}
input:checked+.slider{background:#e85d04}
input:checked+.slider:before{transform:translateX(16px)}
.log-row-price{color:#dc2626;font-weight:600}
.log-row-margin{color:#d97706;font-weight:600}
.modal-overlay{transition:opacity 200ms ease-out}
.modal{transition:opacity 200ms ease-out,transform 200ms ease-out}
@supports (transition-behavior:allow-discrete){@starting-style{.modal-overlay{opacity:0}.modal{opacity:0;transform:scale(0.97)}}}
@media(hover:hover)and(pointer:fine){
  .tab:hover{color:#ccc}
  tbody tr:hover{background:#f7f8fb}
  .btn-primary:hover{background:#c94e03}
  .btn-secondary:hover{background:#e2e8f0}
  .btn-ghost:hover{background:#f1f5f9}
  .btn-danger:hover{background:#fecaca}
  .invoice-drop:hover{border-color:#e85d04;background:#fff7f3}
}
.toast-wrap{position:fixed;bottom:20px;right:20px;z-index:900;display:flex;flex-direction:column-reverse;gap:8px;pointer-events:none}
.toast{border-radius:8px;padding:10px 14px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:10px;box-shadow:0 4px 20px rgba(0,0,0,.12);pointer-events:all;min-width:220px;max-width:340px;border:1px solid;animation:toastIn 180ms ease-out}
.toast-success{background:#f0fdf4;border-color:#86efac;color:#15803d}
.toast-error{background:#fef2f2;border-color:#fca5a5;color:#b91c1c}
.toast-msg{flex:1;line-height:1.4}
.toast-x{flex-shrink:0;cursor:pointer;font-size:16px;line-height:1;padding:0 2px;background:none;border:none;color:currentColor;opacity:.5;transition:opacity 120ms ease-out}
.toast-x:hover{opacity:1}
@keyframes toastIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@media(prefers-reduced-motion:reduce){.toast{animation:none;}.tab-content{animation:none}}
@media(max-width:767px){
  .header{flex-wrap:wrap;padding:10px 16px;gap:8px}
  .content{padding:12px 16px}
  .tabs{padding:0 12px}
  .tab{padding:9px 12px}
  .toolbar{gap:8px}
  .search{max-width:100%}
  .stats-row{grid-template-columns:repeat(2,1fr);gap:8px}
  .form-grid{grid-template-columns:1fr}
  .form-grid-3{grid-template-columns:1fr 1fr}
  .stat-card{padding:10px 12px}
  .card{overflow-x:auto}
  table{min-width:520px}
  .modal{max-height:95vh}
  .modal-lg{max-width:calc(100vw - 40px)}
  .ing-row{grid-template-columns:1fr 65px 60px 72px auto}
  .toast-wrap{bottom:12px;right:12px;left:12px}
  .toast{min-width:0;max-width:100%}
}
/* ── MOBILE SHELL ────────────────────────────────────────────────────────────*/
.mob-header{display:none;position:sticky;top:0;z-index:100;background:#fff;border-bottom:1px solid #e2e8f0;padding:0 20px;height:52px;align-items:center;justify-content:space-between}
.mob-header-title{font-size:19px;font-weight:700;letter-spacing:-.3px;color:#1a1a1a}
.mob-nav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:200;background:#fff;border-top:1px solid #e2e8f0;padding-bottom:env(safe-area-inset-bottom,0)}
.mob-nav-inner{display:flex;width:100%}
.mob-nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:8px 4px;cursor:pointer;font-size:10px;font-weight:600;color:#94a3b8;letter-spacing:.3px;border:none;background:none;-webkit-tap-highlight-color:transparent;outline:none}
.mob-nav-item.active{color:#e85d04}
.mob-nav-icon{display:flex;align-items:center;justify-content:center;line-height:1}
/* ── MOBILE ARTICLE CARDS ───────────────────────────────────────────────────*/
.mob-art-card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:14px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.mob-stat-chips{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.mob-stat-chip{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:10px 8px 8px;text-align:center}
.mob-stat-chip-value{font-size:21px;font-weight:700;letter-spacing:-.5px;line-height:1;font-variant-numeric:tabular-nums}
.mob-stat-chip-label{font-size:10px;font-weight:600;color:#5e6e7f;text-transform:uppercase;letter-spacing:.3px;margin-top:3px}
/* ── MOBILE MEHR SHEET ──────────────────────────────────────────────────────*/
.mob-mehr-sheet{position:fixed;bottom:0;left:0;right:0;z-index:300;background:#fff;border-radius:16px 16px 0 0;box-shadow:0 -12px 40px rgba(0,0,0,.14);padding:16px 20px calc(80px + env(safe-area-inset-bottom,0))}
@media(max-width:767px){
  .header,.tabs{display:none!important}
  .content{padding:0;padding-bottom:76px}
  .mob-header{display:flex}
  .mob-nav{display:flex}
}
@media(prefers-reduced-motion:reduce){.mob-nav-icon svg{transition:none}}
/* ── EINKAUFSLISTE ──────────────────────────────────────────────────────────*/
.shop-progress{height:8px;border-radius:6px;background:#e2e8f0;overflow:hidden}
.shop-progress-bar{height:100%;background:#16a34a;transition:width .25s ease-out}
.shop-group-title{font-size:12px;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:.4px;margin:18px 0 8px;display:flex;align-items:center;gap:8px}
.shop-row{display:flex;align-items:center;gap:12px;padding:13px 12px;background:#fff;border:1px solid #e2e8f0;border-radius:12px;margin-bottom:8px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background-color .12s ease-out,opacity .12s ease-out}
.shop-row:active{background:#f8fafc}
.shop-row.checked{opacity:.5}
.shop-cb{width:28px;height:28px;border-radius:8px;border:2px solid #cbd5e1;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:transparent;transition:background-color .12s ease-out,border-color .12s ease-out}
.shop-row.checked .shop-cb{background:#16a34a;border-color:#16a34a;color:#fff}
.shop-name{font-size:15px;font-weight:600;color:#1a1a1a;line-height:1.25}
.shop-row.checked .shop-name{text-decoration:line-through}
.shop-meta{font-size:12px;color:#5e6e7f;margin-top:3px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.shop-price{font-size:13px;font-weight:700;color:#16a34a;white-space:nowrap;font-variant-numeric:tabular-nums;text-align:right}
</style>
</head>

const fmt = (n) => new Intl.NumberFormat('de-DE',{style:'currency',currency:'EUR'}).format(n||0);
const fmtPct = (n) => (n||0).toFixed(1)+'%';
const fmtKg = (n) => (n||0).toFixed(3).replace('.',',')+'  kg';

function ampelWE(pct) {
  if (pct <= 28) return 'green';
  if (pct <= 38) return 'yellow';
  return 'red';
}

function pricePerUnit(art, variantLief) {
  const v = variantLief && (art.varianten||[]).find(va=>va.lief===variantLief);
  const ek = v ? v.ek : art.ek;
  if (!art.g || art.g === 0) return ek;
  return ek / art.g;
}

function calcWEWithArts(recipe, arts) {
  if (!recipe.zutaten || !recipe.zutaten.length) return recipe.weEuro || 0;
  return recipe.zutaten.reduce((sum, z) => {
    const art = arts.find(a => a.id === z.art);
    if (!art || !z.menge) return sum;
    return sum + pricePerUnit(art, z.variantLief) * z.menge * toBaseMultiplier(z.einheit);
  }, 0);
}

function computeImpact(artId, newArt, allArticles, recipes) {
  const newArts = allArticles.map(a => a.id === artId ? newArt : a);
  return recipes.filter(r => !r.archiv && (r.zutaten||[]).some(z => z.art === artId)).map(r => {
    const weOld = calcWEWithArts(r, allArticles);
    const weNew = calcWEWithArts(r, newArts);
    const vkNetto = r.vkBrutto / (1 + r.mwst/100);
    return {recipe:r, weOld, weNew, dbOld:vkNetto-weOld, dbNew:vkNetto-weNew};
  }).filter(imp => Math.abs(imp.weNew - imp.weOld) > 0.001);
}

function relDate(isoStr) {
  if (!isoStr) return '';
  const days = Math.floor((Date.now() - new Date(isoStr)) / 86400000);
  if (days === 0) return 'heute';
  if (days === 1) return 'gestern';
  if (days < 7) return `vor ${days} Tagen`;
  if (days < 30) return `vor ${Math.floor(days/7)} Wo.`;
  return new Date(isoStr).toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit'});
}

function priceAge(datum, warnDays, alertDays, checkTage) {
  if (!datum) return null;
  const days = Math.floor((Date.now() - new Date(datum)) / 86400000);
  const w = checkTage || warnDays;
  const r = checkTage ? checkTage * 2 : alertDays;
  if (days > r) return 'red';
  if (days > w) return 'yellow';
  return 'green';
}
function bestPriceAge(art, warnDays, alertDays) {
  const dates = [art.datum, ...(art.varianten||[]).map(v=>v.datum)].filter(Boolean);
  if (!dates.length) return null;
  const statuses = dates.map(d=>priceAge(d, warnDays, alertDays, art.checkTage));
  if (statuses.includes('green')) return 'green';
  if (statuses.includes('yellow')) return 'yellow';
  return 'red';
}
function newestDatum(art) {
  const dates = [art.datum, ...(art.varianten||[]).map(v=>v.datum)].filter(Boolean);
  return dates.length ? [...dates].sort().reverse()[0] : '';
}

function allSuppliers(art) {
  // Returns [{lief, ek, datum, isDefault}] — default first
  const main = {lief: art.lief||'', ek: art.ek, datum: art.datum||'', isDefault: true};
  const extras = (art.varianten||[]).map(v=>({...v, isDefault:false}));
  return [main, ...extras];
}

function bestSupplier(art) {
  // Cheapest supplier (per base unit) across the default + all variants
  if (!art) return null;
  const sups = allSuppliers(art).filter(s=>s.lief);
  if (!sups.length) return {lief:'', ppu:pricePerUnit(art), ek:art.ek, count:0};
  const scored = sups.map(s=>({
    lief:s.lief, datum:s.datum, ek:s.ek,
    ppu:pricePerUnit(art, s.isDefault?null:s.lief),
  })).sort((a,b)=>a.ppu-b.ppu);
  return {...scored[0], count:scored.length};
}

function useLS(key, seed) {
  const [data, setData] = useState(() => {
    try {
      const raw = localStorage.getItem(key);
      return raw ? JSON.parse(raw) : seed;
    } catch { return seed; }
  });
  const set = useCallback((v) => {
    setData(prev => {
      const next = typeof v === 'function' ? v(prev) : v;
      try { localStorage.setItem(key, JSON.stringify(next)); } catch(e) {}
      return next;
    });
  }, [key]);
  return [data, set];
}

        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:4}}>
          <div>
            <strong style={{fontSize:17,lineHeight:1.3}}>{art.name}</strong>
            <div style={{fontSize:12,color:'#5e6e7f',marginTop:3}}>{art.lief||'—'} · {art.g} {art.e}</div>
          </div>
          <button className="btn btn-ghost" onClick={onClose} style={{fontSize:20,padding:'2px 8px'}}>✕</button>
        </div>
        <div style={{fontSize:12,color:'#5e6e7f',marginBottom:16}}>
          Bisher: <strong>{fmt(art.ek)}</strong> → <span style={{fontFamily:'monospace'}}>{fmt(oldPpu)}/{art.e}</span>
        </div>
        <label style={{fontSize:11,fontWeight:600,color:'#566373',textTransform:'uppercase',letterSpacing:'.3px',display:'block',marginBottom:6}}>
          Neuer EK-Preis
        </label>
        <input type="number" step="0.01" value={ek} inputMode="decimal"
          onChange={e=>setEk(parseFloat(e.target.value)||0)}
          autoFocus
          style={{width:'100%',fontSize:28,fontWeight:700,padding:'10px 14px',marginBottom:10,borderRadius:8,border:'2px solid #e85d04',outline:'none'}}
        />
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
          <div style={{fontFamily:'monospace',fontSize:20,fontWeight:700}}>
            {fmt(ppu)}<span style={{fontSize:14,fontWeight:400,color:'#5e6e7f',fontFamily:'inherit'}}>/{art.e}</span>
          </div>
          {Math.abs(diff) > 0.001 && (
            <div style={{textAlign:'right',fontWeight:700,fontSize:14,color:diff>0?'#dc2626':'#16a34a'}}>
              {diff>0?'+':''}{fmt(diff)} ({diffPct>0?'+':''}{diffPct.toFixed(1)}%)
            </div>
          )}
        </div>
        <button className="btn btn-primary" style={{width:'100%',padding:'15px',fontSize:15,borderRadius:10}}
          onClick={()=>onSave({...art, ek, datum: new Date().toISOString().split('T')[0]})}>
          Speichern + Datum aktualisieren
        </button>
      </div>
    </div>
  );
}

function MobileArticleView({articles, warnDays, alertDays, onEdit, onToggleFav, onNewArticle}) {

  const [showFav, setShowFav] = useState(false);
  const [showArchiv, setShowArchiv] = useState(false);

  const activeCount = articles.filter(a=>!a.archiv).length;
  const staleCount  = articles.filter(a=>!a.archiv&&bestPriceAge(a,warnDays,alertDays)==='red').length;
  const liefCount   = new Set(articles.filter(a=>!a.archiv&&a.lief).map(a=>a.lief.toUpperCase())).size;

  const filtered = useMemo(()=>
    articles
      .filter(a=>showArchiv?a.archiv:!a.archiv)
      .filter(a=>!showFav||a.fav)
      .filter(a=>!q||a.name.toLowerCase().includes(q.toLowerCase())||(a.lief||'').toLowerCase().includes(q.toLowerCase()))
      .sort((a,b)=>a.name.localeCompare(b.name,'de')),
    [articles,q,showFav,showArchiv]
  );

  const ageLabel = age=>age==='red'?'Veraltet':age==='yellow'?'Prüfung in 3 Mon.':'Aktuell';

  return (
    <div style={{padding:'12px 16px 8px'}}>
      {/* Search */}

        <svg style={{position:'absolute',left:11,top:'50%',transform:'translateY(-50%)',pointerEvents:'none',opacity:.35}} width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" value={q} onChange={e=>setQ(e.target.value)} placeholder="Suche Artikel oder Lieferant…"
          style={{width:'100%',padding:'10px 12px 10px 34px',border:'1px solid #e2e8f0',borderRadius:10,fontSize:15,outline:'none',background:'#fff',boxSizing:'border-box',WebkitAppearance:'none'}}/>
      </div>

      {/* Stats */}
      <div className="mob-stat-chips">
        <div className="mob-stat-chip">
          <div className="mob-stat-chip-value">{activeCount}</div>
          <div className="mob-stat-chip-label">Aktiv</div>
        </div>
        <div className="mob-stat-chip">
          <div className="mob-stat-chip-value" style={staleCount>0?{color:'#dc2626'}:{}}>{staleCount}</div>
          <div className="mob-stat-chip-label">Veraltet</div>
        </div>
        <div className="mob-stat-chip">
          <div className="mob-stat-chip-value">{liefCount}</div>
          <div className="mob-stat-chip-label">Lieferanten</div>
        </div>
      </div>

      {/* Filter row */}
      <div style={{display:'flex',gap:8,marginBottom:14,alignItems:'center'}}>
        <button onClick={()=>setShowFav(s=>!s)} style={{padding:'6px 12px',borderRadius:20,border:'1px solid',fontSize:13,fontWeight:600,cursor:'pointer',WebkitTapHighlightColor:'transparent',borderColor:showFav?'#e85d04':'#e2e8f0',background:showFav?'#fff7ed':'#fff',color:showFav?'#e85d04':'#566373'}}>☆ Favoriten</button>
        <button onClick={()=>setShowArchiv(s=>!s)} style={{padding:'6px 12px',borderRadius:20,border:'1px solid',fontSize:13,fontWeight:600,cursor:'pointer',WebkitTapHighlightColor:'transparent',borderColor:showArchiv?'#e85d04':'#e2e8f0',background:showArchiv?'#fff7ed':'#fff',color:showArchiv?'#e85d04':'#566373'}}>🗂 Archiv</button>
        {onNewArticle&&<button onClick={onNewArticle} style={{marginLeft:'auto',padding:'6px 14px',borderRadius:20,border:'none',background:'#e85d04',color:'#fff',fontSize:13,fontWeight:600,cursor:'pointer',WebkitTapHighlightColor:'transparent'}}>+ Artikel</button>}
      </div>

      {/* Cards */}
      <div style={{display:'flex',flexDirection:'column',gap:10}}>
        {filtered.map(a=>{
          const ppu = pricePerUnit(a);
          const age = a.archiv ? null : bestPriceAge(a,warnDays,alertDays);
          const ageColor = age==='red'?'#dc2626':age==='yellow'?'#d97706':'#16a34a';
          return (
            <div key={a.id} className="mob-art-card" onClick={()=>onEdit(a)}>
              <div style={{display:'flex',gap:10,alignItems:'flex-start'}}>
                <button onClick={e=>{e.stopPropagation();onToggleFav&&onToggleFav(a);}}
                  style={{background:'none',border:'none',cursor:'pointer',fontSize:20,color:a.fav?'#f59e0b':'#d1d5db',padding:'0 2px 0 0',lineHeight:1,flexShrink:0,marginTop:1,WebkitTapHighlightColor:'transparent'}}>
                  {a.fav?'★':'☆'}
                </button>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:8,marginBottom:8}}>

                    <div style={{textAlign:'right',flexShrink:0}}>
