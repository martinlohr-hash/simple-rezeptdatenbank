function PriceLogTab({priceLog, setPriceLog}) {
  const [q, setQ] = useState('');
  const filtered = priceLog.filter(l=>!q||l.produkt.toLowerCase().includes(q.toLowerCase())||l.quelle.toLowerCase().includes(q.toLowerCase()));

  return (
    <div className="tab-content">
      <div className="toolbar">
        <input className="search" placeholder="Suche Produkt oder Quelle…" value={q} onChange={e=>setQ(e.target.value)}/>
        <div style={{marginLeft:'auto',fontSize:13,color:'#566373'}}>{priceLog.length} Einträge</div>
      </div>
      <div className="card">
        <table>
          <thead><tr>
            <th>Datum</th><th>Produkt</th><th>Alt</th><th>Neu</th><th>Δ</th><th>Quelle</th><th>Status</th>
          </tr></thead>
          <tbody>
          {filtered.length===0&&<tr><td colSpan={7}><div className="empty">Keine Einträge</div></td></tr>}
          {filtered.map(l=>{
            const diff = l.altPreis ? ((l.neuPreis-l.altPreis)/l.altPreis*100) : null;
            return (
              <tr key={l.id}>
                <td style={{fontSize:12,color:'#566373'}}>{l.datum?.slice(0,10)||'—'}</td>
                <td><strong>{l.produkt}</strong></td>
                <td style={{fontFamily:'monospace'}}>{l.altPreis!=null?fmt(l.altPreis):'—'}</td>
                <td style={{fontFamily:'monospace',fontWeight:600}}>{fmt(l.neuPreis)}</td>
                <td>{diff!=null?<span className={diff>0?'price-up':'price-down'}>{diff>0?'▲':'▼'}{Math.abs(diff).toFixed(1)}%</span>:'—'}</td>
                <td><span className="badge badge-gray">{l.quelle||'—'}</span></td>
                <td><span className={`badge badge-${l.status==='bestätigt'?'green':'gray'}`}>{l.status||'—'}</span></td>
              </tr>
            );
          })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function SettingsModal({sbUrl, setSbUrl, sbKey, setSbKey, onClose, onSeedDb, onSeedMissing, isConnected, syncError, deliveryRate, setDeliveryRate, warnDays, setWarnDays, alertDays, setAlertDays}) {
  const [url, setUrl] = useState(sbUrl);
  const [key, setKey] = useState(sbKey);
  const [showKey, setShowKey] = useState(false);
  const [testing, setTesting] = useState(false);
  const [testMsg, setTestMsg] = useState('');
  const [seeding, setSeeding] = useState(false);
  const [seeding2, setSeeding2] = useState(false);
  const [linkCopied, setLinkCopied] = useState(false);

  const copyConnectLink = () => {
    const d = {sbUrl, sbKey, warnDays, alertDays};
    const hash = btoa(JSON.stringify(d));
    const link = `${window.location.origin}${window.location.pathname}#connect=${hash}`;
    navigator.clipboard.writeText(link).then(()=>{setLinkCopied(true);setTimeout(()=>setLinkCopied(false),2500);});
  };

  const test = async () => {
    if (!url||!key) return;
    setTesting(true); setTestMsg('');
    try {
      const c = window.supabase.createClient(url.trim(), key.trim());
      const {error} = await c.from('articles').select('count').limit(1);
      if (error) throw error;
      setTestMsg('✓ Verbindung erfolgreich!');
    } catch(e) { setTestMsg('✗ '+e.message); }
    setTesting(false);
  };

  const save = () => { setSbUrl(url.trim()); setSbKey(key.trim()); onClose(); window.location.reload(); };
  const autoSave = () => { if (url.trim() && key.trim() && (url.trim()!==sbUrl || key.trim()!==sbKey)) save(); };

  const seed = async () => {
    setSeeding(true);
    try { await onSeedDb(); setTestMsg('✓ Daten hochgeladen!'); }
    catch(e) { setTestMsg('✗ '+e.message); }
    setSeeding(false);
  };

  return (
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="modal-header">
          <h3>Einstellungen</h3>
          <button className="btn btn-ghost" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">

          {/* Verbindungsstatus */}
          {(()=>{
            const hasUnsaved = (url.trim()&&key.trim())&&(url.trim()!==sbUrl||key.trim()!==sbKey);
            const bg = isConnected?'#f0fdf4':hasUnsaved?'#eff6ff':'#fff7ed';
            const border = isConnected?'#bbf7d0':hasUnsaved?'#bfdbfe':'#fed7aa';
            const dot = isConnected?'#16a34a':hasUnsaved?'#3b82f6':'#f97316';
            const textColor = isConnected?'#166534':hasUnsaved?'#1d4ed8':'#c2410c';
            const label = isConnected?'Verbunden mit Supabase':hasUnsaved?'Zum Verbinden: Einstellungen speichern':'Keine Datenbankverbindung';
            return (
              <div style={{display:'flex',alignItems:'center',gap:10,padding:'10px 14px',borderRadius:8,marginBottom:22,background:bg,border:`1px solid ${border}`}}>
                <span style={{width:8,height:8,borderRadius:'50%',background:dot,flexShrink:0,display:'inline-block'}}/>
                <span style={{fontSize:13,fontWeight:600,color:textColor,flex:1}}>{label}</span>
                {syncError&&<span style={{fontSize:12,color:'#dc2626'}}>{syncError}</span>}
              </div>
            );
          })()}

          {/* Datenbank */}
          <div style={{fontSize:12,fontWeight:700,color:'#374151',textTransform:'uppercase',letterSpacing:'.4px',marginBottom:10}}>Datenbank</div>
          <div className="form-row"><label>Supabase Project URL</label>
            <input type="text" value={url} onChange={e=>setUrl(e.target.value)} onBlur={autoSave} placeholder="https://xxxxxxxxxxxx.supabase.co"/>
          </div>
          <div className="form-row" style={{marginBottom:10}}><label>Anon Key</label>
            <div style={{display:'flex',gap:8}}>
              <input type={showKey?'text':'password'} value={key} onChange={e=>setKey(e.target.value)} onBlur={autoSave} placeholder="eyJhbGci…" style={{flex:1}}/>

function DashboardTab({recipes, articles, vps=[], priceLog=[], onNewArticle, onNewRecipe, onNewVP, onEditArticle, onSaveArticle, onNavigateToRecipe, suppliers=[], warnDays=90, alertDays=180}) {
  const [isMobile, setIsMobile] = React.useState(()=>window.innerWidth<768);
  React.useEffect(()=>{const h=()=>setIsMobile(window.innerWidth<768);window.addEventListener('resize',h,{passive:true});return()=>window.removeEventListener('resize',h);},[]);
  const [view, setView] = React.useState('margen');
  const [showArchivMargen, setShowArchivMargen] = React.useState(false);
  const [showRecipeChoice, setShowRecipeChoice] = React.useState(false);
  const [editArt, setEditArt] = React.useState(null);
  const [dismissed, setDismissed] = useLS('simple_savings_dismissed', {});
  const [savingIdx, setSavingIdx] = React.useState(0);
  const [szArtId, setSzArtId] = React.useState('');
  const [szPctChange, setSzPctChange] = React.useState(10);
  const [szMode, setSzMode] = React.useState('pct');
  const [szAbsPrice, setSzAbsPrice] = React.useState('');
  const [szRecipeId, setSzRecipeId] = React.useState('');
  const [szTargetWE, setSzTargetWE] = React.useState(22);
  const [tooltip, setTooltip] = React.useState(null);
  const SOLL = 22;
  const now = Date.now();

  const reviewArt = useMemo(()=>{
    const stale = articles.filter(a=>!a.archiv&&a.lief!=='SIMPLE'&&['yellow','red'].includes(bestPriceAge(a,warnDays,alertDays)));
    if (!stale.length) return null;
    return stale[Math.floor(Math.random()*stale.length)];
  // eslint-disable-next-line react-hooks/exhaustive-deps
  },[]);

  // Exclude 19%-MwSt recipes (Sonderfälle like "Big J Uber") from WE-Durchschnitt
  const activeSWRecs = recipes.filter(r => !r.archiv && r.mwst !== 19);
  const mainRecs = showArchivMargen ? recipes.filter(r => r.mwst !== 19) : activeSWRecs;
  const sortedMargen = [...mainRecs].sort((a,b) => b.wePct - a.wePct);
  const avgWe = activeSWRecs.length ? activeSWRecs.reduce((s,r)=>s+r.wePct,0)/activeSWRecs.length : 0;
  const ueberSollCount = activeSWRecs.filter(r=>r.wePct>SOLL).length;
  const bestDBRec = [...recipes].sort((a,b)=>b.dbNetto-a.dbNetto)[0];
  const MAX_WE = 50;
  const weColor = pct => pct<=SOLL ? '#16a34a' : pct<=30 ? '#d97706' : '#dc2626';

  const sortedDB = [...recipes].filter(r=>!r.archiv&&r.mwst!==19).sort((a,b)=>b.dbNetto-a.dbNetto);
  const maxDB = sortedDB[0]?.dbNetto || 1;
  const avgDB = sortedDB.length ? sortedDB.reduce((s,r)=>s+r.dbNetto,0)/sortedDB.length : 0;
  const totalDB = sortedDB.filter(r=>r.anzahl).reduce((s,r)=>s+r.dbNetto*(r.anzahl||0),0);

  const staleArts = articles
    .filter(a=>!a.archiv&&['yellow','red'].includes(bestPriceAge(a,warnDays,alertDays)))
    .map(a=>{const nd=newestDatum(a);return{...a,_nd:nd,days:nd?Math.floor((now-new Date(nd))/86400000):9999};})
    .sort((a,b)=>b.days-a.days);

  // Letzte Aktivität
  const lastChanges = priceLog.slice(0, 3);

  // Sparhinweis: billigster Lieferanten-Wechsel (Rezepte + VPs)
  const savingsOpps = [];
  articles.filter(a=>!a.archiv&&(a.varianten||[]).length>0).forEach(art=>{
    const defPPU = art.g>0 ? art.ek/art.g : art.ek;
    let cheapestV=null, cheapestPPU=defPPU;
    (art.varianten||[]).forEach(v=>{const p=v.ek/(art.g||1);if(p<cheapestPPU-0.0001){cheapestPPU=p;cheapestV=v;}});
    if(!cheapestV) return;
    const deltaPPU=defPPU-cheapestPPU;
    let annualSaving=0; const recipeRefs=[];
    recipes.filter(r=>!r.archiv&&(r.zutaten||[]).some(z=>z.art===art.id)).forEach(rec=>{
      const totalMenge=(rec.zutaten||[]).filter(z=>z.art===art.id).reduce((s,z)=>s+(z.menge||0),0);
      recipeRefs.push({name:rec.name,anzahl:rec.anzahl||null,menge:totalMenge,isVP:false});
      if(rec.anzahl) annualSaving+=deltaPPU*totalMenge*rec.anzahl*52;
    });
    vps.filter(vp=>!vp.archiv&&(vp.zutaten||[]).some(z=>z.art===art.id)).forEach(vp=>{
      const totalMenge=(vp.zutaten||[]).filter(z=>z.art===art.id).reduce((s,z)=>s+(z.menge||0),0);
      recipeRefs.push({name:vp.name,anzahl:null,menge:totalMenge,isVP:true,outputKg:vp.outputKg||1});
    });
    if(recipeRefs.length) savingsOpps.push({art,cheapestV,deltaPPU,annualSaving,recipeRefs});
  });
  savingsOpps.sort((a,b)=>b.annualSaving-a.annualSaving);
  const visibleOpps = savingsOpps.filter(op=>{
    const key = `${op.art.id}__${op.cheapestV.lief}`;
    return !dismissed[key] || dismissed[key] < now;
  });
  const clampedIdx = Math.min(savingIdx, Math.max(0, visibleOpps.length-1));
  const currentSaving = visibleOpps[clampedIdx]||null;

  // Szenarien
  const szArt = szArtId ? articles.find(a=>a.id===szArtId) : null;
  const szNewEk = szMode==='abs'
    ? (parseFloat(szAbsPrice)||szArt?.ek||0)
    : (szArt ? szArt.ek*(1+szPctChange/100) : 0);
  const modifiedArts = szArtId ? articles.map(a=>a.id===szArtId?{...a,ek:szNewEk}:a) : articles;
  const activeRecs = recipes.filter(r=>!r.archiv);
  const affectedRecs = szArtId ? activeRecs.filter(r=>(r.zutaten||[]).some(z=>z.art===szArtId)) : [];
  const szResults = affectedRecs.map(r=>{
    const mwstF = 1+r.mwst/100;
    const vkNetto = r.vkBrutto/mwstF;
    const weOld = calcWEWithArts(r, articles);
    const weNew = calcWEWithArts(r, modifiedArts);
    const wePctOld = vkNetto>0 ? weOld/vkNetto*100 : 0;
    const wePctNew = vkNetto>0 ? weNew/vkNetto*100 : 0;
    const dbOld=vkNetto-weOld, dbNew=vkNetto-weNew, dDB=dbNew-dbOld;
    return {r, weOld, weNew, wePctOld, wePctNew, dbOld, dbNew, dDB,
      annualDelta: r.anzahl ? dDB*r.anzahl*52 : null,
      per100Delta: dDB*100};
  });
  const affectedVPs = szArtId ? vps.filter(vp=>!vp.archiv&&(vp.zutaten||[]).some(z=>z.art===szArtId)) : [];
  const szVPResults = affectedVPs.map(vp=>{
    const kostenOld = calcWEWithArts({zutaten:vp.zutaten,weEuro:vp.kosten}, articles);
    const kostenNew = calcWEWithArts({zutaten:vp.zutaten,weEuro:vp.kosten}, modifiedArts);
    const dKosten = kostenNew-kostenOld;
    return {vp, kostenOld, kostenNew, dKosten, dPreisKg:vp.outputKg>0?dKosten/vp.outputKg:0};
  });
  const szRecipe = recipes.find(r=>r.id===szRecipeId);
  const szRecipeWE = szRecipe ? calcWEWithArts(szRecipe, articles) : 0;
  const szNeededVK = szRecipeWE>0&&szTargetWE>0 ? szRecipeWE/(szTargetWE/100)*(1+(szRecipe?.mwst||7)/100) : 0;

  const heute = new Date().toLocaleString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});

  if (isMobile) return (
    <MobileDashboardView
      recipes={recipes} articles={articles} vps={vps} priceLog={priceLog}
      warnDays={warnDays} alertDays={alertDays}
      onNewArticle={onNewArticle} onNewRecipe={onNewRecipe}
      onEditArticle={onEditArticle} onNavigateToRecipe={onNavigateToRecipe}
    />
  );

  const SubBtn = ({k,label}) => (
    <button onClick={()=>setView(k)} style={{
      padding:'6px 18px',border:'1px solid',borderRadius:100,fontSize:13,fontWeight:500,
      cursor:'pointer',outline:'none',transition:'all .15s',
      borderColor:view===k?'#e85d04':'#e2e8f0',
      color:view===k?'#e85d04':'#566373',
      background:'transparent',
    }}>{label}</button>
  );

  const xTicks = [0,10,20,30,40,50];

  return (
    <div className="tab-content">
      <div style={{display:'flex',alignItems:'baseline',justifyContent:'space-between',marginBottom:14}}>
        <h2 style={{fontSize:28,fontWeight:700,letterSpacing:'-.5px'}}>Dashboard</h2>
        <div style={{fontSize:12,color:'#5e6e7f',textAlign:'right'}}>
          Stand: {heute} · {articles.filter(a=>!a.archiv).length} aktive Artikel
        </div>
      </div>

      {/* ── Welcome / Activity ── */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginBottom:24}}>
        <div style={{background:'white',border:'1px solid #e2e8f0',borderRadius:8,padding:'14px 16px'}}>
          <div style={{fontSize:11,fontWeight:600,color:'#566373',textTransform:'uppercase',letterSpacing:'.5px',marginBottom:10}}>Letzte Aktivität</div>
          {lastChanges.length===0 ? (
            <div style={{fontSize:13,color:'#5e6e7f',padding:'8px 0'}}>Noch keine Änderungen aufgezeichnet</div>
          ) : lastChanges.map((c,i)=>{
            const isUp = c.neuPreis > c.altPreis;
            const pctChg = c.altPreis>0 ? (c.neuPreis-c.altPreis)/c.altPreis*100 : 0;
            return (
              <div key={i} style={{display:'flex',alignItems:'center',gap:8,paddingBottom:i<lastChanges.length-1?8:0,marginBottom:i<lastChanges.length-1?8:0,borderBottom:i<lastChanges.length-1?'1px solid #f1f5f9':'none'}}>
                <span style={{fontSize:15,color:isUp?'#dc2626':'#16a34a',flexShrink:0,lineHeight:1}}>{isUp?'↑':'↓'}</span>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{c.produkt}</div>
                  <div style={{fontSize:11,color:'#5e6e7f'}}>
                    {fmt(c.altPreis)} → {fmt(c.neuPreis)}
                    <span style={{color:isUp?'#dc2626':'#16a34a',fontWeight:700,marginLeft:4}}>{isUp?'+':''}{pctChg.toFixed(1)}%</span>
                  </div>
                </div>
                <div style={{fontSize:11,color:'#5e6e7f',flexShrink:0}}>{relDate(c.datum)}</div>
              </div>
            );
          })}
        </div>

        <div style={{background:currentSaving?'#f0fdf4':'#f8fafc',border:`1px solid ${currentSaving?'#bbf7d0':'#e2e8f0'}`,borderRadius:8,padding:'14px 16px'}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
            <div style={{fontSize:11,fontWeight:600,color:currentSaving?'#166534':'#566373',textTransform:'uppercase',letterSpacing:'.5px'}}>💡 Sparhinweis</div>
            {visibleOpps.length>1&&(
              <div style={{display:'flex',alignItems:'center',gap:4}}>
                <button onClick={()=>setSavingIdx(i=>Math.max(0,i-1))} disabled={clampedIdx===0}
                  style={{background:'none',border:'none',cursor:clampedIdx===0?'default':'pointer',color:clampedIdx===0?'#d1d5db':'#566373',fontSize:18,padding:'0 4px',lineHeight:1}}>‹</button>
                <span style={{fontSize:11,color:'#5e6e7f'}}>{clampedIdx+1} / {visibleOpps.length}</span>
                <button onClick={()=>setSavingIdx(i=>Math.min(visibleOpps.length-1,i+1))} disabled={clampedIdx===visibleOpps.length-1}
                  style={{background:'none',border:'none',cursor:clampedIdx===visibleOpps.length-1?'default':'pointer',color:clampedIdx===visibleOpps.length-1?'#d1d5db':'#566373',fontSize:18,padding:'0 4px',lineHeight:1}}>›</button>
              </div>
            )}
          </div>
          {currentSaving ? (()=>{
            const vpRefs = currentSaving.recipeRefs.filter(r=>r.isVP);
            const recRefs = currentSaving.recipeRefs.filter(r=>!r.isVP);
            const bestRec = recRefs.length ? recRefs.reduce((mx,r)=>r.menge>mx.menge?r:mx,recRefs[0]) : null;
            const bestVP = vpRefs.length ? vpRefs.reduce((mx,r)=>r.menge>mx.menge?r:mx,vpRefs[0]) : null;
            let savingVal;
            if (currentSaving.annualSaving>0) {
              savingVal = `${fmt(currentSaving.annualSaving)} / Jahr`;
            } else if (bestRec) {
              savingVal = `${fmt(currentSaving.deltaPPU*bestRec.menge*100)} bei 100 Stück`;
            } else if (bestVP) {
              savingVal = `${fmt(currentSaving.deltaPPU*bestVP.menge)} pro Charge ${bestVP.name}`;
            } else { savingVal = '—'; }
            const allNames = currentSaving.recipeRefs.map(r=>r.name+(r.isVP?' (VP)':'')).join(', ');
            const dismissKey = `${currentSaving.art.id}__${currentSaving.cheapestV.lief}`;
            return (
              <div>
                <div style={{fontSize:13,lineHeight:1.6}}>
                  Wenn Du bei <strong>{currentSaving.art.name}</strong> den Lieferanten auf <strong>{currentSaving.cheapestV.lief}</strong> wechselst, spart das{' '}
                  <span style={{color:'#16a34a',fontWeight:700}}>{savingVal}</span>
                </div>
                <div style={{marginTop:6,fontSize:11,color:'#566373'}}>{allNames}</div>
                <label style={{display:'flex',alignItems:'center',gap:6,marginTop:10,fontSize:11,color:'#5e6e7f',cursor:'pointer'}}>
                  <input type="checkbox" style={{width:'auto',cursor:'pointer'}} onChange={e=>{
                    if (e.target.checked) setDismissed(prev=>({...prev,[dismissKey]:now+28*24*3600*1000}));
                  }}/>
                  4 Wochen nicht mehr anzeigen
                </label>
              </div>
            );
          })() : (
            <div style={{fontSize:13,color:'#5e6e7f',lineHeight:1.6,padding:'8px 0'}}>Füge alternative Lieferanten zu deinen Artikeln hinzu um Einsparpotenziale zu entdecken</div>
          )}
        </div>
      </div>

      {/* ── Aktionskarten ── */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:14,marginBottom:28}}>
        <button onClick={onNewArticle} style={{
          background:'white',border:'2px solid #e2e8f0',borderRadius:12,padding:'22px 20px',
          cursor:'pointer',textAlign:'left',transition:'all .15s',outline:'none',
        }}
          onMouseEnter={e=>{e.currentTarget.style.borderColor='#e85d04';e.currentTarget.style.boxShadow='0 4px 16px rgba(232,93,4,.12)';}}
          onMouseLeave={e=>{e.currentTarget.style.borderColor='#e2e8f0';e.currentTarget.style.boxShadow='none';}}>
          <div style={{fontSize:28,marginBottom:10}}>+</div>
          <div style={{fontSize:16,fontWeight:700,color:'#1a1a1a',marginBottom:4}}>Artikel anlegen</div>
          <div style={{fontSize:12,color:'#5e6e7f'}}>Neuen Artikel mit Lieferant & Preis erfassen</div>
        </button>
        <button onClick={()=>setShowRecipeChoice(true)} style={{
          background:'white',border:'2px solid #e2e8f0',borderRadius:12,padding:'22px 20px',
          cursor:'pointer',textAlign:'left',transition:'all .15s',outline:'none',
        }}
          onMouseEnter={e=>{e.currentTarget.style.borderColor='#e85d04';e.currentTarget.style.boxShadow='0 4px 16px rgba(232,93,4,.12)';}}
          onMouseLeave={e=>{e.currentTarget.style.borderColor='#e2e8f0';e.currentTarget.style.boxShadow='none';}}>
          <div style={{fontSize:28,marginBottom:10}}>✎</div>
          <div style={{fontSize:16,fontWeight:700,color:'#1a1a1a',marginBottom:4}}>Rezept erstellen</div>
          <div style={{fontSize:12,color:'#5e6e7f'}}>Neues Rezept oder Vorprodukt anlegen</div>
        </button>
        {reviewArt ? (
          <button onClick={()=>onEditArticle(reviewArt)} style={{
            background:'#fffbeb',border:'2px solid #fcd34d',borderRadius:12,padding:'22px 20px',
            cursor:'pointer',textAlign:'left',transition:'all .15s',outline:'none',
          }}
            onMouseEnter={e=>{e.currentTarget.style.borderColor='#e85d04';e.currentTarget.style.boxShadow='0 4px 16px rgba(232,93,4,.12)';}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor='#fcd34d';e.currentTarget.style.boxShadow='none';}}>
            <div style={{fontSize:28,marginBottom:10}}>⚠</div>
            <div style={{fontSize:16,fontWeight:700,color:'#92400e',marginBottom:4,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{reviewArt.name}</div>
            <div style={{fontSize:12,color:'#b45309',marginBottom:6}}>
              Preis seit {Math.floor((now-new Date(newestDatum(reviewArt)))/86400000)} Tagen nicht aktualisiert
            </div>
            <div style={{fontSize:11,fontWeight:600,color:'#d97706'}}>Jetzt überprüfen →</div>
          </button>
        ) : (
          <div style={{background:'#f0fdf4',border:'2px solid #bbf7d0',borderRadius:12,padding:'22px 20px'}}>
            <div style={{fontSize:28,marginBottom:10}}>✓</div>
            <div style={{fontSize:16,fontWeight:700,color:'#166534',marginBottom:4}}>Preise aktuell</div>
            <div style={{fontSize:12,color:'#16a34a'}}>Alle Artikel innerhalb ihrer Prüfintervalle aktuell</div>
          </div>
        )}
      </div>

      {showRecipeChoice&&(
        <div className="modal-overlay" onClick={()=>setShowRecipeChoice(false)}>
          <div className="modal" style={{maxWidth:400}} onClick={e=>e.stopPropagation()}>
            <div className="modal-header">
              <h3>Was möchtest du erstellen?</h3>
              <button className="btn btn-ghost" onClick={()=>setShowRecipeChoice(false)}>✕</button>
            </div>
            <div className="modal-body" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
              <button onClick={()=>{setShowRecipeChoice(false);onNewRecipe();}} style={{
                background:'#f8fafc',border:'2px solid #e2e8f0',borderRadius:10,padding:'20px 16px',
                cursor:'pointer',textAlign:'left',outline:'none',transition:'all .15s',
              }}
                onMouseEnter={e=>{e.currentTarget.style.borderColor='#e85d04';}}
                onMouseLeave={e=>{e.currentTarget.style.borderColor='#e2e8f0';}}>
                <div style={{fontSize:24,marginBottom:8}}>🍽</div>
                <div style={{fontSize:14,fontWeight:700,marginBottom:4}}>Rezept</div>
                <div style={{fontSize:12,color:'#5e6e7f'}}>VK, Wareneinsatz, DB, Marge</div>
              </button>
              <button onClick={()=>{setShowRecipeChoice(false);onNewVP();}} style={{
                background:'#f8fafc',border:'2px solid #e2e8f0',borderRadius:10,padding:'20px 16px',
                cursor:'pointer',textAlign:'left',outline:'none',transition:'all .15s',
              }}
                onMouseEnter={e=>{e.currentTarget.style.borderColor='#e85d04';}}
                onMouseLeave={e=>{e.currentTarget.style.borderColor='#e2e8f0';}}>
                <div style={{fontSize:24,marginBottom:8}}>🧪</div>
                <div style={{fontSize:14,fontWeight:700,marginBottom:4}}>Vorprodukt</div>
                <div style={{fontSize:12,color:'#5e6e7f'}}>Zutaten, Kosten, Preis/kg</div>
              </button>
            </div>
          </div>
        </div>
      )}

      <div style={{display:'flex',gap:6,marginBottom:20}}>
        <SubBtn k="margen" label="Margen"/>
        <SubBtn k="db" label="Deckungsbeitrag"/>
        <SubBtn k="preisalarm" label="Preisalarm"/>
        <SubBtn k="szenarien" label="Was wäre wenn …"/>
      </div>

      {view==='margen'&&(<>
        <div className="stats-row" style={{marginBottom:20}}>
          <div className="stat-card">
            <div className="stat-label">Aktive Rezepte</div>
            <div className="stat-value">{mainRecs.length}</div>
          </div>
          <div className="stat-card">
            <div className="stat-label">Ø Wareneinsatz</div>
            <div className="stat-value" style={{color:avgWe>SOLL?'#dc2626':'#16a34a'}}>{avgWe.toFixed(1)} %</div>
          </div>
          <div className="stat-card">
            <div className="stat-label">Über {SOLL} % Soll</div>
            <div className="stat-value" style={{color:ueberSollCount>0?'#dc2626':'#16a34a'}}>{ueberSollCount} / {activeSWRecs.length}</div>
          </div>
          <div className="stat-card">
            <div className="stat-label">Bester DB</div>
            <div className="stat-value" style={{fontSize:15,fontWeight:700}}>{bestDBRec?.name||'—'}</div>
            <div className="stat-sub">{bestDBRec?fmt(bestDBRec.dbNetto):''}</div>
          </div>
        </div>

        <div style={{display:'flex',justifyContent:'flex-end',marginBottom:10}}>
          <label style={{display:'flex',alignItems:'center',gap:8,fontSize:12,color:'#566373',cursor:'pointer',userSelect:'none'}}>
            <span className="switch" style={{flexShrink:0}}>
              <input type="checkbox" checked={showArchivMargen} onChange={e=>setShowArchivMargen(e.target.checked)}/>
              <span className="slider"/>
            </span>
            Archivierte anzeigen
          </label>
        </div>
        <div className="card" style={{padding:'20px 24px'}}>
          {sortedMargen.map(r=>{
            const barPct = Math.min(r.wePct/MAX_WE*100, 100);
            const sollPos = SOLL/MAX_WE*100;
            const isArchiv = r.archiv;
            const barColor = isArchiv ? '#cbd5e1' : weColor(r.wePct);
            return (
              <div key={r.id} style={{display:'flex',alignItems:'center',marginBottom:9,opacity:isArchiv?0.6:1,cursor:'pointer'}}
                onClick={()=>{setTooltip(null);onNavigateToRecipe&&onNavigateToRecipe(r);}}
                onMouseEnter={e=>setTooltip({x:e.clientX,y:e.clientY,lines:[
                  {label:r.name,bold:true},
                  {label:'WE',value:fmt(r.weEuro)},
                  {label:'WE%',value:r.wePct.toFixed(1)+'%'},
                  {label:'VK Brutto',value:fmt(r.vkBrutto)},
                  {label:'DB Netto',value:fmt(r.dbNetto)},
                  {label:'MwSt',value:r.mwst+'%'},
                ]})}
                onMouseMove={e=>setTooltip(t=>t?{...t,x:e.clientX,y:e.clientY}:t)}
                onMouseLeave={()=>setTooltip(null)}
              >
                <div style={{width:150,fontSize:13,color:isArchiv?'#5e6e7f':'#374151',textAlign:'right',paddingRight:14,flexShrink:0,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',fontStyle:isArchiv?'italic':'normal'}}>{r.name}</div>
                <div style={{flex:1,height:26,position:'relative'}}>
                  <div style={{width:barPct+'%',minWidth:4,height:'100%',background:barColor,borderRadius:4,display:'flex',alignItems:'center',paddingLeft:8}}>
                    {barPct>18&&<span style={{fontSize:11,fontWeight:700,color:'white'}}>{r.wePct.toFixed(1)}%</span>}
                  </div>
                  <div style={{position:'absolute',top:0,bottom:0,left:sollPos+'%',borderLeft:'2px dashed #5e6e7f',pointerEvents:'none'}}/>
                  {barPct<=18&&<span style={{position:'absolute',left:barPct+'%',top:'50%',transform:'translateY(-50%)',paddingLeft:6,fontSize:11,color:isArchiv?'#5e6e7f':'#374151',fontWeight:600}}>{r.wePct.toFixed(1)}%</span>}
                </div>
              </div>
            );
          })}
          {/* X-Achse */}
          <div style={{display:'flex',marginLeft:150,marginTop:8,paddingLeft:0}}>
            {xTicks.map((v,i)=>(
              <div key={v} style={{flex:i===0?0:10,minWidth:i===0?0:undefined,fontSize:10,color:'#5e6e7f',textAlign:i===0?'left':'center'}}>
                {v>0?v+'%':'0%'}
              </div>
            ))}
          </div>
        </div>
        <div style={{marginTop:12,fontSize:12,color:'#5e6e7f',lineHeight:1.6}}>
          Ampel: grün ≤ {SOLL}%, orange ≤ 30%, rot {'>'} 30% WE (to-go, 7% USt). Rezepte mit 19% MwSt fließen nicht in Ø-Werte ein.
        </div>
      </>)}

      {view==='db'&&(<>
        <div className="stats-row" style={{marginBottom:20}}>
          <div className="stat-card">
            <div className="stat-label">Bester DB</div>
            <div className="stat-value" style={{fontSize:15}}>{sortedDB[0]?.name||'—'}</div>
            <div className="stat-sub">{sortedDB[0]?fmt(sortedDB[0].dbNetto):''}</div>
          </div>
          <div className="stat-card">
            <div className="stat-label">Schwächster DB</div>
            <div className="stat-value" style={{fontSize:15,color:'#dc2626'}}>{sortedDB[sortedDB.length-1]?.name||'—'}</div>
            <div className="stat-sub">{sortedDB[sortedDB.length-1]?fmt(sortedDB[sortedDB.length-1].dbNetto):''}</div>
          </div>
          <div className="stat-card">
            <div className="stat-label">Ø DB Netto</div>
            <div className="stat-value">{fmt(avgDB)}</div>
          </div>
          <div className="stat-card">
            <div className="stat-label">Gesamt-DB (Stückzahlen)</div>
            <div className="stat-value" style={{fontSize:16}}>{fmt(totalDB)}</div>
            <div className="stat-sub">bei hinterlegten Stückzahlen</div>
          </div>
        </div>
        <div className="card" style={{padding:'20px 24px'}}>
          {sortedDB.map(r=>{

function MobileDashboardView({recipes, articles, vps, priceLog, warnDays, alertDays,
  onNewArticle, onNewRecipe, onEditArticle, onNavigateToRecipe}) {

  const SOLL = 22;
  const now = Date.now();

  const activeSWRecs = recipes.filter(r=>!r.archiv&&r.mwst!==19);
  const avgWe = activeSWRecs.length ? activeSWRecs.reduce((s,r)=>s+r.wePct,0)/activeSWRecs.length : 0;
  const ueberSollCount = activeSWRecs.filter(r=>r.wePct>SOLL).length;
  const bestDBRec = [...recipes].filter(r=>!r.archiv).sort((a,b)=>b.dbNetto-a.dbNetto)[0];

  const staleArts = articles
    .filter(a=>!a.archiv&&['yellow','red'].includes(bestPriceAge(a,warnDays,alertDays)))
    .map(a=>{const nd=newestDatum(a);return{...a,_nd:nd,days:nd?Math.floor((now-new Date(nd))/86400000):9999};})
    .sort((a,b)=>b.days-a.days);
  const redCount = articles.filter(a=>!a.archiv&&bestPriceAge(a,warnDays,alertDays)==='red').length;
  const mostStale = staleArts[0]||null;

  const critRecs = [...activeSWRecs].sort((a,b)=>b.wePct-a.wePct).slice(0,6);
  const weColor = pct=>pct<=SOLL?'#16a34a':pct<=30?'#d97706':'#dc2626';

  const savingsOpps = [];
  articles.filter(a=>!a.archiv&&(a.varianten||[]).length>0).forEach(art=>{
    const defPPU=art.g>0?art.ek/art.g:art.ek;
    let cheapestV=null,cheapestPPU=defPPU;
    (art.varianten||[]).forEach(v=>{const p=v.ek/(art.g||1);if(p<cheapestPPU-0.0001){cheapestPPU=p;cheapestV=v;}});
    if(!cheapestV) return;
    const deltaPPU=defPPU-cheapestPPU; let annualSaving=0; const refs=[];
    recipes.filter(r=>!r.archiv&&(r.zutaten||[]).some(z=>z.art===art.id)).forEach(rec=>{
      const m=(rec.zutaten||[]).filter(z=>z.art===art.id).reduce((s,z)=>s+(z.menge||0),0);
      refs.push({name:rec.name,menge:m}); if(rec.anzahl) annualSaving+=deltaPPU*m*rec.anzahl*52;
    });
    if(refs.length) savingsOpps.push({art,cheapestV,deltaPPU,annualSaving,refs});
  });
  savingsOpps.sort((a,b)=>b.annualSaving-a.annualSaving);
  const bestSaving = savingsOpps[0]||null;

  return (
    <div style={{padding:'12px 16px 8px'}}>

      {/* Alerts */}
      {redCount>0&&(
        <div style={{background:'#fef2f2',border:'1px solid #fca5a5',borderRadius:12,padding:'13px 14px',marginBottom:10,display:'flex',alignItems:'center',gap:12}}>
          <span style={{fontSize:18,color:'#dc2626',flexShrink:0}}>⚠</span>
          <div style={{flex:1}}>
            <div style={{fontSize:14,fontWeight:700,color:'#991b1b'}}>{redCount} Preise veraltet</div>
            <div style={{fontSize:12,color:'#b91c1c',marginTop:1}}>Einige Artikel wurden lange nicht aktualisiert</div>
          </div>
          <button onClick={()=>mostStale&&onEditArticle&&onEditArticle(mostStale)}
            className="btn btn-primary btn-sm" style={{flexShrink:0,fontSize:12,padding:'6px 12px',borderRadius:8}}>
            Jetzt prüfen
          </button>
        </div>

// Apply connect-link params from URL hash before React state initializes
(function(){
  const h = window.location.hash;
  if (!h.startsWith('#connect=')) return;
  try {
    const d = JSON.parse(atob(h.slice(9)));
    if (d.sbUrl)    localStorage.setItem('sb_url',              JSON.stringify(d.sbUrl));
    if (d.sbKey)    localStorage.setItem('sb_key',              JSON.stringify(d.sbKey));
    if (d.warnDays) localStorage.setItem('simple_warn_days',    JSON.stringify(d.warnDays));
    if (d.alertDays)localStorage.setItem('simple_alert_days',   JSON.stringify(d.alertDays));
  } catch(e) {}
  history.replaceState(null, '', window.location.pathname + window.location.search);
})();

const TABS = ['Dashboard','Artikel','Rechnungen','Rezepte','Vorprodukte','Lieferanten','Preislog','Vorlagen','Einkauf'];

function ShoppingTab({articles, suppliers=[], isMobile=false}) {
  const [apiKey] = useLS('sk_simple_apikey','');
  const [list, setList] = useLS('simple_shopping', []);
  const [scanning, setScanning] = useState(false);
  const [error, setError] = useState('');
  const [addText, setAddText] = useState('');

  const scan = async (file) => {
    if (!file) return;
    if (!apiKey) { setError('Kein API-Key hinterlegt — bitte im Tab „Rechnungen" eintragen.'); return; }
    setScanning(true); setError('');
    try {
      const b64 = await new Promise((res,rej)=>{
        const r=new FileReader();
        r.onload=e=>res(e.target.result.split(',')[1]);
        r.onerror=rej; r.readAsDataURL(file);
      });
      const mediaType = file.type||'image/jpeg';
      const artList = articles.filter(a=>!a.archiv).map(a=>`${a.id}|${a.name}`).join('\n');
      const systemPrompt = `Du liest eine handschriftliche Einkaufsliste (z.B. von einer Tafel) für eine Gastronomie-Küche.
Extrahiere jeden einzelnen Eintrag der Liste. Ordne jedem Eintrag den am besten passenden Artikel aus der folgenden Artikelliste zu (Format "id|name").
Berücksichtige Abkürzungen, Plural/Singular und Schreibfehler. Passt kein Artikel gut, setze artId auf null.
Erkenne Mengen falls vorhanden (z.B. "2 kg" → menge 2, einheit "kg"; "3x" → menge 3).

ARTIKELLISTE:
${artList}

Antworte NUR mit gültigem JSON, ohne Erklärung:
{"items":[{"raw":"Text wie auf der Tafel","artId":"A093","menge":2,"einheit":"kg"}]}
Setze artId/menge/einheit auf null wenn nicht erkennbar.`;
      const resp = await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{
          'x-api-key':apiKey,
          'anthropic-version':'2023-06-01',
          'content-type':'application/json',
          'anthropic-dangerous-direct-browser-access':'true',
        },
        body:JSON.stringify({
          model:'claude-haiku-4-5-20251001',
          max_tokens:2048,
          system:systemPrompt,
          messages:[{role:'user',content:[
            {type:'image',source:{type:'base64',media_type:mediaType,data:b64}},
            {type:'text',text:'Lies die Einkaufsliste von der Tafel und ordne die Artikel zu.'}
          ]}]
        })
      });
      const json = await resp.json();
      if(!resp.ok) throw new Error(json.error?.message||'API Fehler');
      const text = json.content[0].text;
      const m = text.match(/\{[\s\S]*\}/);
      if(!m) throw new Error('Kein JSON in Antwort');
      const parsed = JSON.parse(m[0]);
      const items = (parsed.items||[]).filter(it=>it.raw||it.artId).map(it=>({
        id:'S'+uid(), raw:it.raw||'', artId:it.artId||null,
        menge:(it.menge??null), einheit:it.einheit||null, checked:false, manualSupplier:null
      }));
      if(!items.length) throw new Error('Keine Einträge erkannt — Foto schärfer/heller versuchen.');
      // Offene Einträge behalten, erledigte verwerfen, neue anhängen
      setList(prev=>[...prev.filter(p=>!p.checked), ...items]);
    } catch(e){ setError(e.message); }
    setScanning(false);
  };

  const toggle = id => setList(prev=>prev.map(it=>it.id===id?{...it,checked:!it.checked}:it));
  const remove = id => setList(prev=>prev.filter(it=>it.id!==id));
  const clearChecked = () => setList(prev=>prev.filter(it=>!it.checked));
  const clearAll = () => { if(window.confirm('Komplette Liste löschen?')) setList([]); };
  const addManual = () => {
    const t = addText.trim(); if(!t) return;
    const key = t.toLowerCase();
    const found = articles.find(a=>!a.archiv && (a.name.toLowerCase().includes(key)||key.includes(a.name.toLowerCase())));
    setList(prev=>[...prev,{id:'S'+uid(),raw:t,artId:found?found.id:null,menge:null,einheit:null,checked:false,manualSupplier:null}]);
    setAddText('');
  };

  const enriched = list.map(it=>{
    const art = it.artId ? articles.find(a=>a.id===it.artId) : null;
    const best = art ? bestSupplier(art) : null;
    return {...it, art, best, supplier: it.manualSupplier || (best&&best.lief) || 'Sonstiges / kein Lieferant'};
  });

  const done = enriched.filter(e=>e.checked).length;
  const total = enriched.length;
  const pct = total ? Math.round(done/total*100) : 0;

  const openItems = enriched.filter(e=>!e.checked);
  const doneItems = enriched.filter(e=>e.checked);
  const groups = {};
  openItems.forEach(e=>{ if(!groups[e.supplier]) groups[e.supplier]=[]; groups[e.supplier].push(e); });
  const groupNames = Object.keys(groups).sort((a,b)=>{
    const aLast = a.startsWith('Sonstiges'), bLast = b.startsWith('Sonstiges');
    if(aLast&&!bLast) return 1; if(bLast&&!aLast) return -1;
    return a.localeCompare(b,'de');
  });

  const Row = (e) => {
    const mengeStr = (e.menge!=null && e.menge!=='') ? String(e.menge).replace('.',',') : '';
    return (
      <div key={e.id} className={`shop-row${e.checked?' checked':''}`} onClick={()=>toggle(e.id)}>
        <div className="shop-cb">✓</div>
        <div style={{flex:1,minWidth:0}}>
          <div className="shop-name">
            {mengeStr && <span style={{color:'#e85d04'}}>{mengeStr}{e.einheit?' '+e.einheit:''} · </span>}
            {e.art ? e.art.name : e.raw}
          </div>
          <div className="shop-meta">
            {e.art && e.raw && e.raw.toLowerCase()!==e.art.name.toLowerCase() &&
              <span style={{color:'#94a3b8'}}>„{e.raw}"</span>}
            {!e.art && <span className="badge badge-gray">kein Artikel zugeordnet</span>}
            {e.best && e.best.count>1 && <span className="badge badge-green">💡 bester Preis</span>}
          </div>
        </div>
        {e.best && e.best.ppu>0 &&
          <div className="shop-price">{fmt(e.best.ppu)}<span style={{color:'#94a3b8',fontWeight:500}}>/{e.art.e}</span></div>}
        <button className="btn btn-ghost btn-xs" style={{color:'#cbd5e1',padding:'4px 6px'}}
          onClick={ev=>{ev.stopPropagation();remove(e.id);}} aria-label="Entfernen">✕</button>
      </div>
    );
  };

  return (
    <div className="tab-content" style={{maxWidth:680,margin:'0 auto'}}>
      {!isMobile &&
        <div className="warn-banner">📱 Tipp: Diese Funktion ist fürs Handy gedacht — fotografiere die Tafel und hake vor Ort beim Einkauf ab.</div>}

      <label className="invoice-drop" style={{display:'block',padding:scanning?'28px':'32px',pointerEvents:scanning?'none':'auto',opacity:scanning?.7:1}}>
        <input type="file" accept="image/*" capture="environment" style={{display:'none'}} disabled={scanning}
          onChange={e=>{const f=e.target.files[0]; e.target.value=''; if(f) scan(f);}}/>
        <div style={{fontSize:34}}>{scanning?'⏳':'📋'}</div>
        <p style={{fontWeight:600,color:'#374151'}}>{scanning?'Tafel wird gelesen…':'Tafel fotografieren'}</p>
        {!scanning && <p style={{fontSize:12}}>oder vorhandenes Foto wählen</p>}
      </label>

      {error && <div className="warn-banner" style={{background:'#fef2f2',borderColor:'#fca5a5',color:'#b91c1c',marginTop:14}}>⚠ {error}</div>}

      {total>0 && (
        <div style={{margin:'18px 0 4px'}}>
          <div style={{display:'flex',alignItems:'center',marginBottom:8,gap:10}}>
            <span style={{fontSize:14,fontWeight:700,color:'#374151'}}>{done} / {total} erledigt</span>
            <button className="btn btn-ghost btn-xs" style={{marginLeft:'auto'}} onClick={clearAll}>Liste leeren</button>
          </div>
          <div className="shop-progress"><div className="shop-progress-bar" style={{width:pct+'%'}}/></div>
        </div>
      )}

      <div style={{display:'flex',gap:8,margin:'16px 0'}}>
        <input type="text" placeholder="Eintrag manuell hinzufügen…" value={addText}
          onChange={e=>setAddText(e.target.value)}
          onKeyDown={e=>{if(e.key==='Enter')addManual();}}/>
        <button className="btn btn-secondary" style={{flexShrink:0}} onClick={addManual}>+ Hinzufügen</button>
      </div>

      {total===0 && !scanning &&
        <div className="empty">Noch keine Einkaufsliste. Fotografiere die Tafel oben, um zu starten.</div>}

      {groupNames.map(gn=>(
        <div key={gn}>
          <div className="shop-group-title">
            <span>🏪 {gn}</span>
            <span style={{marginLeft:'auto',color:'#94a3b8',fontWeight:600}}>{groups[gn].length}</span>
          </div>
          {groups[gn].map(Row)}
        </div>
      ))}

      {doneItems.length>0 && (
        <div>
          <div className="shop-group-title" style={{marginTop:24}}>
            <span>✓ Erledigt ({doneItems.length})</span>
            <button className="btn btn-ghost btn-xs" style={{marginLeft:'auto'}} onClick={clearChecked}>entfernen</button>
          </div>
          {doneItems.map(Row)}
        </div>
      )}
    </div>
  );
}

function App() {
  const [tab, setTab] = useState(0);
  const [sbUrl, setSbUrl] = useLS('sb_url','');
  const [sbKey, setSbKey] = useLS('sb_key','');
  const [showSettings, setShowSettings] = useState(false);
  const [loading, setLoading] = useState(true);
  const [syncStatus, setSyncStatus] = useState('idle');
  const [syncError, setSyncError] = useState('');

  const [articles,   setArticles]   = useLS('simple_articles',   ARTICLES_SEED);
  const [recipes,    setRecipes]    = useLS('simple_recipes',    RECIPES_SEED);
  const [vps,        setVPs]        = useLS('simple_vps',        VPS_SEED);
  const [priceLog,   setPriceLog]   = useLS('simple_pricelog',   []);
  const [suppliers,  setSuppliers]  = useLS('simple_suppliers',  SUPPLIERS_SEED);
  const [templates,  setTemplates]  = useLS('simple_templates',  TEMPLATES_SEED);
  const [deliveryRate, setDeliveryRate] = useLS('simple_delivery_rate', 30);
  const [warnDays,  setWarnDays]  = useLS('simple_warn_days',  90);
  const [alertDays, setAlertDays] = useLS('simple_alert_days', 180);
  const [isMobile, setIsMobile] = useState(()=>window.innerWidth<768);
  useEffect(()=>{const h=()=>setIsMobile(window.innerWidth<768);window.addEventListener('resize',h,{passive:true});return()=>window.removeEventListener('resize',h);},[]);
  const [appImpactModal, setAppImpactModal] = useState(null);
  const [pendingModal,        setPendingModal]        = useState(null);
  const [pendingRecipeModal,  setPendingRecipeModal]  = useState(null);
  const [pendingVPModal,      setPendingVPModal]      = useState(null);
  const [pendingStatusFilter, setPendingStatusFilter] = useState(null);
  const [toasts, setToasts] = useState([]);
  const addToast = useCallback((type, msg) => {
    const id = Date.now() + Math.random();
    setToasts(prev => [...prev, {id, type, msg}]);
    setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), type === 'error' ? 7000 : 2500);
  }, []);
  const dismissToast = useCallback(id => setToasts(prev => prev.filter(t => t.id !== id)), []);

  const client = useMemo(()=>{
    if (!sbUrl||!sbKey) return null;
    try { return window.supabase.createClient(sbUrl,sbKey); } catch { return null; }
  },[sbUrl,sbKey]);

  // ── Initialload from Supabase ──
  useEffect(()=>{
    if (!client) { setLoading(false); return; }
    (async()=>{
      setLoading(true);
      try {
        const [a,r,v,l,s] = await Promise.all([
          client.from('articles').select('*').order('name'),
          client.from('recipes').select('*').order('name'),
          client.from('vorprodukte').select('*').order('name'),
          client.from('price_log').select('*').order('created_at',{ascending:false}).limit(500),
          client.from('suppliers').select('*').order('name'),
        ]);
        if (a.error) throw a.error;
        // Empty DB on first setup → push seed data
        if (a.data.length===0) {
          await Promise.all([
            client.from('articles').upsert(articles),
            client.from('recipes').upsert(recipes),
            client.from('vorprodukte').upsert(vps),
            client.from('suppliers').upsert(suppliers),
          ]);
        } else {
          const favIds = new Set(JSON.parse(localStorage.getItem('simple_favs')||'[]'));
          setArticles(a.data.map(art=>({...art, fav: art.fav || favIds.has(art.id)})));
          if (r.data?.length) setRecipes(r.data);
          if (v.data?.length) setVPs(v.data);
          if (l.data)         setPriceLog(l.data);
          if (s.data?.length) setSuppliers(s.data);
        }
        setSyncStatus('ok');
      } catch(e) { setSyncStatus('error'); setSyncError(e.message); }
      setLoading(false);
    })();
  // eslint-disable-next-line react-hooks/exhaustive-deps
  },[client]);

  // ── Upsert helper (called explicitly by save functions via props) ──
  const upsert = useCallback(async (table, item, {silent}={}) => {
    if (!client) return;
    setSyncStatus('syncing');
    const {error} = await client.from(table).upsert(
      Array.isArray(item) ? item : [item]
    );
    if (error) { setSyncStatus('error'); setSyncError(error.message); addToast('error', `Fehler: ${error.message}`); }
    else { setSyncStatus('ok'); if (!silent) addToast('success', 'Gespeichert'); }
  },[client, addToast]);

  const syncFav = useCallback(async (artId, fav) => {
    if (!client) return;
    try { await client.from('articles').update({fav}).eq('id', artId); } catch(e) {}
  }, [client]);

  const del = useCallback(async (table, id) => {
    if (!client) return;
    setSyncStatus('syncing');
    const {error} = await client.from(table).delete().eq('id', id);
    if (error) { setSyncStatus('error'); setSyncError(error.message); addToast('error', `Fehler: ${error.message}`); }
    else { setSyncStatus('ok'); addToast('success', 'Gelöscht'); }
  },[client, addToast]);

  // Seed-merge for local mode
  useEffect(()=>{
    if (client) return; // Supabase handles it
    setArticles(prev=>{
      const ids = new Set(prev.map(a=>a.id));
      const missing = ARTICLES_SEED.filter(a=>!ids.has(a.id));
      return missing.length ? [...prev,...missing] : prev;
    });
  // eslint-disable-next-line react-hooks/exhaustive-deps
  },[]);

  // ── Status indicator ──
  const si = !client
    ? {c:'#5e6e7f', label:'Lokal (kein Cloud-Sync)'}
    : loading
    ? {c:'#d97706', label:'Verbinde…'}
    : syncStatus==='syncing'
    ? {c:'#d97706', label:'Sync…'}
    : syncStatus==='error'
    ? {c:'#dc2626', label:'Fehler'}
    : {c:'#16a34a', label:'Supabase ✓'};

  const warnCount  = recipes.filter(r=>r.wePct>38).length;
  const staleCount = articles.filter(a=>!a.archiv&&bestPriceAge(a,warnDays,alertDays)==='red').length;

  if (loading && client) return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:16,background:'#f3f4f6'}}>
      <div style={{fontSize:40}}>☁️</div>
      <div style={{fontWeight:600,color:'#374151',fontSize:16}}>Lade Daten von Supabase…</div>
      <div style={{fontSize:13,color:'#5e6e7f'}}>Erstverbindung kann einen Moment dauern</div>
    </div>
  );

  return (
    <div className="app">
      <div className="header">
        <div>
          <div className="header" style={{padding:0,background:'transparent'}}>
            <h1>🥪 Simple Kitchen OS</h1>
          </div>
        </div>
        <div style={{marginLeft:'auto',display:'flex',gap:10,alignItems:'center'}}>
          {warnCount>0&&<span className="badge badge-red">⚠ {warnCount} Margenalarm</span>}
          {staleCount>0&&<span className="badge badge-orange" style={{cursor:'pointer'}} onClick={()=>{setPendingStatusFilter('red');setTab(1);}}>📅 {staleCount} Preise veraltet</span>}
          <span style={{fontSize:12,color:si.c,fontWeight:600,display:'flex',alignItems:'center',gap:5,cursor:'pointer'}} onClick={()=>setShowSettings(true)} title="Einstellungen">
            <span style={{width:7,height:7,borderRadius:'50%',background:si.c,display:'inline-block',flexShrink:0}}/>
            {si.label}
          </span>
          <button className="btn btn-ghost" style={{color:'#aaa',fontSize:22,padding:'4px 8px',lineHeight:1}} onClick={()=>setShowSettings(true)} title="Einstellungen">⚙</button>
        </div>
      </div>
      <div className="tabs">
        {TABS.map((t,i)=>(
          <div key={t} className={`tab${tab===i?' active':''}`} onClick={()=>setTab(i)}>
            {t}
            {i===3&&warnCount>0&&<span className="badge badge-red" style={{marginLeft:6,padding:'1px 6px'}}>{warnCount}</span>}
          </div>
        ))}
      </div>
      {isMobile&&<MobileHeader
        title={tab===0?'Dashboard':tab===1?'Artikel':tab===2?'Rechnungen':tab===3?'Rezepte':tab===4?'Vorprodukte':tab===5?'Lieferanten':tab===6?'Preislog':tab===7?'Vorlagen':'Einkauf'}
        right={<button className="btn btn-ghost" style={{color:'#5e6e7f',fontSize:19,padding:'4px 6px',lineHeight:1}} onClick={()=>setShowSettings(true)} title="Einstellungen">⚙</button>}
      />}
      <div className="content">
        {tab===0&&<DashboardTab recipes={recipes} articles={articles} vps={vps} suppliers={suppliers} priceLog={priceLog} warnDays={warnDays} alertDays={alertDays}
          onNewArticle={()=>{setPendingModal({name:'',g:1,e:'KG',ek:0,lief:'',datum:'',archiv:false});setTab(1);}}
          onNewRecipe={()=>{setPendingRecipeModal({});setTab(3);}}
          onNewVP={()=>{setPendingVPModal({});setTab(4);}}
          onNavigateToRecipe={r=>{setPendingRecipeModal(r);setTab(3);}}
          onEditArticle={art=>{setPendingModal(art);setTab(1);}}
          onSaveArticle={art=>{
            const existing = articles.find(a=>a.id===art.id);
            if (existing && existing.ek !== art.ek) {
              const entry = {id:'L'+uid(),datum:new Date().toISOString(),typ:'Preisänderung',
                produkt:art.name,altPreis:existing.ek,neuPreis:art.ek,quelle:'Manuell',status:'ok'};
              setPriceLog(prev=>[entry,...prev]);
              upsert&&upsert('price_log', entry, {silent:true});
              const impacts = computeImpact(art.id, art, articles, recipes);
              if (impacts.length) setAppImpactModal({
                title:`Preisauswirkung – ${art.name}`,
                subtitle:`${fmt(existing.ek)} → ${fmt(art.ek)} (${art.ek>existing.ek?'+':''}${((art.ek-existing.ek)/existing.ek*100).toFixed(1)}%)`,
                impacts
              });
            }
            setArticles(prev=>existing?prev.map(a=>a.id===art.id?art:a):[...prev,art]);
            upsert&&upsert('articles', art);
          }}
        />}
        {tab===1&&<ArticleTab articles={articles} setArticles={setArticles} priceLog={priceLog} setPriceLog={setPriceLog} upsert={upsert} del={del} recipes={recipes} suppliers={suppliers} vps={vps}
          pendingModal={pendingModal} onPendingClear={()=>setPendingModal(null)} warnDays={warnDays} alertDays={alertDays}
          onNavigateToRecipe={r=>{setPendingRecipeModal(r);setTab(3);}}
          onNavigateToVP={vp=>{setPendingVPModal(vp);setTab(4);}}
          pendingStatusFilter={pendingStatusFilter} onPendingStatusFilterClear={()=>setPendingStatusFilter(null)}
          syncFav={syncFav}
        />}
        {tab===2&&<InvoiceTab articles={articles} setArticles={setArticles} priceLog={priceLog} setPriceLog={setPriceLog} upsert={upsert} suppliers={suppliers} recipes={recipes}/>}
        {tab===3&&<RecipeTab recipes={recipes} setRecipes={setRecipes} upsert={upsert} del={del} articles={articles} templates={templates} deliveryRate={deliveryRate}
          pendingModal={pendingRecipeModal} onPendingClear={()=>setPendingRecipeModal(null)}
        />}
        {tab===4&&<VPTab vps={vps} setVPs={setVPs} articles={articles} setArticles={setArticles} upsert={upsert}
          pendingModal={pendingVPModal} onPendingClear={()=>setPendingVPModal(null)}
        />}
        {tab===5&&<SupplierTab suppliers={suppliers} setSuppliers={setSuppliers} upsert={upsert}/>}
        {tab===6&&<PriceLogTab priceLog={priceLog} setPriceLog={setPriceLog}/>}
        {tab===7&&<VorlagenTab templates={templates} setTemplates={setTemplates} articles={articles}/>}
        {tab===8&&<ShoppingTab articles={articles} suppliers={suppliers} isMobile={isMobile}/>}
      </div>
      {isMobile&&<MobileNav tab={tab} setTab={setTab}/>}
      {appImpactModal&&<ImpactModal {...appImpactModal} onClose={()=>setAppImpactModal(null)}/>}
      {showSettings&&<SettingsModal
        sbUrl={sbUrl} setSbUrl={setSbUrl}
        sbKey={sbKey} setSbKey={setSbKey}
        isConnected={!!client}
        syncError={syncStatus==='error'?syncError:''}
        deliveryRate={deliveryRate} setDeliveryRate={setDeliveryRate}
        warnDays={warnDays} setWarnDays={setWarnDays} alertDays={alertDays} setAlertDays={setAlertDays}
        onClose={()=>setShowSettings(false)}
        onSeedDb={async()=>{
          await Promise.all([
            client.from('articles').upsert(articles),
            client.from('recipes').upsert(recipes),
            client.from('vorprodukte').upsert(vps),
            client.from('suppliers').upsert(suppliers),
          ]);
        }}
        onSeedMissing={async()=>{
          const recipeIds = new Set(recipes.map(r=>r.id));
          const missingRecipes = RECIPES_SEED.filter(r=>!recipeIds.has(r.id));
          if (missingRecipes.length) {
            const {error} = await client.from('recipes').upsert(missingRecipes);
            if (error) throw error;
            setRecipes(prev=>[...prev,...missingRecipes]);
          }
          const drinksWithZutaten = RECIPES_SEED.filter(r=>(r.zutaten||[]).length>0);
          for (const r of drinksWithZutaten) {
            const existing = recipes.find(x=>x.id===r.id);
            if (existing && !(existing.zutaten||[]).length) {
              await client.from('recipes').update({zutaten:r.zutaten}).eq('id',r.id);
              setRecipes(prev=>prev.map(x=>x.id===r.id?{...x,zutaten:r.zutaten}:x));
            }
          }
          const vpIds = new Set(vps.map(v=>v.id));
          const missingVPs = VPS_SEED.filter(v=>!vpIds.has(v.id));
          if (missingVPs.length) {
            const {error} = await client.from('vorprodukte').upsert(missingVPs);
            if (error) throw error;
            setVPs(prev=>[...prev,...missingVPs]);
          }
        }}
      />}
      <Toasts toasts={toasts} onDismiss={dismissToast}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
